<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>무드타로 78</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 10%, rgba(168, 85, 247, 0.42), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(56, 189, 248, 0.25), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(236, 72, 153, 0.18), transparent 34%),
        linear-gradient(180deg, #140d24 0%, #07050d 100%);
      overflow-x: hidden;
    }

    .app {
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 26px 18px 70px;
    }

    .hero {
      text-align: center;
      padding: 26px 0 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 70px);
      letter-spacing: -0.07em;
      line-height: 0.98;
    }

    .subtitle {
      margin: 16px auto 0;
      max-width: 620px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
      font-size: 15px;
    }

    .question-box {
      margin: 26px auto 0;
      max-width: 660px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 26px;
      padding: 18px;
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.24);
    }

    .question-box label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.76);
    }

    textarea {
      width: 100%;
      height: 86px;
      resize: none;
      border: 0;
      outline: none;
      color: #fff;
      font: inherit;
      line-height: 1.5;
      padding: 15px;
      border-radius: 19px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .mode-box {
      margin: 22px auto 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      color: #fff;
      font-weight: 900;
      border-radius: 999px;
      padding: 13px 18px;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(9px);
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.17);
    }

    button.primary {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border: 0;
      box-shadow: 0 14px 34px rgba(139, 92, 246, 0.34);
    }

    .spread-title {
      text-align: center;
      margin: 42px 0 18px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 15px;
      font-weight: 900;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }

    .cards.one {
      grid-template-columns: minmax(0, 330px);
      justify-content: center;
    }

    .card-block {
      min-width: 0;
    }

    .card-wrap {
      perspective: 1200px;
    }

    .tarot-card {
      position: relative;
      width: 100%;
      aspect-ratio: 300 / 525;
      transform-style: preserve-3d;
      transition: transform 0.78s cubic-bezier(.2,.8,.2,1);
    }

    .tarot-card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow:
        0 26px 70px rgba(0, 0, 0, 0.42),
        inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .card-back {
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.22), transparent 19%),
        linear-gradient(135deg, #21113d, #6534b8 45%, #170b29);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.17);
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 17px;
      border: 1px solid rgba(255, 255, 255, 0.30);
    }

    .card-back::after {
      content: "✦";
      font-size: clamp(48px, 9vw, 88px);
      filter: drop-shadow(0 12px 22px rgba(0, 0, 0, 0.45));
    }

    .card-front {
      transform: rotateY(180deg);
      background: #e8d0a3;
      display: flex;
      flex-direction: column;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #e8d0a3;
    }

    .card-role {
      position: absolute;
      top: 11px;
      left: 11px;
      z-index: 2;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(20, 13, 36, 0.72);
      color: white;
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .reverse-mark {
      position: absolute;
      top: 11px;
      right: 11px;
      z-index: 2;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(236, 72, 153, 0.76);
      color: white;
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .is-reversed .card-img {
      transform: rotate(180deg);
    }

    .result {
      display: none;
      margin-top: 16px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(12px);
    }

    .result.show {
      display: block;
      animation: fadeUp 0.42s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result h3 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: -0.035em;
    }

    .keyword {
      margin: 0 0 10px;
      color: #ffe08a;
      font-size: 13px;
      font-weight: 900;
    }

    .result p {
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      line-height: 1.65;
      font-size: 14px;
    }

    .final-reading {
      display: none;
      margin-top: 30px;
      padding: 24px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(236, 72, 153, 0.15)),
        rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.22);
    }

    .final-reading.show {
      display: block;
      animation: fadeUp 0.45s ease both;
    }

    .final-reading h2 {
      margin: 0 0 12px;
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .final-reading p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.75;
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none;
    }

    .notice {
      margin: 24px auto 0;
      max-width: 720px;
      text-align: center;
      color: rgba(255, 255, 255, 0.48);
      font-size: 12px;
      line-height: 1.55;
    }

    @media (max-width: 760px) {
      .cards {
        grid-template-columns: 1fr;
        max-width: 340px;
        margin: 0 auto;
      }

      .result {
        margin-bottom: 22px;
      }

      .app {
        padding-top: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <div class="badge">🔮 78 Cards · Rider-Waite-Smith Style</div>
      <h1>무드타로 78</h1>

      <p class="subtitle">
        질문을 떠올리고 카드를 뽑아보세요.
        22장 메이저 아르카나와 56장 마이너 아르카나 전체 덱으로 뽑습니다.
      </p>

      <div class="question-box">
        <label for="question">질문 입력</label>
        <textarea id="question" placeholder="예: 그 사람 마음은? / 이직해도 될까? / 이번 달 금전운은?"></textarea>
      </div>

      <div class="mode-box">
        <button class="primary" id="oneCardBtn">1장 뽑기</button>
        <button id="threeCardBtn">3카드 스프레드</button>
      </div>

      <p class="notice">
        카드 이미지는 Wikimedia Commons의 Rider-Waite-Smith 계열 공개 이미지 경로를 사용합니다.
        앱 출시용으로는 이미지를 직접 다운로드해 프로젝트에 포함하는 방식이 더 안정적입니다.
      </p>
    </section>

    <div class="spread-title hidden" id="spreadTitle"></div>

    <section class="cards one" id="cards"></section>

    <section class="final-reading" id="finalReading">
      <h2>종합 해석</h2>
      <p id="finalText"></p>
    </section>

    <div class="action-row hidden" id="actionRow">
      <button class="primary" id="drawAgainBtn">다시 뽑기</button>
      <button id="clearBtn">질문 지우기</button>
    </div>
  </main>

    const reversedAddons = [
      "다만 역방향으로 나왔기 때문에 흐름이 막히거나 안쪽으로 꼬여 있을 수 있습니다.",
      "이 카드는 지금 바로 바깥으로 드러나기보다 내면의 과제처럼 작동합니다.",
      "무리하게 밀어붙이면 반대로 지칠 수 있으니 속도를 낮추는 편이 좋습니다.",
      "원래 의미가 약해지거나 과해진 상태일 수 있어 균형 조절이 필요합니다."
    ];

    const roles = {
      one: ["오늘의 메시지"],
      three: ["과거/원인", "현재/상황", "미래/조언"]
    };

    const cardsContainer = document.getElementById("cards");
    const spreadTitle = document.getElementById("spreadTitle");
    const finalReading = document.getElementById("finalReading");
    const finalText = document.getElementById("finalText");
    const actionRow = document.getElementById("actionRow");
    const questionInput = document.getElementById("question");

    const oneCardBtn = document.getElementById("oneCardBtn");
    const threeCardBtn = document.getElementById("threeCardBtn");
    const drawAgainBtn = document.getElementById("drawAgainBtn");
    const clearBtn = document.getElementById("clearBtn");

    let currentMode = "one";

    function encodeImage(fileName) {
      return imageBase + encodeURIComponent(fileName);
    }

    function buildDeck() {
      const majorDeck = majorCards.map((card, index) => ({
        type: "major",
        id: `major-${index}`,
        name: card[0],
        ko: card[1],
        image: encodeImage(card[2]),
        keyword: card[3],
        meaning: card[4]
      }));

      const minorDeck = [];

      suits.forEach((suit) => {
        ranks.forEach((rank, index) => {
          const number = String(index + 1).padStart(2, "0");
          const fileName = `${suit.filePrefix}${number}.jpg`;

          minorDeck.push({
            type: "minor",
            id: `${suit.id}-${index + 1}`,
            name: `${rank[0]} of ${suit.id}`,
            ko: `${suit.ko} ${rank[1]}`,
            image: encodeImage(fileName),
            keyword: `${rank[2]} · ${suit.theme}`,
            meaning: minorMeaningMap[suit.id][index],
            suit: suit.ko,
            element: suit.element
          });
        });
      });

      return [...majorDeck, ...minorDeck];
    }

    const tarotDeck = buildDeck();

    function shuffleDeck(deck) {
      const copied = [...deck];

      for (let i = copied.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[randomIndex]] = [copied[randomIndex], copied[i]];
      }

      return copied;
    }

    function drawCards(mode) {
      currentMode = mode;

      const count = mode === "one" ? 1 : 3;
      const pickedCards = shuffleDeck(tarotDeck)
        .slice(0, count)
        .map(card => ({
          ...card,
          reversed: Math.random() < 0.35
        }));

      cardsContainer.innerHTML = "";
      finalReading.classList.remove("show");
      actionRow.classList.remove("hidden");

      cardsContainer.className = mode === "one" ? "cards one" : "cards";

      spreadTitle.classList.remove("hidden");
      spreadTitle.textContent = mode === "one"
        ? "1장 뽑기"
        : "3카드 스프레드";

      pickedCards.forEach((card, index) => {
        const cardBlock = createCardElement(card, roles[mode][index], index);
        cardsContainer.appendChild(cardBlock);
      });

      setTimeout(() => {
        document.querySelectorAll(".tarot-card").forEach((card, index) => {
          setTimeout(() => {
            card.classList.add("flipped");
          }, index * 260);
        });
      }, 180);

      setTimeout(() => {
        showFinalReading(pickedCards, mode);
      }, count * 370 + 500);
    }

    function createCardElement(card, role, index) {
      const wrap = document.createElement("article");
      wrap.className = "card-block";

      const reversedText = card.reversed ? "역방향" : "정방향";
      const reversedClass = card.reversed ? "is-reversed" : "";

      const meaning = card.reversed
        ? `${card.meaning} ${reversedAddons[index % reversedAddons.length]}`
        : card.meaning;

      wrap.innerHTML = `
        <div class="card-wrap">
          <div class="tarot-card ${reversedClass}">
            <div class="card-face card-back"></div>

            <div class="card-face card-front">
              <div class="card-role">${role}</div>
              ${card.reversed ? `<div class="reverse-mark">역방향</div>` : ""}
              <img
                class="card-img"
                src="${card.image}"
                alt="${card.ko}"
                loading="lazy"
                onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(180deg,#f5dfb4,#c89d56)'; this.parentElement.innerHTML += '<div style=&quot;color:#2a1b12;font-weight:900;text-align:center;padding:40px 16px;margin:auto;&quot;>${card.ko}<br><small>이미지 로딩 실패</small></div>';"
              />
            </div>
          </div>
        </div>

        <div class="result" id="result-${index}">
          <h3>${role} · ${card.ko} <span style="opacity:.62;font-size:13px;">${reversedText}</span></h3>
          <div class="keyword">${card.keyword}</div>
          <p>${meaning}</p>
        </div>
      `;

      setTimeout(() => {
        const result = wrap.querySelector(".result");
        result.classList.add("show");
      }, 900 + index * 300);

      return wrap;
    }

    function showFinalReading(cards, mode) {
      const question = questionInput.value.trim();

      const intro = question
        ? `질문 "${question}"에 대한 흐름을 보면, `
        : "이번 카드 흐름을 보면, ";

      let text = "";

      if (mode === "one") {
        const card = cards[0];
        const direction = card.reversed ? "역방향" : "정방향";

        text = `${intro}${card.ko} ${direction} 카드가 나왔습니다. 핵심 키워드는 "${card.keyword}"입니다. ${card.reversed ? "지금은 이 카드의 에너지가 자연스럽게 흐르기보다 조금 막히거나 뒤틀린 상태로 볼 수 있어요. " : ""}${card.meaning} 오늘은 이 메시지를 기준으로, 당장 크게 결론 내리기보다 지금 가장 신경 쓰이는 지점을 하나만 정리해보는 게 좋습니다.`;
      }

      if (mode === "three") {
        const [past, present, future] = cards;

        text = `${intro}과거/원인에는 ${past.ko}${past.reversed ? " 역방향" : " 정방향"}이 나와 "${past.keyword}" 흐름이 깔려 있었고, 현재/상황에는 ${present.ko}${present.reversed ? " 역방향" : " 정방향"}의 "${present.keyword}" 기운이 중심에 있습니다. 미래/조언은 ${future.ko}${future.reversed ? " 역방향" : " 정방향"}으로, "${future.keyword}"가 핵심입니다. 전체적으로 보면 과거의 패턴을 그대로 반복하기보다, 현재 카드가 보여주는 핵심 문제를 먼저 인정하고 미래 카드의 조언처럼 움직이는 것이 좋습니다.`;
      }

      finalText.textContent = text;
      finalReading.classList.add("show");
    }

    oneCardBtn.addEventListener("click", () => drawCards("one"));
    threeCardBtn.addEventListener("click", () => drawCards("three"));

    drawAgainBtn.addEventListener("click", () => {
      drawCards(currentMode);
    });

    clearBtn.addEventListener("click", () => {
      questionInput.value = "";
      questionInput.focus();
    });

    console.log(`Loaded tarot deck: ${tarotDeck.length} cards`);
  </script>
