</button>

<button class="btn ghost" id="aswap">
  계정이 없으신가요? 가입하기
</button>

${backupBlockHTML(true)}
</div>`;

  return `<div class="card" style="margin-top:0">
    <h3>계정</h3>
    <div class="kv">
     <span class="k">이메일</span>
     <span>${esc(state.user?.email ?? '')}</span>
    </div>
    <div class="kv"><span class="k">기록</span><span>${Object.keys(state.entries).length}일</span></div>
    <div class="kv"><span class="k">동기화</span><span>${state.sync==='error'?'<span style="color:var(--alert)">실패 — 다시 시도해주세요</span>':'서버에 저장됨 (v'+state.rev+')'}</span></div>
    <button class="btn ghost" id="alo">로그아웃</button>
  </div>
  ${backupBlockHTML(false)}
  <div class="card">
    <h3>비밀번호 변경</h3>
    <div><label class="fl">현재 비밀번호</label><input id="pc" type="password" autocomplete="current-password"></div>
    <div style="margin-top:10px"><label class="fl">새 비밀번호</label><input id="pn" type="password" autocomplete="new-password" placeholder="8자 이상"></div>
    <div id="perr" class="err"></div>
    <button class="btn ghost" id="pgo">변경하기</button>
    <div class="note" style="margin-top:12px">변경하면 다른 기기의 로그인이 모두 해제됩니다.</div>
  </div>
  <div class="card danger">
    <h3>계정 삭제</h3>
    <p class="lead">기록이 모두 지워지며 되돌릴 수 없습니다. 먼저 백업을 받아두세요.</p>
    <div style="margin-top:12px"><label class="fl">비밀번호 확인</label><input id="dp" type="password"></div>
    <div id="derr" class="err"></div>
    <button class="btn ghost danger-btn" id="dgo">계정 영구 삭제</button>
  </div>`;
}

function backupBlockHTML(localOnly) {
  return `<div class="card"><h3>백업</h3>
    <p class="lead">기록을 파일로 내려받아 보관하거나, 백업 파일에서 되살릴 수 있습니다.</p>
    <div class="bk">
      <button class="btn ghost" id="bkOut">백업 파일 내려받기</button>
      <button class="btn ghost" id="bkIn">백업 파일에서 복원</button>
    </div>
    <input type="file" id="bkFile" accept="application/json,.json" hidden>
    <div id="bkMsg" class="err"></div>
    <div class="note" style="margin-top:12px">복원하면 <b>같은 날짜</b>의 기록은 백업본이 아니라 현재 기록을 남깁니다(병합).
    ${localOnly?'':'복원 결과는 서버에도 반영됩니다.'}</div>
  </div>`;
}

const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---------- 백업 ----------
function exportBackup() {
  const dump = {
    format: 'manseryeok-diary/v1',
    exported: new Date().toISOString(),
    username: state.user?.email ?? null,
    rev: state.rev,
    data: { natal: state.natal, entries: state.entries },
  };
  const blob = new Blob([JSON.stringify(dump, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `manseryeok-backup-${isoKST(new Date())}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

async function importBackup(file, msgEl) {
  const show = (t, bad=true) => { msgEl.textContent = t; msgEl.className = 'err' + (bad?'':' ok'); };
  try {
    const dump = JSON.parse(await file.text());
    if (dump.format !== 'manseryeok-diary/v1') return show('이 앱의 백업 파일이 아닙니다.');
    const d = dump.data || {};
    if (typeof d.entries !== 'object' || d.entries === null) return show('백업 파일이 손상되었습니다.');

    // 병합: 같은 날짜는 현재 기록을 우선한다 (복원이 최근 기록을 덮지 않도록)
    const before = Object.keys(state.entries).length;
    state.entries = { ...d.entries, ...state.entries };
    state.natal = state.natal || d.natal || null;
    const added = Object.keys(state.entries).length - before;

    recomputeWarn();
    if (state.user) await pushNow();
    show(`복원 완료 — ${added}일 추가 (전체 ${Object.keys(state.entries).length}일)`, false);
    setTimeout(render, 900);
  } catch {
    show('파일을 읽을 수 없습니다.');
  }
}

// ---------- 뷰: 주의 날짜 ----------
function viewWarn() {
  if (!state.natal) return `<div class="empty"><div class="ic">命</div>
    <p>먼저 <b>내 명식</b>에서 사주를 입력해주세요.<br>기록을 명식과 대조해야 분석할 수 있습니다.</p></div>`;

  const list = Object.entries(state.entries)
    .filter(([,v]) => moodList(v).length || v.body)
    .map(([k,v]) => ({ date:k, mood:v.mood, body:v.body }));

  if (list.length < 10) return `<div class="empty"><div class="ic">數</div>
    <p>기록 <b>${list.length}일</b> / 최소 10일 필요<br>
    <span style="font-size:11.5px">패턴을 신뢰하려면 표본이 쌓여야 합니다.<br>
    월별 만세력에서 기분·몸상태를 기록해주세요.</span></p></div>`;

  const nat = natalObj();
  const st = buildStats(nat, list, { minSamples:3 });
  const fc = forecast(nat, list, { days:180, from:new Date(), minSamples:3 });
  const risky = fc.riskTags.slice().sort((a,b)=>a.delta-b.delta);

  if (!fc.days.length) return `<div class="empty"><div class="ic">靜</div>
    <p>아직 뚜렷한 위험 패턴이 없습니다.<br>
    <span style="font-size:11.5px">기록 ${list.length}일 · 베이스라인 ${st.baseline.toFixed(2)}<br>
    반복되는 구조가 나타나면 여기에 표시됩니다.</span></p></div>`;

  const seen = new Set(); const uniq = [];
  for (const d of fc.days) { if (seen.has(d.date)) continue; seen.add(d.date); uniq.push(d); }

  return `
  <div class="card" style="margin-top:0"><h3>분석 요약</h3>
    <div class="kv"><span class="k">기록 일수</span><span>${list.length}일</span></div>
    <div class="kv"><span class="k">평소 컨디션 (베이스라인)</span><span>${st.baseline.toFixed(2)}</span></div>
    <div class="kv"><span class="k">발견된 위험 구조</span><span>${risky.length}개</span></div>
    <div class="kv"><span class="k">향후 180일 주의일</span><span>${uniq.length}일</span></div>
  </div>
  <div class="card"><h3>반복 확인된 구조</h3>
    ${risky.slice(0,8).map(s=>`<div class="stat-row">
      <span>${s.tag}${s.aliases&&s.aliases.length?`<span style="color:var(--mute);font-size:10px;margin-left:6px">= ${s.aliases.join(' · ')}</span>`:''}</span>
      <span class="n">${s.n}회 · ${s.level}</span>
      <span class="delta neg">${s.delta.toFixed(2)}</span>
    </div>`).join('')}
  </div>
  <div style="margin-top:18px">
  ${uniq.slice(0,14).map(d=>{
    const dd = Math.ceil((new Date(d.date+'T12:00') - new Date())/86400000);
    return `<div class="warn-i">
      <div class="top">
        <div><span class="dt">${d.date}</span><span class="gz"><span class="e-${elemOfStem(d.ganji[0])}">${H(d.ganji[0])}</span><span class="e-${elemOfBranch(d.ganji[1])}">${H(d.ganji[1])}</span></span>
        <span style="color:var(--mute);font-size:11px;margin-left:6px">D-${dd}</span></div>
        <span class="cf">신뢰도 ${d.level} ${(d.confidence*100).toFixed(0)}%</span>
      </div>
      <div class="bar"><i style="width:${Math.min(100,Math.abs(d.predicted)/3*100)}%"></i></div>
      <div class="day-tags">${d.reasons.map(r=>`<span class="tag bad">${r.tag} <span style="color:var(--mute)">n=${r.n}</span></span>`).join('')}</div>
    </div>`;
  }).join('')}
  </div>
  <div class="note"><b>읽는 법.</b> 이 목록은 예언이 아니라 당신의 기록에서 반복된 패턴입니다.
  신뢰도는 표본 수와 효과 크기로 계산되며, 어떤 경우에도 90%를 넘기지 않습니다.<br><br>
  주의일을 미리 알면 그날 실제로 나쁘게 기록할 확률이 올라갑니다(확증편향).
  판단이 흔들린다고 느끼면 그날도 평소처럼 기록하세요. 데이터가 스스로를 교정합니다.</div>`;
}

function recomputeWarn() {
  state.warnSet = new Set();
  if (!state.natal) return;
  const list = Object.entries(state.entries).filter(([,v])=>moodList(v).length||v.body).map(([k,v])=>({date:k,...v}));
  if (list.length < 10) return;
  try {
    const fc = forecast(natalObj(), list, { days:365, from:new Date() });
    for (const d of fc.days) if (d.confidence >= 0.35) state.warnSet.add(d.date);
  } catch(e) {}
}

// ---------- 라우팅 ----------
const TABS = [
  { id:'today', gz:'今', name:'오늘의 만세력' },
  { id:'cal',   gz:'月', name:'월별 만세력 보기' },
  { id:'natal', gz:'命', name:'내 명식' },
  { id:'warn',  gz:'警', name:'주의 날짜' },
  { id:'acct',  gz:'戶', name:'계정 · 백업' },
];

function render() {
  $('#nav').innerHTML = TABS.map(t=>`<div class="nav-i ${state.tab===t.id?'on':''}" data-t="${t.id}">
    <span class="gz">${t.gz}</span>${t.name}</div>`).join('');
  $('#ttl').innerHTML = TABS.find(t=>t.id===state.tab).name + syncHTML();
  const v = $('#view');
  v.innerHTML = state.tab==='today' ? viewToday()
    : state.tab==='cal' ? viewCalendar()
    : state.tab==='natal' ? viewNatal()
    : state.tab==='acct' ? viewAccount()
    : viewWarn();

  $('#nav').onclick = e => { const t=e.target.closest('.nav-i'); if(!t)return;
    state.tab=t.dataset.t; closeNav(); render(); };

  if (state.tab==='cal') {
    $('#pm').onclick = ()=>{ state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()-1,1); render(); };
    $('#nm').onclick = ()=>{ state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()+1,1); render(); };
    $('#sy').onchange = e => { state.cal=new Date(+e.target.value, state.cal.getMonth(), 1); render(); };
    $('#sm').onchange = e => { state.cal=new Date(state.cal.getFullYear(), +e.target.value, 1); render(); };
    if ($('#tdy')) $('#tdy').onclick = ()=>{ const n=nowKST(); state.cal=new Date(n.y,n.m,1); render(); };
    const si=$('#segI'), sp=$('#segPop');
    if (si) si.onclick = e => { e.stopPropagation();
      const open = sp.hasAttribute('hidden');
      sp.toggleAttribute('hidden', !open);
      si.setAttribute('aria-expanded', open);
      si.classList.toggle('on', open);
    };
    document.addEventListener('click', e => {
      if (sp && !sp.hasAttribute('hidden') && !sp.contains(e.target) && e.target !== si) {
        sp.setAttribute('hidden',''); si?.classList.remove('on'); si?.setAttribute('aria-expanded','false');
      }
    }, { once: true });
    $('#grid').onclick = e => { const c=e.target.closest('.cell'); if(!c||c.classList.contains('pad'))return;
      openSheet(c.dataset.d); };
  }
  if (state.tab==='natal') {
    if ($('#mk')) $('#mk').onclick = () => {
      const y=+$('#iy').value, m=+$('#im').value, d=+$('#id').value;
      const hv=$('#ih').value, h = hv===''?null:+hv, mi=+($('#imi').value||0);
      if(!y||!m||!d){alert('생년월일을 입력해주세요');return;}
      state.natal={y,m,d,h,mi,gender:$('#ig').value}; recomputeWarn(); queueSave(); render();
    };
    if ($('#reset')) $('#reset').onclick = ()=>{ state.natal=null; state.warnSet=new Set(); queueSave(); render(); };
  }
  if (state.tab==='acct') bindAccount();
}

// ---------- 계정 핸들러 ----------
function bindAccount() {
  const bkOut = $('#bkOut'), bkIn = $('#bkIn'), bkFile = $('#bkFile');
  if (bkOut) bkOut.onclick = exportBackup;
  if (bkIn)  bkIn.onclick  = () => bkFile.click();
  if (bkFile) bkFile.onchange = e => { const f=e.target.files[0]; if(f) importBackup(f, $('#bkMsg')); e.target.value=''; };

  if ($('#googleLogin')) {
    $('#googleLogin').onclick = loginWithGoogle;
  }

  let mode = 'login';
  const err = (el, t) => { const e=$(el); if(e){ e.textContent=t; e.className='err'; } };

  if ($('#aswap')) $('#aswap').onclick = () => {
    mode = mode==='login' ? 'signup' : 'login';
    $('#authTtl').textContent = mode==='login' ? '로그인' : '가입하기';
    $('#ago').textContent     = mode==='login' ? '로그인' : '가입하고 시작하기';
    $('#aswap').textContent   = mode==='login' ? '계정이 없으신가요? 가입하기' : '이미 계정이 있으신가요? 로그인';
    $('#ap').setAttribute('autocomplete', mode==='login'?'current-password':'new-password');
    err('#aerr','');
  };

  if ($('#ago')) $('#ago').onclick = async () => {
    const u = $('#au').value.trim(), p = $('#ap').value;
    if (!u || !p) return err('#aerr','이메일과 비밀번호를 입력해주세요.');
    $('#ago').disabled = true;
    try {
      await (mode==='login' ? API.login(u,p) : API.signup(u,p));
      // 가입 시 이메일 인증이 필요하면 세션이 없을 수 있다
      const me = await API.me();
      if (!me.user) {
        err('#aerr','가입 확인 메일을 보냈습니다. 메일함을 확인해주세요.');
        $('#ago').disabled = false;
        return;
      }
      state.user = me.user; state.rev = me.rev ?? 0;
      const sd = me.data || { natal:null, entries:{} };
      // 로그인 전 로컬에 쓴 기록이 있으면 서버 기록과 합친다
      const localCount = Object.keys(state.entries).length;
      state.entries = { ...(sd.entries||{}), ...state.entries };
      state.natal = state.natal || sd.natal || null;
      state.sync = 'idle';
      recomputeWarn();
      if (localCount) await pushNow();
      render();
    } catch (e) {
      err('#aerr', e.message);
      $('#ago').disabled = false;
    }
  };

  if ($('#alo')) $('#alo').onclick = async () => {
    try { await API.logout(); } catch {}
    state.user=null; state.rev=0; state.sync='off';
    state.entries={}; state.natal=null; state.warnSet=new Set();
    render();
  };

  if ($('#pgo')) $('#pgo').onclick = async () => {
    const c=$('#pc').value, n=$('#pn').value;
    if(!c||!n) return err('#perr','두 칸 모두 입력해주세요.');
    $('#pgo').disabled=true;
    try { await API.passwd(c,n); const e=$('#perr'); e.textContent='비밀번호를 변경했습니다.'; e.className='err ok';
      $('#pc').value=''; $('#pn').value=''; }
    catch(e){ err('#perr', e.message); }
    $('#pgo').disabled=false;
  };

  if ($('#dgo')) $('#dgo').onclick = async () => {
    const p=$('#dp').value;
    if(!p) return err('#derr','비밀번호를 입력해주세요.');
    if(!confirm('정말 계정을 삭제할까요? 모든 기록이 사라지며 되돌릴 수 없습니다.')) return;
    try { await API.del(p); state.user=null; state.entries={}; state.natal=null; state.rev=0; state.sync='off'; state.tab='today'; render(); }
    catch(e){ err('#derr', e.message); }
  };
}

const openNav = ()=>{ $('#side').classList.add('on'); $('#scrim').classList.add('on'); };
const closeNav = ()=>{ $('#side').classList.remove('on'); $('#scrim').classList.remove('on'); };
$('#bg').onclick = openNav;
$('#scrim').onclick = closeNav;
$('#sbg').onclick = closeSheet;
$('#shX').onclick = closeSheet;

supabaseClient.auth.onAuthStateChange(async (event, session) => {
  try {
    if (session?.user) {
      const me = await API.me();

      state.user = me.user;
      state.rev = me.rev ?? 0;
      state.natal = me.data?.natal ?? null;
      state.entries = me.data?.entries ?? {};
      state.sync = 'idle';

      recomputeWarn();
    } else {
      state.user = null;
      state.rev = 0;
      state.sync = 'off';
    }

    render();
  } catch (error) {
    console.error('로그인 상태 반영 실패:', error);
  }
});


// ---------- 부팅 ----------
(async function boot() {
  try {
    const me = await API.me();

    state.user = me.user;
    state.rev = me.rev ?? 0;
    state.natal = me.data?.natal ?? null;
    state.entries = me.data?.entries ?? {};
    state.sync = me.user ? 'idle' : 'off';

    recomputeWarn();
  } catch (error) {
    console.error('Supabase 초기화 실패:', error);
    state.sync = 'error';
  }

  render();
})();

</script>
</body>
