<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>만세력 일기</title>
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="apple-touch-icon" href="./favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700&family=Gowun+Batang:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1114; --ink2:#161B21; --ink3:#1F262E;
  --line:#2C353F; --line2:#3A4552;
  --paper:#E8E2D4; --paper-dim:#A9A294; --mute:#6B7683;
  --mok:#4B9E7A; --hwa:#C4514B; --to:#B98A3E; --geum:#C9C6BE; --su:#4A6FA5;
  --alert:#C4514B; --ok:#4B9E7A;
  --r:3px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--ink);color:var(--paper);
  font-family:'Gowun Batang',serif;
  min-height:100vh;overflow-x:hidden;
}
#app{display:flex;min-height:100vh}

/* ---------- Sidebar ---------- */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
#scrim.on{opacity:1;pointer-events:auto}
aside{
  position:fixed;top:0;left:0;bottom:0;width:270px;background:var(--ink2);
  border-right:1px solid var(--line);z-index:50;
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;padding:22px 0;
}
aside.on{transform:none}
.brand{padding:0 22px 20px;border-bottom:1px solid var(--line)}
.brand h1{font-family:'Noto Serif KR',serif;font-weight:700;font-size:19px;letter-spacing:.14em}
.brand p{font-size:11px;color:var(--mute);margin-top:5px;letter-spacing:.08em}
nav{padding:14px 0;flex:1}
.nav-i{
  display:flex;align-items:center;gap:12px;padding:13px 22px;cursor:pointer;
  border-left:2px solid transparent;color:var(--paper-dim);font-size:14px;transition:.15s;
}
.nav-i:hover{background:var(--ink3);color:var(--paper)}
.nav-i.on{border-left-color:var(--to);color:var(--paper);background:var(--ink3)}
.nav-i .gz{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--to);width:18px;text-align:center}
.nav-i.on .gz{color:var(--to)}
.nav-note{padding:14px 22px;border-top:1px solid var(--line);font-size:10.5px;color:var(--mute);line-height:1.7}

/* ---------- Main ---------- */
main{flex:1;min-width:0;padding:0 0 60px}
header{
  position:sticky;top:0;z-index:30;background:rgba(14,17,20,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:14px 20px;
}
.burger{width:24px;height:16px;position:relative;cursor:pointer;flex:none}
.burger i{position:absolute;left:0;right:0;height:1.5px;background:var(--paper);transition:.25s}
.burger i:nth-child(1){top:0}.burger i:nth-child(2){top:7px}.burger i:nth-child(3){top:14px}
header h2{font-family:'Noto Serif KR',serif;font-weight:500;font-size:15px;letter-spacing:.1em}
.view{padding:26px 20px;max-width:940px;margin:0 auto;animation:fade .35s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* ---------- 명식판 (signature) ---------- */
.myeongsik{display:flex;gap:8px;justify-content:center;margin:0 auto}
.pillar{flex:1;max-width:112px;min-width:0}
.pillar-cap{
  text-align:center;font-size:10.5px;color:var(--mute);letter-spacing:.22em;
  padding-bottom:9px;border-bottom:1px solid var(--line);margin-bottom:10px;
}
.gzbox{
  border:1px solid var(--line);border-radius:var(--r);background:var(--ink2);
  padding:14px 6px;text-align:center;position:relative;overflow:hidden;
}
.gzbox+.gzbox{margin-top:6px}
.gzbox .ch{
  font-family:'Noto Serif KR',serif;font-weight:700;
  font-size:clamp(30px,8.4vw,42px);line-height:1.05;display:block;
}
.gzbox .ko{font-size:10.5px;color:var(--paper-dim);margin-top:5px;letter-spacing:.1em}
.gzbox .tg{font-size:9.5px;color:var(--mute);margin-top:2px}
.e-목{color:var(--mok)}.e-화{color:var(--hwa)}.e-토{color:var(--to)}
.e-금{color:var(--geum)}.e-수{color:var(--su)}
.b-목{border-color:rgba(75,158,122,.4)}.b-화{border-color:rgba(196,81,75,.4)}
.b-토{border-color:rgba(185,138,62,.4)}.b-금{border-color:rgba(201,198,190,.32)}
.b-수{border-color:rgba(74,111,165,.4)}
.hidden-row{
  margin-top:6px;border:1px solid var(--line);border-radius:var(--r);
  background:var(--ink2);padding:9px 5px;text-align:center;
}
.hidden-row .lbl{font-size:9px;color:var(--mute);letter-spacing:.14em;margin-bottom:5px}
.hidden-row .hg{font-family:'Noto Serif KR',serif;font-size:13px;line-height:1.6}
.hidden-row .hg small{font-size:8.5px;color:var(--mute);margin-left:1px}

/* ---------- 오늘 ---------- */
.today-date{text-align:center;margin-bottom:22px}
.today-date .d{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mute);letter-spacing:.16em}
.today-date .big{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:500;margin-top:7px;letter-spacing:.05em}
.term-strip{
  display:flex;justify-content:center;gap:8px;margin-top:12px;font-size:10.5px;color:var(--mute);
  font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;flex-wrap:wrap;
}
.term-strip b{color:var(--to);font-weight:500}

/* ---------- 캘린더 ---------- */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav button{
  background:var(--ink2);border:1px solid var(--line);color:var(--paper);
  width:34px;height:34px;border-radius:var(--r);cursor:pointer;font-size:15px;
}
.cal-nav button:hover{border-color:var(--line2)}
.cal-nav .t{font-family:'Noto Serif KR',serif;font-size:16px;letter-spacing:.08em;
  display:flex;flex-direction:column;align-items:center;gap:3px}
.cal-nav .t small{color:var(--to);font-size:11.5px;letter-spacing:.14em}
.picks{display:flex;align-items:center;gap:6px}
.pick{position:relative}
.pick select{
  appearance:none;-webkit-appearance:none;
  background:transparent;border:1px solid transparent;border-radius:var(--r);
  color:var(--paper);font-family:'Noto Serif KR',serif;font-size:16px;
  letter-spacing:.06em;padding:3px 19px 3px 7px;cursor:pointer;
  transition:.14s;text-align:center;
}
.pick select:hover{border-color:var(--line2);background:var(--ink2)}
.pick select:focus{outline:none;border-color:var(--to);background:var(--ink2)}
.pick::after{
  content:'';position:absolute;right:7px;top:50%;margin-top:-1.5px;
  width:5px;height:5px;border-right:1.5px solid var(--mute);border-bottom:1.5px solid var(--mute);
  transform:rotate(45deg) translateY(-2px);pointer-events:none;
}
.pick select option{background:var(--ink2);color:var(--paper);font-size:14px}
.gzline{display:flex;align-items:center;gap:6px;justify-content:center}
.info{
  width:15px;height:15px;border-radius:50%;border:1px solid var(--line2);
  background:none;color:var(--mute);font-family:'IBM Plex Mono',monospace;
  font-size:9px;line-height:1;cursor:pointer;padding:0;transition:.14s;
  display:inline-flex;align-items:center;justify-content:center;flex:none;
}
.info:hover,.info.on{border-color:var(--to);color:var(--to)}
.info:focus-visible{outline:2px solid var(--to);outline-offset:2px}
.pop{
  max-width:400px;margin:10px auto 16px;background:var(--ink2);
  border:1px solid var(--line2);border-radius:var(--r);padding:14px;
  animation:pop .18s ease-out;
}
@keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.pop-hd{font-size:10px;color:var(--mute);letter-spacing:.16em;margin-bottom:11px}
.seg{padding:9px 0;border-bottom:1px solid var(--line)}
.seg:last-of-type{border:none}
.seg-gz{font-family:'Noto Serif KR',serif;font-size:17px;letter-spacing:.04em;display:flex;align-items:baseline;gap:8px}
.seg-ko{font-size:11px;color:var(--paper-dim);letter-spacing:.06em}
.seg-range{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--paper);margin-top:5px;letter-spacing:.02em}
.seg-term{font-size:10.5px;color:var(--to);margin-top:3px;letter-spacing:.03em}
.pop-note{font-size:10px;color:var(--mute);line-height:1.75;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)}
.jump{display:flex;justify-content:center;margin:-6px 0 14px}
.jump button{
  background:none;border:1px solid var(--line);color:var(--mute);
  border-radius:var(--r);padding:5px 13px;font-family:'Gowun Batang',serif;
  font-size:11px;letter-spacing:.1em;cursor:pointer;transition:.14s;
}
.jump button:hover{border-color:var(--to);color:var(--to)}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px}
.dow div{text-align:center;font-size:10px;color:var(--mute);letter-spacing:.1em;padding:5px 0}
.dow div:first-child{color:var(--hwa)}.dow div:last-child{color:var(--su)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{
  aspect-ratio:1/1.16;border:1px solid var(--line);border-radius:var(--r);
  background:var(--ink2);padding:5px 3px 3px;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;transition:.12s;
}
.cell:hover{border-color:var(--line2);background:var(--ink3)}
.cell.pad{opacity:.22;pointer-events:none}
.cell.today{border-color:var(--to);box-shadow:0 0 0 1px rgba(185,138,62,.28)}
.cell.sel{background:var(--ink3);border-color:var(--paper-dim)}
.cell .n{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--paper-dim);line-height:1}
.cell .gz{font-family:'Noto Serif KR',serif;font-size:13px;margin-top:3px;font-weight:500;line-height:1.15}
.cell .dots{position:absolute;bottom:4px;display:flex;gap:2.5px}
.cell .dot{width:4px;height:4px;border-radius:50%}
.cell .term{
  position:absolute;top:3px;right:3px;font-size:7.5px;color:var(--to);
  letter-spacing:.02em;
}
.cell.warn::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--alert);
  border-radius:var(--r) var(--r) 0 0;
}

/* ---------- 기록 패널 ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:60;opacity:0;pointer-events:none;transition:.25s}
.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--ink2);
  border-top:1px solid var(--line2);border-radius:12px 12px 0 0;
  max-height:88vh;overflow-y:auto;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);padding:0 0 30px;
}
.sheet.on{transform:none}
.sheet-hd{
  position:sticky;top:0;background:var(--ink2);padding:16px 20px 13px;
  border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
}
.sheet-hd .dt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mute);letter-spacing:.1em}
.sheet-hd .gz{font-family:'Noto Serif KR',serif;font-size:17px;margin-top:4px;letter-spacing:.08em}
.sheet-hd button{background:none;border:none;color:var(--mute);font-size:22px;cursor:pointer;line-height:1}
.sheet-body{padding:20px}
.grab{width:34px;height:3px;background:var(--line2);border-radius:2px;margin:8px auto 0}
.f-lbl{font-size:11px;color:var(--mute);letter-spacing:.16em;margin:22px 0 11px}
.f-lbl:first-child{margin-top:0}
.moods{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.mood{
  border:1px solid var(--line);background:var(--ink3);border-radius:var(--r);
  padding:12px 4px;text-align:center;cursor:pointer;transition:.14s;position:relative;
}
.mood:hover{border-color:var(--line2)}
.mood.on{border-color:var(--to);background:rgba(185,138,62,.11)}
.mood:focus-visible{outline:2px solid var(--to);outline-offset:2px}
.mood::after{
  content:'';position:absolute;top:5px;right:5px;width:11px;height:11px;
  border:1px solid var(--line2);border-radius:2px;opacity:0;transition:.14s;
}
.mood.on::after{
  opacity:1;border-color:var(--to);background:var(--to);
  background-image:linear-gradient(45deg,transparent 46%,var(--ink) 46%,var(--ink) 54%,transparent 54%),
    linear-gradient(-45deg,transparent 46%,var(--ink) 46%,var(--ink) 54%,transparent 54%);
}
.mood:hover::after{opacity:1}
.hint{color:var(--mute);font-size:10px;letter-spacing:.02em;margin-left:6px}
.mood .em{font-size:23px;display:block;line-height:1}
.mood .nm{font-size:10px;color:var(--paper-dim);margin-top:6px;display:block}
.mood.on .nm{color:var(--paper)}
.bodies{display:flex;gap:7px}
.bd{
  flex:1;border:1px solid var(--line);background:var(--ink3);border-radius:var(--r);
  padding:13px 0;text-align:center;cursor:pointer;font-family:'IBM Plex Mono',monospace;
  font-size:16px;color:var(--paper-dim);transition:.14s;
}
.bd:hover{border-color:var(--line2)}
.bd.on{border-color:var(--to);background:rgba(185,138,62,.11);color:var(--paper)}
.bd small{display:block;font-size:8.5px;color:var(--mute);margin-top:4px;font-family:'Gowun Batang',serif}
textarea{
  width:100%;background:var(--ink3);border:1px solid var(--line);border-radius:var(--r);
  color:var(--paper);padding:12px;font-family:'Gowun Batang',serif;font-size:14px;
  resize:vertical;min-height:92px;line-height:1.65;
}
textarea:focus{outline:none;border-color:var(--line2)}
.btn{
  width:100%;background:var(--paper);color:var(--ink);border:none;border-radius:var(--r);
  padding:14px;font-family:'Noto Serif KR',serif;font-weight:500;font-size:14px;
  cursor:pointer;margin-top:22px;letter-spacing:.1em;
}
.btn:hover{opacity:.9}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--paper-dim);margin-top:8px}
.day-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.tag{
  font-size:10px;padding:4px 8px;border-radius:2px;background:var(--ink3);
  border:1px solid var(--line);color:var(--paper-dim);letter-spacing:.04em;
}
.tag.bad{border-color:rgba(196,81,75,.5);color:#E0938E}
.tag.good{border-color:rgba(75,158,122,.5);color:#7FC4A4}

/* ---------- 입력 폼 ---------- */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
input,select{
  width:100%;background:var(--ink3);border:1px solid var(--line);border-radius:var(--r);
  color:var(--paper);padding:11px;font-family:'IBM Plex Mono',monospace;font-size:13px;
}
input:focus,select:focus{outline:none;border-color:var(--line2)}
label.fl{display:block;font-size:10.5px;color:var(--mute);margin-bottom:5px;letter-spacing:.1em}

/* ---------- 카드/표 ---------- */
.card{border:1px solid var(--line);border-radius:var(--r);background:var(--ink2);padding:16px;margin-top:14px}
.card h3{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:500;letter-spacing:.14em;margin-bottom:12px;color:var(--paper-dim)}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.kv:last-child{border:none}
.kv .k{color:var(--mute);font-size:12px}
.luck{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px}
.luck-i{
  flex:none;width:56px;border:1px solid var(--line);border-radius:var(--r);
  background:var(--ink3);padding:9px 3px;text-align:center;
}
.luck-i.now{border-color:var(--to);background:rgba(185,138,62,.1)}
.luck-i .age{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mute)}
.luck-i .g{font-family:'Noto Serif KR',serif;font-size:15px;margin-top:4px;line-height:1.2}
.empty{text-align:center;padding:56px 20px;color:var(--mute)}
.empty .ic{font-size:34px;opacity:.3;margin-bottom:14px;font-family:'Noto Serif KR',serif}
.empty p{font-size:13px;line-height:1.9}
.warn-i{
  border:1px solid var(--line);border-left:2px solid var(--alert);border-radius:var(--r);
  background:var(--ink2);padding:14px;margin-bottom:9px;
}
.warn-i .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.warn-i .dt{font-family:'IBM Plex Mono',monospace;font-size:12.5px}
.warn-i .gz{font-family:'Noto Serif KR',serif;font-size:15px;margin-left:8px}
.warn-i .cf{font-size:10px;color:var(--mute);letter-spacing:.06em}
.bar{height:2px;background:var(--ink3);border-radius:1px;overflow:hidden;margin:9px 0 8px}
.bar i{display:block;height:100%;background:var(--alert)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.stat-row:last-child{border:none}
.stat-row .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute)}
.delta{font-family:'IBM Plex Mono',monospace;font-size:12px}
.delta.neg{color:#E0938E}.delta.pos{color:#7FC4A4}
.note{font-size:11px;color:var(--mute);line-height:1.85;margin-top:14px;padding:12px;background:var(--ink2);border-radius:var(--r);border:1px solid var(--line)}
.lead{font-size:12.5px;color:var(--paper-dim);line-height:1.8}
.err{font-size:11.5px;color:#E0938E;margin-top:10px;min-height:1px;line-height:1.6}
.err.ok{color:#7FC4A4}
.bk{display:flex;gap:8px;margin-top:14px}
.bk .btn{margin-top:0}
.card.danger{border-color:rgba(196,81,75,.3)}
.card.danger h3{color:#E0938E}
.danger-btn{border-color:rgba(196,81,75,.45);color:#E0938E}
.danger-btn:hover{background:rgba(196,81,75,.1)}
.sync{
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;
  color:var(--mute);margin-left:10px;font-weight:400;
}
.sync.saving{color:var(--to)}
.sync.saved{color:var(--ok)}
.sync.error{color:var(--alert)}
button:disabled{opacity:.5;cursor:default}

/* ---------- 용희신 (억부·조후·통관·병약) ---------- */
.ys-main{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:16px 0 4px}
.ys-box{border:1px solid var(--line);border-radius:var(--r);background:var(--ink3);padding:11px 4px;text-align:center}
.ys-box.good{border-color:rgba(75,158,122,.35)}
.ys-box.bad{border-color:rgba(196,81,75,.3)}
.ys-lbl{font-size:9.5px;color:var(--mute);letter-spacing:.16em;margin-bottom:6px}
.ys-el{font-family:'Noto Serif KR',serif;font-size:15px;letter-spacing:.08em}
.ys-why{
  font-size:12px;color:var(--paper-dim);line-height:1.8;margin-top:14px;
  padding:11px 12px;background:var(--ink3);border-radius:var(--r);border:1px solid var(--line);
}
.ys-why b{color:var(--to)}
.ys-conf{display:block;margin-top:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mute);letter-spacing:.06em}
.mth{border:1px solid var(--line);border-radius:var(--r);background:var(--ink2);padding:11px 12px;margin-bottom:6px}
.mth.primary{border-color:rgba(185,138,62,.45);background:rgba(185,138,62,.06)}
.mth.off{opacity:.5}
.mth-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.mth-nm{font-family:'Noto Serif KR',serif;font-size:12.5px;letter-spacing:.1em}
.mth-nm em{
  font-style:normal;font-size:9px;color:var(--to);border:1px solid rgba(185,138,62,.5);
  border-radius:2px;padding:1px 4px;margin-left:6px;letter-spacing:.08em;
}
.mth-w{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mute)}
.mth-y{font-size:12px;margin-bottom:4px;letter-spacing:.04em}
.mth-r{font-size:11px;color:var(--mute);line-height:1.7}
.hrs{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.hr{display:flex;align-items:center;gap:5px;background:var(--ink3);border:1px solid var(--line);border-radius:2px;padding:5px 6px}
.hr.on{border-color:var(--to);background:rgba(185,138,62,.12)}
.hr-b{font-family:'Noto Serif KR',serif;font-size:12px;flex:none}

<script>
// ===== src/engine/core.js =====
// ============================================================
// 만세력 코어 엔진
// ============================================================

const STEMS = ['갑','을','병','정','무','기','경','신','임','계'];
const BRANCHES = ['자','축','인','묘','진','사','오','미','신','유','술','해'];

const STEM_ELEM = ['목','목','화','화','토','토','금','금','수','수'];
const STEM_YIN  = [false,true,false,true,false,true,false,true,false,true];

const BRANCH_ELEM = ['수','토','목','목','토','화','화','토','금','금','토','수'];
const BRANCH_YIN  = [false,true,false,true,false,true,false,true,false,true,false,true];

// 지장간: [여기, 중기, 정기] — 일수 배분 포함
const HIDDEN = {
  '자': [['임',10],['계',20]],
  '축': [['계',9],['신',3],['기',18]],
  '인': [['무',7],['병',7],['갑',16]],
  '묘': [['갑',10],['을',20]],
  '진': [['을',9],['계',3],['무',18]],
  '사': [['무',7],['경',7],['병',16]],
  '오': [['병',10],['기',9],['정',11]],
  '미': [['정',9],['을',3],['기',18]],
  '신': [['무',7],['임',7],['경',16]],
  '유': [['경',10],['신',20]],
  '술': [['신',9],['정',3],['무',18]],
  '해': [['무',7],['갑',7],['임',16]],
};

// ---------- 오행 생극 ----------
const GEN = { '목':'화','화':'토','토':'금','금':'수','수':'목' };  // 생
const OVR = { '목':'토','토':'수','수':'화','화':'금','금':'목' };  // 극

const generates = (a,b) => GEN[a] === b;
const overcomes = (a,b) => OVR[a] === b;

// ---------- 십성 ----------
function tenGod(dayStem, targetStem) {
  const di = STEMS.indexOf(dayStem), ti = STEMS.indexOf(targetStem);
  if (di < 0 || ti < 0) return null;
  const de = STEM_ELEM[di], te = STEM_ELEM[ti];
  const same = STEM_YIN[di] === STEM_YIN[ti];

  if (de === te)            return same ? '비견' : '겁재';
  if (generates(de, te))    return same ? '식신' : '상관';
  if (overcomes(de, te))    return same ? '편재' : '정재';
  if (overcomes(te, de))    return same ? '편관' : '정관';
  if (generates(te, de))    return same ? '편인' : '정인';
  return null;
}

// 지지의 십성은 정기(마지막 지장간) 기준
function tenGodBranch(dayStem, branch) {
  const h = HIDDEN[branch];
  return tenGod(dayStem, h[h.length - 1][0]);
}

// ---------- 지지 관계 ----------
const bi = b => BRANCHES.indexOf(b);

const isChung   = (a,b) => (bi(a) - bi(b) + 12) % 12 === 6;           // 충
const isYukhap  = (a,b) => (bi(a) + bi(b)) % 12 === 1 && a !== b;      // 육합
const isWonjin  = (a,b) => WONJIN[a] === b;                            // 원진
const isHae     = (a,b) => HAE[a] === b;                               // 해
const isPa      = (a,b) => PA[a] === b;                                // 파

const pairMap = pairs => {
  const m = {};
  for (const [x,y] of pairs) { m[x]=y; m[y]=x; }
  return m;
};

const WONJIN = pairMap([['자','미'],['축','오'],['인','유'],['묘','신'],['진','해'],['사','술']]);
const HAE    = pairMap([['자','미'],['축','오'],['인','사'],['묘','진'],['신','해'],['유','술']]);
const PA     = pairMap([['자','유'],['축','진'],['인','해'],['묘','오'],['사','신'],['미','술']]);

// 형 (삼형 / 상형 / 자형)
const SAMHYUNG = [['인','사','신'], ['축','술','미']];
const SANGHYUNG = [['자','묘']];
const JAHYUNG = ['진','오','유','해'];

function isHyung(a, b) {
  if (a === b) return JAHYUNG.includes(a);
  for (const g of SAMHYUNG) if (g.includes(a) && g.includes(b)) return true;
  for (const g of SANGHYUNG) if (g.includes(a) && g.includes(b)) return true;
  return false;
}

// 삼합 / 방합
const SAMHAP = [
  { members:['신','자','진'], elem:'수' },
  { members:['해','묘','미'], elem:'목' },
  { members:['인','오','술'], elem:'화' },
  { members:['사','유','축'], elem:'금' },
];
const BANGHAP = [
  { members:['인','묘','진'], elem:'목' },
  { members:['사','오','미'], elem:'화' },
  { members:['신','유','술'], elem:'금' },
  { members:['해','자','축'], elem:'수' },
];

// ---------- 신살 ----------
// 천을귀인 (일간 기준)
const CHEONEUL = {
  '갑':['축','미'], '무':['축','미'], '경':['축','미'],
  '을':['자','신'], '기':['자','신'],
  '병':['해','유'], '정':['해','유'],
  '신':['인','오'],
  '임':['묘','사'], '계':['묘','사'],
};

// 도화(연살) / 역마 / 화개 — 삼합국 기준
const SAMHAP_GROUP = {
  '신':'수','자':'수','진':'수',
  '해':'목','묘':'목','미':'목',
  '인':'화','오':'화','술':'화',
  '사':'금','유':'금','축':'금',
};
const DOHWA = { '수':'유', '목':'자', '화':'묘', '금':'오' };
const YEOKMA = { '수':'인', '목':'사', '화':'신', '금':'해' };
const HWAGAE = { '수':'진', '목':'미', '화':'술', '금':'축' };

// 양인 (일간 기준)
const YANGIN = { '갑':'묘','병':'오','무':'오','경':'유','임':'자' };

// 백호대살
const BAEKHO = ['갑진','을미','병술','정축','무진','임술','계축'];
// 괴강
const GWEGANG = ['경진','경술','임진','임술','무술'];

function shinsal(dayStem, dayBranch, targetBranch, targetPillar) {
  const tags = [];
  if ((CHEONEUL[dayStem]||[]).includes(targetBranch)) tags.push('천을귀인');
  const g = SAMHAP_GROUP[dayBranch];
  if (DOHWA[g]  === targetBranch) tags.push('도화');
  if (YEOKMA[g] === targetBranch) tags.push('역마');
  if (HWAGAE[g] === targetBranch) tags.push('화개');
  if (YANGIN[dayStem] === targetBranch) tags.push('양인');
  if (targetPillar && BAEKHO.includes(targetPillar))  tags.push('백호');
  if (targetPillar && GWEGANG.includes(targetPillar)) tags.push('괴강');
  return tags;
}

// ---------- 60갑자 ----------
function ganjiFromIndex(i) {
  i = ((i % 60) + 60) % 60;
  return STEMS[i % 10] + BRANCHES[i % 12];
}

function ganjiIndex(gz) {
  const s = STEMS.indexOf(gz[0]), b = BRANCHES.indexOf(gz[1]);
  for (let i = 0; i < 60; i++) if (i % 10 === s && i % 12 === b) return i;
  return -1;
}

// ---------- 일주 계산 ----------
// 기준: 1900-01-01 = 갑술일 (index 10)
// 검증: 2026-07-16 → 신묘 (KASI/만세력 대조 확인)
const EPOCH = Date.UTC(1900, 0, 1);
const EPOCH_IDX = 10;

// 일주는 KST 기준 날짜로 판정한다. 기기 시간대에 따라 일진이 달라지면 안 된다.
const KST_MS = 9 * 3600000;
function dayGanji(date) {
  const k = new Date(date.getTime() + KST_MS);
  const utc = Date.UTC(k.getUTCFullYear(), k.getUTCMonth(), k.getUTCDate());
  const days = Math.round((utc - EPOCH) / 86400000);
  return ganjiFromIndex(EPOCH_IDX + days);
}

// ============================================================
// ---------- 시주 계산 ----------
//
// 한국 표준시(UTC+9)는 동경 135도 기준이지만 서울은 동경 약 127도다.
// 경도 1도당 태양시가 4분씩 늦으므로 (135-127)*4 ≈ 32분, 관례로 30분을 보정한다.
// 그래서 자시가 23:00이 아니라 23:30에 시작한다.
//
//   자시 23:30~01:29 / 축시 01:30~03:29 / 인시 03:30~05:29
//   묘시 05:30~07:29 / 진시 07:30~09:29 / 사시 09:30~11:29
//   오시 11:30~13:29 / 미시 13:30~15:29 / 신시 15:30~17:29
//   유시 17:30~19:29 / 술시 19:30~21:29 / 해시 21:30~23:29
// ============================================================

/** 시지별 시각 범위 (표시용) */
const HOUR_RANGES = [
  ['자','23:30','01:29'], ['축','01:30','03:29'], ['인','03:30','05:29'],
  ['묘','05:30','07:29'], ['진','07:30','09:29'], ['사','09:30','11:29'],
  ['오','11:30','13:29'], ['미','13:30','15:29'], ['신','15:30','17:29'],
  ['유','17:30','19:29'], ['술','19:30','21:29'], ['해','21:30','23:29'],
];

/**
 * 보정된 시각으로 시지 인덱스를 구한다.
 * @param lonCorrection 경도 보정(분). 서울 기준 30. 끄려면 0.
 */
function hourBranchIndex(hour, minute, lonCorrection) {
  const t = hour * 60 + minute - lonCorrection;
  const m = ((t % 1440) + 1440) % 1440;
  // 보정 후 기준으로는 23:00~00:59가 자시
  if (m >= 23 * 60 || m < 60) return 0;
  return Math.floor((m + 60) / 120) % 12;
}

/**
 * 시주 간지.
 * @param opts.lonCorrection 경도 보정(분). 기본 30 (서울).
 *        다른 지역은 (135 - 현지경도) * 4. 부산(129°)이면 24.
 * @param opts.nightJa 야자시 처리:
 *        'same'(기본) — 23:30 이후도 당일 일간 기준 (야자시설)
 *        'next'       — 다음날 일간 기준 (조자시설)
 */
function hourGanji(dayStemChar, hour, minute = 0, opts = {}) {
  const lon = (opts && opts.lonCorrection != null) ? opts.lonCorrection : 30;
  const bIdx = hourBranchIndex(hour, minute, lon);

  let stemBase = dayStemChar;
  if (opts && opts.nightJa === 'next' && bIdx === 0 &&
      (hour * 60 + minute - lon) >= 23 * 60) {
    const i = STEMS.indexOf(dayStemChar);
    stemBase = STEMS[(i + 1) % 10];
  }

  const dIdx = STEMS.indexOf(stemBase);
  const startStem = (dIdx % 5) * 2;
  return STEMS[(startStem + bIdx) % 10] + BRANCHES[bIdx];
}

/**
 * 일주 경계.
 * 사주의 하루는 자정이 아니라 자시에 시작한다.
 * 보정 시각 23:30 이후면 일주가 다음날로 넘어간다.
 */
function dayShiftForHour(hour, minute = 0, opts = {}) {
  const lon = (opts && opts.lonCorrection != null) ? opts.lonCorrection : 30;
  return (hour * 60 + minute - lon) >= 23 * 60 ? 1 : 0;
}

/** 시지 이름 (표시용) */
function hourBranchName(hour, minute = 0, opts = {}) {
  const lon = (opts && opts.lonCorrection != null) ? opts.lonCorrection : 30;
  return BRANCHES[hourBranchIndex(hour, minute, lon)];
}

// ---------- 연주 (입춘 기준) ----------
// 사주의 연주는 1월 1일이 아니라 입춘에 바뀐다.
// 예: 2000-01-01은 아직 기묘년, 2000-02-04(입춘) 이후부터 경진년.
// 1984 = 갑자년 (index 0)
function yearGanjiRaw(solarYear) {
  return ganjiFromIndex(solarYear - 1984);
}

// date 기준으로 입춘 경계를 반영한 연주.
// getIpchun(year) -> Date (해당 연도 입춘 시각). 절기 테이블 주입 필요.
function yearGanji(date, getIpchun) {
  if (typeof date === 'number') {
    // 레거시 호출(연도만) — 입춘 무시. 경고성 raw 반환.
    return yearGanjiRaw(date);
  }
  const y = new Date(date.getTime() + KST_MS).getUTCFullYear();
  const ipchun = getIpchun ? getIpchun(y) : new Date(y, 1, 4);
  return yearGanjiRaw(date < ipchun ? y - 1 : y);
}

// ---------- 월주 (절입 기준) ----------
// termIndex: 0=입춘(인월) … 11=소한(축월)
function monthGanji(yearStemChar, termIndex) {
  const bIdx = (termIndex + 2) % 12;  // 인 = 2
  const yi = STEMS.indexOf(yearStemChar);
  const startStem = ((yi % 5) * 2 + 2) % 10;  // 갑/기년 → 병인월
  return STEMS[(startStem + termIndex) % 10] + BRANCHES[bIdx];
}
// ===== src/engine/solarterm.js =====
// ============================================================
// 24절기 계산 (태양황경 기준)
// 사주 월주는 절입 시각에 바뀌므로 정밀 계산 필요.
// 정확도: 실제 절입 시각 대비 대략 ±2분 이내 (1900~2100)

const sumSeries = (terms, t) =>
  terms.reduce((s, [a, b, c]) => s + a * Math.cos(b + c * t), 0);

function earthRadiusVector(t) {
  return (sumSeries(R0_TERMS, t)
    + sumSeries(R1_TERMS, t) * t
    + sumSeries(R2_TERMS, t) * t * t) / 1e8;
}

function solarLongitude(jd) {
  const T = (jd - 2451545.0) / 36525;
  const t = T / 10;  // VSOP87은 천년 단위

  // 지구 황경 (라디안)
  const L = (sumSeries(L0_TERMS, t)
    + sumSeries(L1_TERMS, t) * t
    + sumSeries(L2_TERMS, t) * t * t
    + sumSeries(L3_TERMS, t) * t ** 3
    + sumSeries(L4_TERMS, t) * t ** 4) / 1e8;

  // 태양 황경 = 지구 황경 + 180°
  let lon = (L / RAD) + 180;

  // VSOP87 동역학 황도 → FK5 보정 (황경 상수항만; 위도항은 무시 가능)
  lon += -0.09033 / 3600;

  // 장동 (황경)
  const omega = 125.04452 - 1934.136261 * T;
  const Lsun = 280.4665 + 36000.7698 * T;
  const Lmoon = 218.3165 + 481267.8813 * T;
  const dPsi = (-17.20 * Math.sin(omega * RAD)
    - 1.32 * Math.sin(2 * Lsun * RAD)
    - 0.23 * Math.sin(2 * Lmoon * RAD)
    + 0.21 * Math.sin(2 * omega * RAD)) / 3600;
  lon += dPsi;

  // 광행차: 지구-태양 실제 거리(R)에 반비례. 상수로 두면 원일점/근일점에서
  // 최대 ±0.3" 오차 → 절입 시각 오차의 주원인이었음.
  const R = earthRadiusVector(t);
  lon -= (20.4898 / 3600) / R;

  return ((lon % 360) + 360) % 360;
}

// ---------- 지구 자전 지연(ΔT) 근사 ----------
// 태양황경은 TT 기준, 우리는 UT 필요 → ΔT 보정
function deltaT(year) {
  // Espenak & Meeus 다항식 (1900~2150 구간)
  let t;
  if (year >= 2005 && year < 2050) { t = year - 2000; return 62.92 + 0.32217*t + 0.005589*t*t; }
  if (year >= 1900 && year < 1920) { t = year - 1900; return -2.79 + 1.494119*t - 0.0598939*t*t + 0.0061966*t*t*t - 0.000197*t*t*t*t; }
  if (year >= 1920 && year < 1941) { t = year - 1920; return 21.20 + 0.84493*t - 0.076100*t*t + 0.0020936*t*t*t; }
  if (year >= 1941 && year < 1961) { t = year - 1950; return 29.07 + 0.407*t - t*t/233 + t*t*t/2547; }
  if (year >= 1961 && year < 1986) { t = year - 1975; return 45.45 + 1.067*t - t*t/260 - t*t*t/718; }
  if (year >= 1986 && year < 2005) { t = year - 2000; return 63.86 + 0.3345*t - 0.060374*t*t + 0.0017275*t*t*t + 0.000651814*t*t*t*t + 0.00002373599*t*t*t*t*t; }
  if (year >= 2050 && year <= 2150) { return -20 + 32*Math.pow((year-1820)/100, 2) - 0.5628*(2150-year); }
  return 64;
}

// ---------- 특정 황경에 도달하는 시각 (이분법+뉴턴) ----------
function solveTerm(year, targetLon) {
  // 근사 시작일: 황경 315(입춘)≈2/4 … 각 절기 대략 위치
  let guess = 315 <= targetLon || targetLon < 15
    ? new Date(Date.UTC(targetLon >= 315 ? year : year, targetLon >= 315 ? 1 : 3, 4))
    : new Date(Date.UTC(year, Math.floor(((targetLon + 45) % 360) / 30), 6));

  let jd = toJD(guess);

  // 뉴턴법: dλ/dt ≈ 0.9856 도/일
  for (let i = 0; i < 30; i++) {
    const lon = solarLongitude(jd);
    let diff = targetLon - lon;
    // 각도 wrap 처리
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    if (Math.abs(diff) < 1e-7) break;
    jd += diff / 0.98564736;
  }

  // TT → UT 보정
  jd -= deltaT(year) / 86400;
  return fromJD(jd);
}

// ---------- 캐시 ----------
const cache = new Map();

/** 해당 연도의 12절 절입 시각 (KST Date 배열, termIndex 순) */
function monthTerms(year) {
  if (cache.has(year)) return cache.get(year);
  const out = MONTH_TERMS.map((t, i) => {
    // 소한(285)은 해당 연도 1월, 입춘(315)은 2월 → 같은 해
    const d = solveTerm(year, t.lon);
    return { ...t, index: i, date: d };
  });
  cache.set(year, out);
  return out;
}

/** 입춘 시각 */
function getIpchun(year) {
  return monthTerms(year).find(t => t.name === '입춘').date;
}

/**
 * 날짜가 속한 월지 termIndex와 사주 연도 반환.
 * 입춘 전이면 전년도로 귀속.
 */
function termIndexOf(date) {
  const y = new Date(date.getTime() + 9 * 3600000).getUTCFullYear();
  const terms = monthTerms(y);
  const ipchun = terms[0].date;

  if (date < ipchun) {
    // 입춘 전 → 전년도 소한(축월) 또는 그 이전
    const prev = monthTerms(y - 1);
    for (let i = prev.length - 1; i >= 0; i--) {
      if (date >= prev[i].date) return { termIndex: i, sajuYear: y - 1 };
    }
    return { termIndex: 11, sajuYear: y - 2 };
  }

  for (let i = terms.length - 1; i >= 0; i--) {
    if (date >= terms[i].date) {
      // 소한(i=11)은 다음해 입춘까지 → sajuYear는 y
      return { termIndex: i, sajuYear: y };
    }
  }
  return { termIndex: 0, sajuYear: y };
}

// ---------- 기분 → 점수 ----------
const MOOD = {
  good:      { label:'기분 좋음',   icon:'😊', score:  2 },
  neutral:   { label:'그냥 그럼',   icon:'😐', score:  0 },
  down:      { label:'우울함',      icon:'😞', score: -2 },
  irritated: { label:'짜증남',      icon:'😤', score: -2 },
  angry:     { label:'히스테릭/화남',icon:'😡', score: -3 },
  sensitive: { label:'예민함',      icon:'😖', score: -1 },
};

// 기록의 기분을 배열로 정규화 (구버전 단일 문자열도 허용)
function moodList(entry) {
  const m = entry?.mood;
  if (!m) return [];
  const arr = Array.isArray(m) ? m : [m];
  return arr.filter(x => MOOD[x]);
}

/**
 * 여러 기분이 동시에 선택된 날의 점수.
 * 평균을 쓰면 안 된다: "짜증남(-2) + 예민함(-1)"의 평균은 -1.5로,
 * 짜증남 단독(-2)보다 좋아져 버린다. 실제로는 더 나쁜 날이다.
 * → 가장 나쁜 기분을 기준으로 잡고, 추가 부정 감정은 체감 가산한다.
 */
function moodScore(entry) {
  const list = moodList(entry);
  if (!list.length) return null;
  const scores = list.map(k => MOOD[k].score);

  // 긍정만 선택된 경우: 최고값 사용
  const negs = scores.filter(s => s < 0).sort((a, b) => a - b);
  if (!negs.length) return Math.max(...scores);

  // 부정이 하나라도 있으면 긍정은 상쇄 효과만 (완전히 지우지 않음)
  let s = negs[0];                       // 최악값이 기준
  for (let i = 1; i < negs.length; i++) {
    s += negs[i] * 0.35 * Math.pow(0.7, i - 1);   // 추가 부정 감정 체감 가산
  }
  const posMax = Math.max(0, ...scores.filter(x => x > 0));
  s += posMax * 0.3;                     // 양가감정 소폭 완화

  return Math.max(-4, s);
}

// 종합 점수: 기분 + 몸상태(1~5 → -2~+2)
function composite(entry) {
  const m = moodScore(entry) ?? 0;
  const b = (entry.body ?? 3) - 3;
  return m * 0.6 + b * 0.4 * 1.5;
}

// 태그 추출: 하루의 일진 × 내 명식 → 관계 태그 배열
// ============================================================
function extractTags(natal, dayGz, ctx = {}) {
  const tags = [];
  const dStem = dayGz[0], dBranch = dayGz[1];
  const me = natal.day[0];  // 일간

  const pillars = [
    ['년', natal.year], ['월', natal.month],
    ['일', natal.day],  ['시', natal.hour],
  ].filter(([, v]) => v);

  // --- 지지 관계 ---
  for (const [name, gz] of pillars) {
    const b = gz[1];
    if (isChung(dBranch, b))  tags.push(`충:${name}지`);
    if (isWonjin(dBranch, b)) tags.push(`원진:${name}지`);
    if (isHyung(dBranch, b))  tags.push(`형:${name}지`);
    if (isHae(dBranch, b))    tags.push(`해:${name}지`);
    if (isPa(dBranch, b))     tags.push(`파:${name}지`);
    if (isYukhap(dBranch, b)) tags.push(`육합:${name}지`);
  }

  // --- 십성 (일간 대비 일진 천간) ---
  const tg = tenGod(me, dStem);
  if (tg) tags.push(`일진십성:${tg}`);

  const tgb = tenGodBranch(me, dBranch);
  if (tgb) tags.push(`일진지지십성:${tgb}`);

  // --- 흉신 투출 ---
  if (tg === '편관') tags.push('편관투출');
  if (tg === '상관') tags.push('상관투출');
  if (tg === '겁재') tags.push('겁재투출');

  // --- 오행 ---
  tags.push(`오행:${STEM_ELEM[STEMS.indexOf(dStem)]}`);
  tags.push(`지지오행:${BRANCH_ELEM[BRANCHES.indexOf(dBranch)]}`);

  // --- 신살 ---
  for (const s of shinsal(me, natal.day[1], dBranch, dayGz)) {
    tags.push(`신살:${s}`);
  }

  // --- 삼합/방합 성립 (원국 지지 + 일진) ---
  const natalBranches = pillars.map(([, gz]) => gz[1]);
  for (const { members, elem } of SAMHAP) {
    if (!members.includes(dBranch)) continue;
    const hit = members.filter(m => m !== dBranch && natalBranches.includes(m));
    if (hit.length >= 2) tags.push(`삼합:${elem}`);
    else if (hit.length === 1) tags.push(`반합:${elem}`);
  }
  for (const { members, elem } of BANGHAP) {
    if (!members.includes(dBranch)) continue;
    const hit = members.filter(m => m !== dBranch && natalBranches.includes(m));
    if (hit.length >= 2) tags.push(`방합:${elem}`);
  }

  // --- 세운/대운 동조 ---
  if (ctx.daeun && isChung(dBranch, ctx.daeun[1])) tags.push('충:대운지');
  if (ctx.seun  && isChung(dBranch, ctx.seun[1]))  tags.push('충:세운지');

  // --- 용신/기신 운 ---
  if (natal.yongsin) {
    const de = STEM_ELEM[STEMS.indexOf(dStem)];
    if (natal.yongsin.includes(de)) tags.push('용희신운');
    if (natal.gisin?.includes(de))  tags.push('구기신운');
  }

  // --- 일주 자체 ---
  tags.push(`일주:${dayGz}`);

  return [...new Set(tags)];
}

// ============================================================
// 통계 집계
// ============================================================
function buildStats(natal, entries, opts = {}) {
  const MIN_N = opts.minSamples ?? 3;
  const scored = entries.map(e => ({
    ...e,
    score: composite(e),
    tags: extractTags(natal, e.ganji ?? dayGanji(new Date(e.date)), e.ctx),
  }));

  // 개인 베이스라인
  const all = scored.map(s => s.score);
  const baseline = mean(all);
  const sd = stddev(all, baseline);

  // 태그별 집계
  const byTag = new Map();
  for (const s of scored) {
    for (const t of s.tags) {
      if (!byTag.has(t)) byTag.set(t, []);
      byTag.get(t).push(s.score);
    }
  }

  const stats = [];
  for (const [tag, scores] of byTag) {
    const n = scores.length;
    if (n < MIN_N) continue;

    const m = mean(scores);

    // 대조군 = 이 태그가 없는 날들. 전체 평균과 비교하면 해당 태그의
    // 나쁜 날이 베이스라인 자체를 끌어내려 Δ가 과소평가됨.
    const without = scored.filter(s => !s.tags.includes(tag)).map(s => s.score);
    const ctrl = without.length >= 2 ? mean(without) : baseline;
    const delta = m - ctrl;

    // 효과크기: 대조군 표준편차 기준
    const ctrlSd = without.length >= 2 ? stddev(without, ctrl) : sd;
    const useSd = ctrlSd > 0.001 ? ctrlSd : sd;
    const d = useSd > 0.001 ? delta / useSd : 0;

    // 표본 보정: n이 작을수록 강하게 감쇠 (n=3 → 0.27, n=10 → 0.56, n=30 → 0.79)
    const shrink = n / (n + 8);

    // 신뢰도 상한 0.9 — 어떤 표본으로도 확실성을 주장하지 않음
    const confidence = Math.min(0.9, Math.abs(d) * shrink);

    // 일주 태그(60종)는 너무 특수해 표본이 절대 모이지 않음.
    // 통계에는 남기되 위험 승격 대상에서 제외 → 계열 태그로 일반화.
    const tooSpecific = tag.startsWith('일주:');

    stats.push({
      tag, n, mean: m, delta, effect: d, confidence,
      level: confidence >= 0.5 ? '높음' : confidence >= 0.25 ? '중간' : '낮음',
      risk: delta < -0.4 && confidence >= 0.25 && n >= MIN_N && !tooSpecific,
    });
  }

  stats.sort((a, b) => a.delta - b.delta);
  return { baseline, sd, total: scored.length, stats, scored };
}

const mean = a => a.length ? a.reduce((x,y)=>x+y,0) / a.length : 0;
const stddev = (a, m) => a.length < 2 ? 0 :
  Math.sqrt(a.reduce((s,x)=>s+(x-m)**2, 0) / (a.length - 1));

// ============================================================
// 태그 상관 처리
// 하나의 일진이 여러 태그를 동시에 발화시킴 (예: 유일 → 충:일지 + 원진:월지
// + 파:년지 …). 이들은 독립 증거가 아니라 같은 사건의 다른 이름이므로
// 신뢰도를 곱셈 결합하면 과대평가됨. 계열(family)로 묶어 대표 1개만 사용.
// ============================================================
function tagFamily(tag) {
  const [kind] = tag.split(':');
  if (['충','원진','형','해','파','육합'].includes(kind)) return 'branch-rel';
  if (kind === '일진십성' || kind === '일진지지십성') return 'tengod';
  if (kind === '오행' || kind === '지지오행') return 'element';
  if (kind === '삼합' || kind === '반합' || kind === '방합') return 'hap';
  if (kind === '신살') return 'shinsal';
  return kind;
}

// 계열별 최강 태그만 남김 (|delta| 기준)
function collapseByFamily(hits) {
  const best = new Map();
  for (const h of hits) {
    const f = tagFamily(h.tag);
    const cur = best.get(f);
    if (!cur || Math.abs(h.delta) > Math.abs(cur.delta)) best.set(f, h);
  }
  return [...best.values()];
}

// 통계적으로 동률일 때 어떤 이름으로 부를지 결정하는 명리 우선순위.
// (충/형은 1차 관계, 원진/파/해는 파생적 표현으로 본다)
const KIND_PRIORITY = {
  '충':0, '형':1, '원진':2, '해':3, '파':4, '육합':5,
  '일진십성':6, '일진지지십성':7, '신살':8, '삼합':9, '반합':10, '방합':11,
  '오행':12, '지지오행':13,
};
const kindRank = tag => {
  const k = tag.split(':')[0];
  return KIND_PRIORITY[k] ?? 20;
};

/**
 * 계열이 달라도 같은 날에 늘 함께 발화하는 태그들이 있다.
 * 예: 일지 진(辰) 명식에서 술(戌)일은 반드시 충:일지 + 원진:월지 + 파:시지 동시 발생.
 * 이들은 독립 증거가 아니라 한 사건의 다른 이름이므로 대표 하나만 남긴다.
 */
function dropSubsumed(riskStats, scored) {
  const dayCount = new Map();
  for (const s of scored) for (const t of new Set(s.tags))
    dayCount.set(t, (dayCount.get(t) || 0) + 1);

  const coCount = new Map();
  for (const s of scored) {
    const ts = [...new Set(s.tags)];
    for (const a of ts) for (const b of ts) {
      if (a === b) continue;
      const k = a + '\u0000' + b;
      coCount.set(k, (coCount.get(k) || 0) + 1);
    }
  }

  // 효과 큰 순 → 표본 많은 순 → 명리 우선순위 → 이름순
  const rank = (a, b) =>
    Math.abs(b.delta) - Math.abs(a.delta)
    || b.n - a.n
    || kindRank(a.tag) - kindRank(b.tag)
    || a.tag.localeCompare(b.tag);
  const ordered = [...riskStats].sort(rank);

  const keep = [];
  for (const h of ordered) {
    let host = null;
    for (const other of keep) {
      const co = coCount.get(h.tag + '\u0000' + other.tag) || 0;
      const nh = dayCount.get(h.tag) || 1;
      if (co / nh >= 0.9) { host = other; break; }
    }
    if (host) (host.aliases ||= []).push(h.tag);
    else keep.push({ ...h, aliases: [] });
  }
  return keep;
}

// ============================================================
// 미래 예측
// ============================================================
function forecast(natal, entries, { days = 365, from = new Date(), minSamples = 3 } = {}) {
  const { stats, baseline, scored } = buildStats(natal, entries, { minSamples });

  // 위험 태그 중 다른 태그에 종속된 것(항상 함께 뜨고 더 약한 것)을 제거
  const independent = dropSubsumed(stats.filter(s => s.risk), scored);
  const riskTags = new Map(independent.map(s => [s.tag, s]));
  if (!riskTags.size) return { days: [], riskTags: [], baseline };

  const out = [];
  for (let i = 0; i < days; i++) {
    const d = new Date(from);
    d.setDate(d.getDate() + i);
    const gz = dayGanji(d);
    const tags = extractTags(natal, gz);
    const raw = tags.map(t => riskTags.get(t)).filter(Boolean);
    if (!raw.length) continue;

    // 같은 계열의 태그는 같은 사건의 중복 표현 → 대표 1개로 축약
    const hits = collapseByFamily(raw);

    // 예상 편차 = 신뢰도 가중 평균
    const wSum = hits.reduce((s,h) => s + h.confidence, 0);
    const predicted = hits.reduce((s,h) => s + h.delta * h.confidence, 0) / wSum;

    // 축약 후에도 계열 간에는 상관이 남을 수 있으므로 보수적 결합:
    // 최강 신뢰도를 기준으로, 추가 계열은 체감 가산
    const sorted = [...hits].sort((a,b) => b.confidence - a.confidence);
    let conf = sorted[0].confidence;
    for (let k = 1; k < sorted.length; k++) {
      conf += sorted[k].confidence * (1 - conf) * 0.5;  // 감쇠 가산
    }
    conf = Math.min(0.9, conf);   // 확실성 상한 (태그 단위 상한과 동일)

    out.push({
      date: d.toISOString().slice(0,10),
      ganji: gz,
      predicted,
      confidence: conf,
      level: conf >= 0.6 ? '높음' : conf >= 0.35 ? '중간' : '낮음',
      reasons: hits.map(h => ({ tag: h.tag, n: h.n, delta: h.delta })),
      allTags: raw.map(h => h.tag),
    });
  }

  out.sort((a,b) => a.predicted - b.predicted);
  return { days: out, riskTags: independent, baseline };
}

// ============================================================
// 블라인드 기간: 확증편향 방지
// 예측일 중 일부를 무작위로 숨겨 대조군 확보
// ============================================================
function applyBlinding(forecastDays, { holdout = 0.3, seed = 42 } = {}) {
  let s = seed;
  const rnd = () => (s = (s * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
  return forecastDays.map(d => ({ ...d, blinded: rnd() < holdout }));
}
// ===== 용희신 종합 판정 (억부·조후·통관·병약) =====
// ============================================================
// 용희신 종합 판정 — 억부 · 조후 · 통관 · 병약
//
// 명리에서 용신은 하나의 잣대로 정해지지 않는다. 네 가지 관점이 있고,
// 명식마다 어느 것이 우선인지가 다르다. 여기서는 넷을 각각 계산한 뒤
// 명식의 상태를 보고 우선순위를 정해 조정(arbitration)한다.
//
//   억부(抑扶) — 일간의 강약을 덜거나 보태 균형을 맞춘다. 가장 일반적.
//   조후(調候) — 계절의 한난조습을 조절한다. 겨울 금수/여름 화토처럼
//                기후가 극단이면 억부보다 우선한다.
//   통관(通關) — 두 세력이 팽팽히 대립하면 그 사이를 흐르게 하는 오행.
//   병약(病藥) — 명식을 망치는 특정 글자(병)가 있으면 그것을 제거하는
//                글자(약)가 용신이 된다.
// ============================================================

const ELEMS = ['목','화','토','금','수'];

// 오행 관계
const GEN_OF  = { 목:'수', 화:'목', 토:'화', 금:'토', 수:'금' };  // 나를 생하는
const DRAIN   = { 목:'화', 화:'토', 토:'금', 금:'수', 수:'목' };  // 내가 생하는(설기)
const CTRL    = { 목:'토', 화:'금', 토:'수', 금:'목', 수:'화' };  // 내가 극하는(재)
const OVR_OF  = { 목:'금', 화:'수', 토:'목', 금:'화', 수:'토' };  // 나를 극하는(관살)

// 지지 → 계절/월령
const SEASON = {
  '인':'봄','묘':'봄','진':'봄',
  '사':'여름','오':'여름','미':'여름',
  '신':'가을','유':'가을','술':'가을',
  '해':'겨울','자':'겨울','축':'겨울',
};

// 한난(寒暖) — 월지별 기온 지수. -2(극한) ~ +2(극열)
const TEMP_IDX = {
  '자':-2,'축':-2,'인':-1,'묘':0,'진':0,'사':1,
  '오':2,'미':2,'신':1,'유':0,'술':0,'해':-1,
};
// 조습(燥濕) — -2(극습) ~ +2(극조)
const WET_IDX = {
  '자':-2,'축':-2,'인':0,'묘':0,'진':-1,'사':1,
  '오':2,'미':2,'신':0,'유':1,'술':1,'해':-1,
};

/** 오행 세력 계산 (지장간 가중 포함) */
function elementPower(p) {
  const c = { 목:0, 화:0, 토:0, 금:0, 수:0 };
  const stemOf = ch => STEM_ELEM[STEMS.indexOf(ch)];
  const branchOf = ch => BRANCH_ELEM[BRANCHES.indexOf(ch)];

  // 월지는 계절을 지배하므로 가중치가 크다
  const W = [[p.year,1],[p.month,1.5],[p.day,1],[p.hour,1]];
  for (const [gz,w] of W) {
    if (!gz) continue;
    c[stemOf(gz[0])] += w;
    c[branchOf(gz[1])] += w;
    for (const [hs, days] of HIDDEN[gz[1]]) {
      c[stemOf(hs)] += w * (days/30) * 0.5;
    }
  }
  return c;
}

/**
 * 월령 득령 판정.
 * 단순히 "월지가 목록에 있나"로 보면 틀린다. 진(辰)은 토지만 을(乙)이
 * 지장간에 있어 목을 조금 돕는 정도인데, 이를 완전한 득령으로 치면
 * 목이 1.4밖에 없는 명식이 '신강'으로 뒤집힌다.
 * → 월지의 지장간을 실제로 뜯어 일간을 돕는 비중을 계산한다.
 */
function monthSupportRatio(me, monthBranch) {
  const stemOf = ch => STEM_ELEM[STEMS.indexOf(ch)];
  const branchElem = BRANCH_ELEM[BRANCHES.indexOf(monthBranch)];
  let helping = 0, total = 0;

  for (const [hs, days] of HIDDEN[monthBranch]) {
    const e = stemOf(hs);
    total += days;
    if (e === me) helping += days;             // 비겁 — 같은 오행
    else if (GEN_OF[me] === e) helping += days * 0.8;  // 인성 — 나를 생함
  }
  // 지지 본기 오행 자체도 반영
  let base = 0;
  if (branchElem === me) base = 1;
  else if (GEN_OF[me] === branchElem) base = 0.8;

  return Math.max(base, helping / total);
}

function strength(p) {
  const me = STEM_ELEM[STEMS.indexOf(p.day[0])];
  const c = elementPower(p);
  const total = Object.values(c).reduce((a,b)=>a+b,0);

  const support = c[me] + c[GEN_OF[me]];
  const oppose  = c[DRAIN[me]] + c[CTRL[me]] + c[OVR_OF[me]];
  const ratio   = support / total;

  // 득령: 월지가 일간을 돕는 비중 (0~1). 0.5 이상이면 득령으로 본다.
  const ryeongRatio = monthSupportRatio(me, p.month[1]);
  const deukryeong = ryeongRatio >= 0.5;
  // 득지: 일지가 일간을 돕는가
  const jiRatio = monthSupportRatio(me, p.day[1]);
  const deukji = jiRatio >= 0.5;
  // 득세: 전체 세력
  const deukse = support > oppose;

  // 점수: 득령은 비중에 비례해 0~2점
  const score = Math.round((ryeongRatio * 2 + (deukji?1:0) + (deukse?1:0)) * 100) / 100;

  /**
   * 종격(從格) 판정.
   * 비율만 보면 안 된다. 종왕은 "일간이 지나치게 강하고 대항 세력이 사실상 없을 때",
   * 종약은 "일간이 뿌리가 전혀 없을 때"만 성립한다.
   * 조금이라도 견제/뿌리가 있으면 정격(억부)으로 본다.
   */
  let extreme = null;
  const opposeRatio = oppose / total;
  if (ratio > 0.75 && score >= 3.2 && opposeRatio < 0.12) {
    // 일간 세력이 압도적이고 대항 세력이 거의 없음 → 종왕
    extreme = 'super_strong';
  } else if (ratio < 0.18 && score < 0.5 && !deukryeong && !deukji) {
    // 일간이 월지·일지 어디에도 뿌리가 없음 → 종약
    extreme = 'super_weak';
  }

  return { me, count:c, total, support, oppose, ratio, opposeRatio,
           deukryeong, deukji, deukse, score,
           strong: score >= 2, extreme };
}

// ------------------------------------------------------------
// 1. 억부용신
// ------------------------------------------------------------
function eokbu(p, st) {
  const me = st.me;
  if (st.extreme === 'super_strong') {
    // 종왕격: 거스르지 말고 따른다
    return { method:'억부', yong:[me, GEN_OF[me]], gi:[OVR_OF[me], CTRL[me]],
             reason:'일간이 극도로 강해 억제가 통하지 않음 (종왕). 세력을 따르는 오행이 용신.',
             weight: 1.0, special:'종왕' };
  }
  if (st.extreme === 'super_weak') {
    // 종약격: 강한 세력에 종한다
    const strongest = ELEMS.filter(e=>e!==me)
      .sort((a,b)=>st.count[b]-st.count[a])[0];
    return { method:'억부', yong:[strongest, DRAIN[strongest]], gi:[me, GEN_OF[me]],
             reason:`일간이 뿌리 없이 약해 도움이 무의미 (종약). 가장 강한 ${strongest} 세력을 따름.`,
             weight: 1.0, special:'종약' };
  }
  if (st.strong) {
    // 신강 → 설기(식상) · 극(관살) · 소모(재성)
    // 어느 것을 쓸지는 무엇이 부족한지로 결정
    const cands = [DRAIN[me], OVR_OF[me], CTRL[me]];
    cands.sort((a,b)=>st.count[a]-st.count[b]);   // 적은 것부터
    return { method:'억부', yong:[cands[0], cands[1]], gi:[GEN_OF[me], me],
             reason:`일간 ${me}이(가) 강함(${st.score.toFixed(1)}/4). 덜어내는 ${cands[0]}·${cands[1]}이 용신.`,
             weight: 1.0 };
  }
  // 신약 → 생조(인성) · 방조(비겁)
  return { method:'억부', yong:[GEN_OF[me], me], gi:[OVR_OF[me], DRAIN[me]],
           reason:`일간 ${me}이(가) 약함(${st.score.toFixed(1)}/4). 돕는 ${GEN_OF[me]}(인성)·${me}(비겁)이 용신.`,
           weight: 1.0 };
}

// ------------------------------------------------------------
// 2. 조후용신 — 계절의 한난조습
// ------------------------------------------------------------
function johu(p, st) {
  const mb = p.month[1];
  const temp = TEMP_IDX[mb], wet = WET_IDX[mb];
  const season = SEASON[mb];
  const c = st.count;

  const yong = [], notes = [];
  let urgency = 0;

  // 한(寒) — 겨울생은 불이 필요하다
  if (temp <= -2) {
    if (c['화'] < 1.5) { yong.push('화'); urgency += 2;
      notes.push(`${season}(${mb}월)의 극한. 화(火)로 따뜻하게 해야 명식이 산다.`); }
    else { notes.push(`${season}생이나 화가 이미 ${c['화'].toFixed(1)}로 충분.`); }
  } else if (temp === -1) {
    if (c['화'] < 1) { yong.push('화'); urgency += 1; notes.push(`${season}의 한기. 화가 필요.`); }
  }
  // 열(熱) — 여름생은 물이 필요하다
  if (temp >= 2) {
    if (c['수'] < 1.5) { yong.push('수'); urgency += 2;
      notes.push(`${season}(${mb}월)의 극열. 수(水)로 식혀야 한다.`); }
    else { notes.push(`${season}생이나 수가 이미 ${c['수'].toFixed(1)}로 충분.`); }
  } else if (temp === 1) {
    if (c['수'] < 1) { yong.push('수'); urgency += 1; notes.push(`${season}의 열기. 수가 필요.`); }
  }
  // 조(燥) — 메마르면 물기
  if (wet >= 2 && c['수'] < 1 && !yong.includes('수')) {
    yong.push('수'); urgency += 1; notes.push('메마른 명식. 수로 적셔야 한다.');
  }
  // 습(濕) — 축축하면 불기
  if (wet <= -2 && c['화'] < 1 && !yong.includes('화')) {
    yong.push('화'); urgency += 1; notes.push('한습한 명식. 화로 말려야 한다.');
  }

  if (!yong.length) {
    return { method:'조후', yong:[], gi:[], weight:0,
             reason:`${season}(${mb}월)생이나 한난조습이 치우치지 않아 조후가 급하지 않음.` };
  }
  const gi = yong.includes('화') ? ['수'] : yong.includes('수') ? ['화'] : [];
  return { method:'조후', yong:[...new Set(yong)], gi, weight: urgency / 2,
           reason: notes.join(' '), urgency };
}

// ------------------------------------------------------------
// 3. 통관용신 — 대립하는 두 세력 사이를 흐르게
// ------------------------------------------------------------
function tonggwan(p, st) {
  const c = st.count;
  // 서로 극하는 쌍 중 둘 다 강하고 세력이 비슷한 경우를 찾는다
  let best = null;
  for (const a of ELEMS) {
    const b = CTRL[a];   // a가 b를 극함
    const pa = c[a], pb = c[b];
    if (pa < 1.5 || pb < 1.5) continue;         // 둘 다 어느 정도 강해야
    const balance = Math.min(pa,pb) / Math.max(pa,pb);
    if (balance < 0.6) continue;                // 세력이 팽팽해야
    // a와 b 사이를 통하게 하는 것 = a가 생하고 b를 생하는 오행
    const bridge = DRAIN[a];                    // a → bridge
    if (DRAIN[bridge] !== b) continue;          // bridge → b 여야 통관 성립
    const strengthOfClash = (pa + pb) * balance;
    if (!best || strengthOfClash > best.clash)
      best = { a, b, bridge, clash: strengthOfClash, balance, pa, pb };
  }
  if (!best) return { method:'통관', yong:[], gi:[], weight:0,
                      reason:'뚜렷하게 대립하는 두 세력이 없어 통관이 필요치 않음.' };

  // 다리 역할 오행이 이미 충분하면 통관은 이미 이루어진 것
  if (c[best.bridge] >= 1.5)
    return { method:'통관', yong:[], gi:[], weight:0,
             reason:`${best.a}와 ${best.b}가 대립하나 ${best.bridge}(${c[best.bridge].toFixed(1)})이 이미 통관 중.` };

  return { method:'통관', yong:[best.bridge], gi:[], weight: Math.min(1, best.clash / 6),
           reason:`${best.a}(${best.pa.toFixed(1)})와 ${best.b}(${best.pb.toFixed(1)})가 팽팽히 대립. `
                + `${best.bridge}(으)로 흐름을 터야 한다.`,
           clash: best.clash };
}

// ------------------------------------------------------------
// 4. 병약용신 — 명식을 망치는 글자(병)와 그것을 없애는 글자(약)
// ------------------------------------------------------------
function byeongyak(p, st, base) {
  const c = st.count;
  const me = st.me;

  // 병(病) = 용신을 극하거나, 지나치게 넘쳐 명식을 흔드는 오행
  const baseYong = base.yong[0];
  if (!baseYong) return { method:'병약', yong:[], gi:[], weight:0,
                          reason:'기준 용신이 없어 병약 판정 불가.' };

  const candidates = [];

  // (1) 용신을 극하는 오행이 강하면 그것이 병
  const killer = OVR_OF[baseYong];
  if (c[killer] >= 2 && killer !== me) {
    candidates.push({ byeong: killer, yak: OVR_OF[killer], power: c[killer],
      why: `용신 ${baseYong}을(를) 극하는 ${killer}이(가) ${c[killer].toFixed(1)}로 강함` });
  }
  // (2) 특정 오행이 지나치게 편중되면 그것이 병
  // 단 일간 자신의 오행이 많은 것은 '병'이 아니라 신강일 뿐 — 억부가 다룬다.
  const total = st.total;
  for (const e of ELEMS) {
    if (e === baseYong || e === me) continue;
    if (c[e] / total >= 0.42) {
      candidates.push({ byeong: e, yak: OVR_OF[e], power: c[e],
        why: `${e}이(가) 전체의 ${(c[e]/total*100).toFixed(0)}%로 편중` });
    }
  }
  if (!candidates.length)
    return { method:'병약', yong:[], gi:[], weight:0,
             reason:'명식을 뚜렷하게 해치는 병(病)이 없음.' };

  candidates.sort((a,b)=>b.power-a.power);
  const top = candidates[0];
  return { method:'병약', yong:[top.yak], gi:[top.byeong],
           weight: Math.min(1, top.power / 4),
           reason:`병(病): ${top.byeong} — ${top.why}. 약(藥): ${top.yak}(으)로 제거해야 한다.`,
           byeong: top.byeong, yak: top.yak };
}

// ============================================================
// 종합 판정
// 네 방법의 결과를 명식 상태에 따라 가중 조정한다.
// ============================================================
function analyzeYongsinFull(p) {
  const st = strength(p);
  const A = eokbu(p, st);
  const B = johu(p, st);
  const C = tonggwan(p, st);
  const D = byeongyak(p, st, A);

  const methods = [A, B, C, D];

  // ---- 우선순위 결정 ----
  // 조후가 급하면 억부보다 앞선다. 겨울 금수·여름 화토가 대표적.
  // 다만 종격은 명식 전체가 한 세력으로 쏠린 특수 구조라 억부가 기준이 된다.
  // 단, 종격이어도 한난이 극단(urgency>=2)이면 조후를 함께 반영해야 한다.
  // (예: 여름 화 종왕 → 수로 식히지 않으면 명식이 타버린다)
  let primary = A, rationale = [];

  if (st.extreme && B.urgency >= 2) {
    // 종격이지만 기후가 극단 → 조후를 우선하되 종격 성질도 남긴다
    primary = B;
    rationale.push(`${A.special}격이나 한난이 극단이라 조후(${B.yong.join('')})가 급합니다. `
      + `세력을 따르되 기후 조절이 먼저입니다.`);
  } else if (st.extreme) {
    primary = A;
    rationale.push(`${A.special}격이므로 억부가 절대 기준입니다.`);
  } else if (B.urgency >= 2) {
    primary = B;
    rationale.push('한난조습이 극단이라 조후가 억부에 앞섭니다.');
  } else if (D.weight >= 0.75) {
    primary = D;
    rationale.push('명식을 해치는 병이 뚜렷해 병약이 우선입니다.');
  } else if (C.weight >= 0.7) {
    primary = C;
    rationale.push('두 세력의 대립이 심해 통관이 우선입니다.');
  } else {
    rationale.push('한난조습·대립·병이 두드러지지 않아 억부를 기준으로 봅니다.');
  }

  // ---- 점수 합산 ----
  // 각 방법이 지목한 오행에 가중치를 더한다. 여러 방법이 같은 오행을
  // 가리키면 그만큼 확실해진다.
  const score = { 목:0, 화:0, 토:0, 금:0, 수:0 };
  const against = { 목:0, 화:0, 토:0, 금:0, 수:0 };

  for (const mth of methods) {
    if (!mth.weight) continue;
    const w = mth === primary ? mth.weight * 1.6 : mth.weight;
    mth.yong.forEach((e, i) => { score[e] += w * (i === 0 ? 1 : 0.6); });
    mth.gi.forEach((e, i)   => { against[e] += w * (i === 0 ? 1 : 0.6); });
  }

  // 용신은 기신을 겸할 수 없다 — 상쇄
  for (const e of ELEMS) {
    const net = score[e] - against[e];
    score[e] = Math.max(0, net);
    against[e] = Math.max(0, -net);
  }

  const rank = ELEMS.filter(e => score[e] > 0).sort((a,b)=>score[b]-score[a]);
  const giRank = ELEMS.filter(e => against[e] > 0).sort((a,b)=>against[b]-against[a]);

  const yongsin = rank[0] ? [rank[0]] : primary.yong.slice(0,1);
  const huisin  = rank[1] ? [rank[1]] : primary.yong.slice(1,2);
  const gisin   = giRank.slice(0, 2);

  // 구신(仇神) = 기신을 생하는 오행
  const gusin = gisin.length ? [...new Set(gisin.map(e => GEN_OF[e]))]
    .filter(e => !yongsin.includes(e) && !huisin.includes(e)) : [];

  // ---- 신뢰도 ----
  // 방법들이 일치할수록, 지목이 선명할수록 높다.
  const active = methods.filter(m => m.weight > 0);
  const agree = rank.length ? active.filter(m => m.yong.includes(rank[0])).length : 0;
  const conf = active.length ? Math.min(0.9, (agree / active.length) * 0.6
    + (rank.length && score[rank[0]] >= 1.5 ? 0.3 : 0.1)) : 0.3;

  return {
    ...st,
    methods: { eokbu:A, johu:B, tonggwan:C, byeongyak:D },
    primary: primary.method,
    rationale: rationale[0],
    yongsin, huisin, gisin, gusin,
    scores: score,
    confidence: conf,
    // 하위 호환 (기존 코드가 쓰던 필드)
    yongsin_legacy: [...yongsin, ...huisin],
  };
}

// 시간대 — 만세력은 한국 표준시(KST, UTC+9) 기준으로 정의된다.
// 사용자가 어느 나라에 있든 절입 시각과 날짜 경계는 KST로 판정해야
// 같은 날의 일진이 기기마다 달라지지 않는다.
// (Date 객체 내부는 항상 UTC 절대시각이고, 아래 헬퍼로만 KST를 읽는다.)
// ============================================================
const KST_OFFSET = 9 * 60 * 60 * 1000;

/** UTC 절대시각 → KST 벽시계 값을 읽기 위한 shifted Date */
const toKST = d => new Date(d.getTime() + KST_OFFSET);

/** KST 벽시계 기준 년/월/일/시/분 */
const kstParts = d => {
  const k = toKST(d);
  return {
    y: k.getUTCFullYear(), m: k.getUTCMonth(), d: k.getUTCDate(),
    h: k.getUTCHours(), mi: k.getUTCMinutes(), dow: k.getUTCDay(),
  };
};

/** KST 벽시계 년/월/일/시/분 → UTC 절대시각 Date */
const fromKST = (y, m, d, h = 0, mi = 0) =>
  new Date(Date.UTC(y, m, d, h, mi) - KST_OFFSET);

/** 지금 이 순간의 KST 날짜 */
const nowKST = () => kstParts(new Date());

/** KST 기준 YYYY-MM-DD */
const isoKST = d => {
  const p = kstParts(d);
  return `${p.y}-${String(p.m+1).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`;
};

const fmtKST = d => {
  const p = kstParts(d);
  return `${p.m+1}월 ${p.d}일 ${String(p.h).padStart(2,'0')}:${String(p.mi).padStart(2,'0')}`;
};

  try {
    const r = await API.put({ natal: state.natal, entries: state.entries }, state.rev);
    state.rev = r.rev;
    setSync('saved');
    setTimeout(()=>{ if(state.sync==='saved') setSync('idle'); }, 2000);
  } catch (e) {
    if (e.status === 409) {
      // 다른 기기가 먼저 저장함 → 병합 후 재시도
      const sd = e.body.serverData || { entries:{}, natal:null };
      state.entries = { ...sd.entries, ...state.entries };
      state.natal = state.natal || sd.natal;
      state.rev = e.body.serverRev;
      return pushNow();
    }
    setSync(e.status === 401 ? 'off' : 'error');
    if (e.status === 401) { state.user = null; render(); }
  }
}

// ---------- 사주 산출 ----------
// 사주의 하루는 자정이 아니라 자시(보정 후 23:30)에 시작한다.
// 23:30 이후 출생이면 일주가 다음날로 넘어간다.
function computeSaju(date, hour, minute) {
  const shift = (hour == null) ? 0 : dayShiftForHour(hour, minute || 0);
  const dayDate = shift ? new Date(date.getTime() + 86400000) : date;

  const { termIndex, sajuYear } = termIndexOf(date);
  const yGz = yearGanjiRaw(sajuYear);
  const mGz = monthGanji(yGz[0], termIndex);
  const dGz = dayGanji(dayDate);
  const hGz = (hour === null || hour === undefined)
    ? null : hourGanji(dGz[0], hour, minute || 0);
  return { year: yGz, month: mGz, day: dGz, hour: hGz, termIndex, sajuYear, dayShift: shift };
}

// ---------- 대운 ----------
function computeDaeun(p, birth, gender) {
  const yinYear = STEM_YIN[STEMS.indexOf(p.year[0])];
  const forward = (gender === 'M') !== yinYear;   // 양남음녀 순행
  const by = kstParts(birth).y;
  const all = [...monthTerms(by-1), ...monthTerms(by), ...monthTerms(by+1)]
    .map(t=>t.date).sort((a,b)=>a-b);
  let prev = null, next = null;
  for (const t of all) { if (t <= birth) prev = t; else if (!next) next = t; }
  const days = forward ? (next - birth)/86400000 : (birth - prev)/86400000;
  const startAge = Math.max(1, Math.round(days / 3 * 10) / 10);

  const mi = ganjiIndex(p.month);
  const out = [];
  for (let i = 1; i <= 9; i++) {
    out.push({ age: Math.floor(startAge + (i-1)*10), gz: ganjiFromIndex(mi + (forward ? i : -i)) });
  }
  return { startAge, forward, list: out };
}

/**
 * 달력에 보이는 양력 달이 걸쳐 있는 모든 월주 구간을 구한다.
 * 양력 1일이 아니라 절입 시각에 월주가 바뀌므로, 한 양력 달에
 * 보통 두 개의 월주가 걸린다. (예: 2026년 7월 = 을미월 + 병신월)
 */
function monthSegments(y, m) {
  const last  = new Date(y, m + 1, 0);
  const segs = [];
  let cur = null;

  for (let d = 1; d <= last.getDate(); d++) {
    const dt = fromKST(y, m, d, 12);
    const { termIndex, sajuYear } = termIndexOf(dt);
    const gz = monthGanji(yearGanjiRaw(sajuYear)[0], termIndex);
    const yGz = yearGanjiRaw(sajuYear);
    if (!cur || cur.gz !== gz) {
      cur = { gz, yearGz: yGz, termIndex, from: d, to: d,
              termName: MONTH_TERMS[termIndex].name };
      segs.push(cur);
    } else cur.to = d;
  }

  // 각 구간의 정확한 절입 시각 (구간 시작이 이 달 안에 있을 때만)
  for (const s of segs) {
    const terms = [...monthTerms(y - 1), ...monthTerms(y), ...monthTerms(y + 1)];
    const t = terms.find(t => { const kp = kstParts(t.date);
      return t.name === s.termName && kp.y === y && kp.m === m; });
    s.enterAt = t ? t.date : null;
  }
  return segs;
}

  const c = state.cal;
  const y = c.getFullYear(), m = c.getMonth();
  const first = new Date(y, m, 1), last = new Date(y, m+1, 0);
  const pad = first.getDay();
  const today = isoKST(new Date());

  const terms = [...monthTerms(y), ...monthTerms(y-1), ...monthTerms(y+1)];
  const termOn = {};
  for (const t of terms) { const kp = kstParts(t.date); if (kp.y===y && kp.m===m) termOn[kp.d] = t.name; }

  let cells = '';
  for (let i=0;i<pad;i++) cells += `<div class="cell pad"></div>`;
  for (let d=1; d<=last.getDate(); d++) {
    const dt = fromKST(y,m,d,12), k = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, gz = dayGanji(dt);
    const e = state.entries[k];
    const isT = k === today;
    const warn = state.warnSet && state.warnSet.has(k);
    let dots = '';
    if (e) {
      const ms = moodList(e);
      // 다중 선택이므로 개별 기분이 아니라 그날 종합 점수로 색을 정한다
      const sc = ms.length ? composite({ mood: ms, body: 3 }) : null;
      const moodColor = sc === null ? null
        : sc > 0.4 ? 'var(--ok)' : sc < -0.4 ? 'var(--alert)' : 'var(--to)';
      dots = `<div class="dots">
        ${moodColor?`<div class="dot" style="background:${moodColor}"></div>`:''}
        ${e.body?`<div class="dot" style="background:${e.body>=4?'var(--ok)':e.body<=2?'var(--alert)':'var(--to)'}"></div>`:''}
        ${e.memo?`<div class="dot" style="background:var(--mute)"></div>`:''}
      </div>`;
    }
    cells += `<div class="cell ${isT?'today':''} ${state.sel===k?'sel':''} ${warn?'warn':''}" data-d="${k}">
      ${termOn[d]?`<div class="term">${termOn[d]}</div>`:''}
      <div class="n">${d}</div>
      <div class="gz"><span class="e-${elemOfStem(gz[0])}">${H(gz[0])}</span><span class="e-${elemOfBranch(gz[1])}">${H(gz[1])}</span></div>
      ${dots}
    </div>`;
  }

  const nowY = nowKST().y;
  const years = [];
  for (let yy = nowY - 80; yy <= nowY + 20; yy++) years.push(yy);

  const segs = monthSegments(y, m);
  const segLabel = segs.map(s => `${s.gz}월`).join(' · ');

  return `<div class="cal-nav">
    <button id="pm" aria-label="이전 달">‹</button>
    <div class="t">
      <div class="picks">
        <div class="pick">
          <select id="sy" aria-label="연도 선택">
            ${years.map(yy=>`<option value="${yy}" ${yy===y?'selected':''}>${yy}년</option>`).join('')}
          </select>
        </div>
        <div class="pick">
          <select id="sm" aria-label="월 선택">
            ${Array.from({length:12},(_,i)=>`<option value="${i}" ${i===m?'selected':''}>${i+1}월</option>`).join('')}
          </select>
        </div>
      </div>
      <small class="gzline">
        ${segs[0].yearGz} · ${segLabel}
        <button class="info" id="segI" aria-label="절기 구간 보기" aria-expanded="false">i</button>
      </small>
    </div>
    <button id="nm" aria-label="다음 달">›</button>
  </div>
  <div class="pop" id="segPop" hidden>
    <div class="pop-hd">이 달의 월주 구간</div>
    ${segs.map(s=>`<div class="seg">
      <div class="seg-gz"><span class="e-${elemOfStem(s.gz[0])}">${H(s.gz[0])}</span><span class="e-${elemOfBranch(s.gz[1])}">${H(s.gz[1])}</span>
        <span class="seg-ko">${s.yearGz}년 ${s.gz}월</span></div>
      <div class="seg-range">${m+1}월 ${s.from}일 ~ ${m+1}월 ${s.to}일</div>
      <div class="seg-term">${s.enterAt
        ? `${s.termName} 절입 · ${fmtKST(s.enterAt)}부터`
        : `${s.termName} 절기 중 · 지난달부터 이어짐`}</div>
    </div>`).join('')}
    <div class="pop-note">월주는 양력 1일이 아니라 <b>절입 시각</b>에 바뀝니다.
    그래서 한 양력 달에 두 개의 월주가 걸칩니다. 시각은 한국 표준시입니다.</div>
  </div>
  ${(y!==nowY||m!==nowKST().m)?'<div class="jump"><button id="tdy">오늘로</button></div>':''}
  <div class="dow"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
  <div class="grid" id="grid">${cells}</div>
  <div class="note">날짜를 눌러 만세력 확인과 기록을 남기세요. 점은 기분·몸상태·메모 유무입니다.
  ${state.warnSet && state.warnSet.size ? '<br>상단 붉은 선은 “주의 날짜” 예측일입니다.' : ''}</div>`;
}

// ---------- 기록 시트 ----------
function openSheet(k) {
  state.sel = k;
  const [ky,km,kd] = k.split('-').map(Number);
  const dt = fromKST(ky, km-1, kd, 12);
  const p = computeSaju(dt, 12);
  const e = state.entries[k] || {};
  const curMoods = moodList(e);
  $('#shDt').textContent = k + ' ' + ['일','월','화','수','목','금','토'][kstParts(dt).dow] + '요일';
  $('#shGz').textContent = `${p.year}년 ${p.month}월 ${p.day}일`;

  let rel = '';
  if (state.natal) {
    const tags = extractTags(natalObj(), p.day);
    const bad = t => /^(충|원진|형|해|파)/.test(t) || /구기신|편관투출|상관투출/.test(t);
    const good = t => /육합|용희신|천을귀인/.test(t);
    rel = `<div class="f-lbl">내 명식과의 관계</div><div class="day-tags">
      ${tags.filter(t=>!t.startsWith('일주:')).map(t=>`<span class="tag ${bad(t)?'bad':good(t)?'good':''}">${t}</span>`).join('')}
    </div>`;
  }

  $('#shBody').innerHTML = `
    ${myeongsikHTML({...p, hour:null}, false)}
    ${rel}
    <div class="f-lbl">기분 <span class="hint">여러 개 선택할 수 있어요</span></div>
    <div class="moods" id="moods">
      ${Object.entries(MOOD).map(([k2,v])=>`<div class="mood ${curMoods.includes(k2)?'on':''}" data-m="${k2}" role="checkbox" aria-checked="${curMoods.includes(k2)}" tabindex="0">
        <span class="em">${v.icon}</span><span class="nm">${v.label}</span></div>`).join('')}
    </div>
    <div class="f-lbl">몸상태 (5 = 가장 좋음)</div>
    <div class="bodies" id="bodies">
      ${[1,2,3,4,5].map(n=>`<div class="bd ${e.body===n?'on':''}" data-b="${n}">${n}
        <small>${['매우 낮음','낮음','보통','좋음','아주 좋음'][n-1]}</small></div>`).join('')}
    </div>
    <div class="f-lbl">메모</div>
    <textarea id="memo" placeholder="오늘 어땠나요">${e.memo||''}</textarea>
    <button class="btn" id="save">기록 저장</button>
    ${state.entries[k]?'<button class="btn ghost" id="del">이 기록 지우기</button>':''}
  `;

  let sel = { mood: [...curMoods], body: e.body };
  $('#moods').onclick = ev => { const t=ev.target.closest('.mood'); if(!t)return;
    const k2 = t.dataset.m;
    const i = sel.mood.indexOf(k2);
    if (i >= 0) sel.mood.splice(i,1); else sel.mood.push(k2);
    t.classList.toggle('on', i < 0);
    t.setAttribute('aria-checked', i < 0);
  };
  $('#moods').onkeydown = ev => { if(ev.key===' '||ev.key==='Enter'){ ev.preventDefault(); ev.target.closest('.mood')?.click(); } };
  $('#bodies').onclick = ev => { const t=ev.target.closest('.bd'); if(!t)return;
    [...$('#bodies').children].forEach(x=>x.classList.remove('on')); t.classList.add('on'); sel.body=+t.dataset.b; };
  $('#save').onclick = () => {
    const memo = $('#memo').value.trim();
    if (!sel.mood.length && !sel.body && !memo) { closeSheet(); return; }
    state.entries[k] = { mood: sel.mood, body:sel.body, memo };
    recomputeWarn(); queueSave(); closeSheet(); render();
  };
  if ($('#del')) $('#del').onclick = () => { delete state.entries[k]; recomputeWarn(); queueSave(); closeSheet(); render(); };

  $('#sheet').classList.add('on'); $('#sbg').classList.add('on');
}
const closeSheet = () => { $('#sheet').classList.remove('on'); $('#sbg').classList.remove('on'); state.sel=null; };

        <span class="mth-nm">${m.method}${isPrimary?'<em>주법</em>':''}</span>

      </div>

        m.gi&&m.gi.length?` &nbsp;/&nbsp; 기신 ${m.gi.map(chip).join(' · ')}`:''}</div>`:''}

  return `<div class="card"><h3>용희신 / 구기신</h3>
    <div class="kv"><span class="k">일간</span>

    <div class="kv"><span class="k">강약</span>
      <span>${ys.strong?'신강':'신약'} ${ys.extreme?`<b style="color:var(--to)">· ${ys.extreme==='super_strong'?'종왕':'종약'}격</b>`:''}
      <span style="color:var(--mute);font-size:11px">${ys.score.toFixed(1)}/4
      (령${ys.deukryeong?'○':'×'} 지${ys.deukji?'○':'×'} 세${ys.deukse?'○':'×'})</span></span></div>

    <div class="ys-main">
      <div class="ys-box good">
        <div class="ys-lbl">용신</div>
        <div class="ys-el">${ys.yongsin.map(chip).join(' ')}</div>
      </div>
      <div class="ys-box good">
        <div class="ys-lbl">희신</div>
        <div class="ys-el">${ys.huisin.length?ys.huisin.map(chip).join(' '):'<span style="color:var(--mute)">-</span>'}</div>
      </div>
      <div class="ys-box bad">
        <div class="ys-lbl">기신</div>
        <div class="ys-el">${ys.gisin.length?ys.gisin.map(chip).join(' '):'<span style="color:var(--mute)">-</span>'}</div>
      </div>
      <div class="ys-box bad">
        <div class="ys-lbl">구신</div>
        <div class="ys-el">${ys.gusin.length?ys.gusin.map(chip).join(' '):'<span style="color:var(--mute)">-</span>'}</div>
      </div>
    </div>

    <div class="ys-why">
      <b>${ys.primary}</b>을(를) 주법으로 봅니다. ${ys.rationale}
      <span class="ys-conf">판정 신뢰도 ${(ys.confidence*100).toFixed(0)}%</span>
    </div>

    <div class="f-lbl" style="margin:18px 0 9px">네 가지 판정법</div>
    ${methodRow(M.eokbu,     ys.primary==='억부')}
    ${methodRow(M.johu,      ys.primary==='조후')}
    ${methodRow(M.tonggwan,  ys.primary==='통관')}
    ${methodRow(M.byeongyak, ys.primary==='병약')}

    <div class="note" style="margin-top:14px">네 방법이 같은 오행을 가리킬수록 신뢰도가 올라갑니다.
    명리는 사람마다 해석이 갈리는 분야이고, 특히 종격·조후 판정은 술사마다 견해가 다릅니다.
    이 결과는 참고용 계산이지 정답이 아닙니다.</div>
  </div>`;
}

// ---------- 뷰: 내 명식 ----------
function viewNatal() {
  if (!state.natal) return natalForm();
  const n = state.natal;
  const birth = fromKST(n.y, n.m-1, n.d, n.h ?? 12, n.mi ?? 0);
  const p = computeSaju(birth, n.h, n.mi);
  const ys = analyzeYongsinFull(p);
  const du = computeDaeun(p, birth, n.gender);
  const nowY = nowKST().y;
  const age = nowY - n.y + 1;
  const cur = [...du.list].reverse().find(x => age >= x.age) || du.list[0];

  const shin = [];
  for (const [nm,gz] of [['년',p.year],['월',p.month],['일',p.day],['시',p.hour]]) {
    if(!gz) continue;
    for (const s of shinsal(p.day[0], p.day[1], gz[1], gz)) shin.push(`${nm}지 ${s}`);
  }

  const maxE = Math.max(...Object.values(ys.count));
  const hb = n.h != null ? hourBranchName(n.h, n.mi || 0) : null;
  const hr = hb ? HOUR_RANGES.find(r => r[0] === hb) : null;

  return `
  ${myeongsikHTML(p, n.h!=null)}
  ${hr?`<div class="term-strip" style="margin-top:14px">
    <span><b>${hb}시</b> ${hr[1]}~${hr[2]}</span>
    ${p.dayShift?'<span>· 자시 이후 출생이라 일주는 다음날 기준</span>':''}
  </div>`:''}
  <div class="card"><h3>오행 세력</h3>
    ${Object.entries(ys.count).map(([e,v])=>`
      <div class="stat-row"><span class="e-${e}">${e}</span>
      <div style="flex:1;margin:0 12px"><div class="bar"><i style="width:${v/maxE*100}%;background:var(--${{목:'mok',화:'hwa',토:'to',금:'geum',수:'su'}[e]})"></i></div></div>
      <span class="n">${v.toFixed(1)}</span></div>`).join('')}
  </div>
  ${yongsinCardHTML(ys, p)}
  <div class="card"><h3>신살 · 귀인</h3>
    <div class="day-tags">${shin.length?shin.map(s=>`<span class="tag ${/귀인/.test(s)?'good':/양인|백호|괴강/.test(s)?'bad':''}">${s}</span>`).join(''):'<span style="color:var(--mute);font-size:12px">해당 없음</span>'}</div>
  </div>
  <div class="card"><h3>대운 <span style="color:var(--mute);font-size:11px;letter-spacing:0">${du.forward?'순행':'역행'} · ${du.startAge}세 시작</span></h3>
    <div class="luck">${du.list.map(x=>`<div class="luck-i ${x===cur?'now':''}">
      <div class="age">${x.age}세</div>
      <div class="g"><span class="e-${elemOfStem(x.gz[0])}">${H(x.gz[0])}</span><br><span class="e-${elemOfBranch(x.gz[1])}">${H(x.gz[1])}</span></div>
    </div>`).join('')}</div>
  </div>
  <div class="card"><h3>세운</h3>
    <div class="luck">${Array.from({length:8},(_,i)=>{const yy=nowY-1+i;const g=yearGanjiRaw(yy);
      return `<div class="luck-i ${yy===nowY?'now':''}"><div class="age">${yy}</div>
      <div class="g"><span class="e-${elemOfStem(g[0])}">${H(g[0])}</span><br><span class="e-${elemOfBranch(g[1])}">${H(g[1])}</span></div></div>`;}).join('')}</div>
  </div>
  <button class="btn ghost" id="reset">명식 다시 입력</button>`;
}

function syncHTML() {
  const map = {

    idle:    ['·', '동기화됨'],

    error:   ['!', '저장 실패'],

  const [ic, tx] = map[state.sync] || ['', ''];

  if (!tx) {

}
