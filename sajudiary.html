function yongsinCardHTML(ys, p) {
  const chip = e => `<span class="e-${e}">${e}</span>`;
  const M = ys.methods;

  const methodRow = (m, isPrimary) => {
    const active = m.weight > 0;
    return `<div class="mth ${isPrimary?'primary':''} ${active?'':'off'}">
      <div class="mth-hd">
        <span class="mth-nm">${m.method}${isPrimary?'<em>주법</em>':''}</span>
        <span class="mth-w">${active?`가중 ${m.weight.toFixed(2)}`:'해당 없음'}</span>
      </div>
      ${active&&m.yong.length?`<div class="mth-y">용신 ${m.yong.map(chip).join(' · ')}${
        m.gi&&m.gi.length?` &nbsp;/&nbsp; 기신 ${m.gi.map(chip).join(' · ')}`:''}</div>`:''}
      <div class="mth-r">${m.reason}</div>
    </div>`;
  };

  return `<div class="card"><h3>용희신 / 구기신</h3>
    <div class="kv"><span class="k">일간</span>
      <span><span class="e-${ys.me}">${HS(p.day[0])} ${p.day[0]}</span> (${ys.me})</span></div>
    <div class="kv"><span class="k">강약</span>
      <span>${ys.strong?'신강':'신약'} ${ys.extreme?`<b style="color:var(--to)">· ${ys.extreme==='super_strong'?'종왕':'종약'}격</b>`:''}
      <span style="color:var(--mute);font-size:12.6px">${ys.score.toFixed(1)}/4
      (령${ys.deukryeong?'○':'×'} 지${ys.deukji?'○':'×'} 세${ys.deukse?'○':'×'})</span></span></div>

    <div class="ys-main">
      <div class="ys-box good">
        <div class="ys-lbl">용신</div>
        <div class="ys-el">${ys.yongsin.map(chip).join(' ')}</div>
      </div>
      <div class="ys-box good">
        <div class="ys-lbl">희신</div>
        <div class="ys-el">${ys.huisin.length?ys.huisin.map(chip).join(' '):'<span style="color:var(--mute)">-</span>'}</div>
      </div>
      <div class="ys-box bad">
        <div class="ys-lbl">기신</div>
        <div class="ys-el">${ys.gisin.length?ys.gisin.map(chip).join(' '):'<span style="color:var(--mute)">-</span>'}</div>
      </div>
      <div class="ys-box bad">
        <div class="ys-lbl">구신</div>
        <div class="ys-el">${ys.gusin.length?ys.gusin.map(chip).join(' '):'<span style="color:var(--mute)">-</span>'}</div>
      </div>
    </div>

    <div class="ys-why">
      <b>${ys.primary}</b>을(를) 주법으로 봅니다. ${ys.rationale}
      ${ys.gisinWhy?`<br><span style="color:var(--mute)">기신 근거 — ${ys.gisinWhy}</span>`:''}
      ${ys.gusinWhy?`<br><span style="color:var(--mute)">구신 근거 — ${ys.gusinWhy}</span>`:''}
      <span class="ys-conf">판정 신뢰도 ${(ys.confidence*100).toFixed(0)}%</span>
    </div>

    <div class="f-lbl" style="margin:18px 0 9px">판정 순서 (전왕 → 조후 → 통관 → 격국·억부)</div>
    ${methodRow(M.jeonwang,  ys.primary==='전왕')}
    ${methodRow(M.johu,      ys.primary==='조후')}
    ${methodRow(M.tonggwan,  ys.primary==='통관')}
    ${M.gyeokguk ? `<div class="mth ${ys.primary==='격국'?'primary':''}">
      <div class="mth-hd"><span class="mth-nm">격국</span><span class="mth-w">${M.gyeokguk.gyeok||''}</span></div>
      <div class="mth-r">${M.gyeokguk.reason}</div></div>` : ''}
    ${methodRow(M.eokbu,     ys.primary==='억부')}

    <div class="note" style="margin-top:14px">네 방법이 같은 오행을 가리킬수록 신뢰도가 올라갑니다.
    명리는 사람마다 해석이 갈리는 분야이고, 특히 전왕·조후·격국 판정은 술사마다 견해가 다릅니다.
    이 결과는 참고용 계산이지 정답이 아닙니다.</div>
  </div>`;
}

/** 12간지 시간표 (명식 입력 폼용) */
function hourTableHTML(curH, curMi) {
  const on = (curH != null) ? hourBranchName(curH, curMi || 0) : null;
  return `<div class="pop-note" style="margin-top:12px;border:none;padding:0">
    <div style="color:var(--mute);font-size:11.5px;letter-spacing:.14em;margin-bottom:7px">12간지 시간 (동경 135도 보정)</div>
    <div class="hrs">
      ${HOUR_RANGES.map(([b,s,e])=>`<div class="hr ${on===b?'on':''}"><span class="hr-b e-${
        BRANCH_ELEM[BRANCHES.indexOf(b)]}">${HB(b)}</span><span class="hr-t">${s}~${e}</span></div>`).join('')}
    </div>
    <div style="margin-top:8px">한국은 동경 135도 표준시를 쓰지만 서울은 동경 127도라
    시계가 태양시보다 약 30분 빠릅니다. 그래서 자시가 23:00이 아니라 <b>23:30</b>에 시작합니다.</div>
  </div>`;
}

// ---------- 뷰: 내 명식 ----------
// ============================================================
// 상세 풀이 — 규칙 기반 명식 해석 엔진
// 명식의 계산 결과(일간, 오행, 용신, 신살, 대운/세운)를 문장으로 풀어낸다.
// LLM 없이 즉시 동작하며, "AI 심화" 버튼으로 서버 해석을 덧붙일 수 있다.
// ============================================================

// 십성별 성격 키워드 (일간 대비 오행 관계)
const DAYMASTER_TRAITS = {
  목: { nature:'나무', keyword:'성장과 확장', pos:'추진력이 있고 곧으며 미래를 향해 뻗어가는 기질', neg:'고집이 세고 융통성이 부족해질 수 있는 면', tip:'방향이 막히면 부러지기 쉬우니 유연함을 함께 기르면 좋습니다.' },
  화: { nature:'불', keyword:'표현과 확산', pos:'밝고 열정적이며 사람을 끌어당기는 기질', neg:'감정 기복이 크고 성급해질 수 있는 면', tip:'타오른 뒤 꺼지지 않도록 꾸준함을 더하면 힘이 오래갑니다.' },
  토: { nature:'흙', keyword:'포용과 중재', pos:'믿음직하고 두루 품으며 중심을 잡는 기질', neg:'변화를 꺼리고 답답하게 느껴질 수 있는 면', tip:'너무 머무르지 말고 때로 흐름에 몸을 맡기면 좋습니다.' },
  금: { nature:'쇠', keyword:'결단과 정리', pos:'분명하고 원칙이 서 있으며 마무리가 야무진 기질', neg:'날카롭고 차갑게 비칠 수 있는 면', tip:'단단함이 지나치면 부러지니 부드러움을 덧대면 좋습니다.' },
  수: { nature:'물', keyword:'지혜와 유연', pos:'총명하고 임기응변에 능하며 상황에 잘 스며드는 기질', neg:'속을 알기 어렵고 마음이 흔들리기 쉬운 면', tip:'흐름에 휩쓸리지 않도록 중심을 잡아두면 좋습니다.' },
};

const ELEM_ROLE_LABEL = {
  same:'비겁(같은 기운, 자기 세력)',
  gen:'인성(나를 돕는 기운)',
  drain:'식상(내가 표현하는 기운)',
  ctrl:'재성(내가 다루는 기운)',
  ovr:'관성(나를 다스리는 기운)',
};

function elemRole(me, e) {
  if (e === me) return 'same';
  if (e === GEN_OF[me]) return 'gen';
  if (e === DRAIN[me]) return 'drain';
  if (e === CTRL[me]) return 'ctrl';
  if (e === OVR_OF[me]) return 'ovr';
  return null;
}

// 신살별 짧은 의미
const SHINSAL_MEANING = {
  천을귀인:'하늘이 돕는 귀인. 어려울 때 뜻밖의 도움을 받는 복.',
  도화:'사람을 끄는 매력. 인기와 이성 인연이 따르나 구설도 함께.',
  역마:'움직임과 이동의 기운. 여행·이주·변동이 잦고 활동적.',
  화개:'예술과 종교, 고독의 별. 깊이 파고드는 재능이 있음.',
  양인:'강한 칼의 기운. 결단력과 추진력이 크나 과하면 다툼.',
  백호:'격렬한 기운. 강렬한 추진력이나 사고·충돌을 조심.',
  괴강:'우두머리의 기상. 카리스마가 크나 극단으로 치우치기 쉬움.',
};

/**
 * 명식 전체를 구조화된 풀이 데이터로 변환.
 * viewNatal이 이미 계산한 p, ys, du를 받아서 재사용한다.
 */
function buildInterpretation(p, ys, du, natal) {
  const me = ys.me;
  const dt = DAYMASTER_TRAITS[me];
  const total = ys.total || Object.values(ys.count).reduce((a,b)=>a+b,0);

  // --- 1. 일간·성격 기질 ---
  const neutral = !ys.extreme && ys.score >= 1.8 && ys.score < 2.8;
  const strengthWord = ys.extreme === 'super_strong' ? '매우 강한'
    : ys.extreme === 'super_weak' ? '매우 약한'
    : neutral ? '강약이 엇비슷한(중화에 가까운)'
    : ys.strong ? '강한' : '약한';
  const daymaster = {
    stem: p.day[0],
    elem: me,
    title: `${p.day[0]}(${me}) 일간 — ${dt.nature}의 기질`,
    body: `당신은 ${dt.nature}에 비유되는 ${me} 일간입니다. ${dt.keyword}을(를) 본질로 하며, ${dt.pos}이 있습니다. `
      + `사주 안에서 일간의 힘은 ${strengthWord} 편입니다(득령 ${ys.deukryeong?'○':'×'}·득지 ${ys.deukji?'○':'×'}·득세 ${ys.deukse?'○':'×'}, ${ys.score.toFixed(1)}/4). `
      + (neutral
          ? `강하지도 약하지도 않은 균형에 가까워, 상황에 따라 유연하게 대응하는 힘이 있습니다. 어느 한쪽으로 치우친 운이 올 때 그 영향을 특히 잘 탑니다.`
          : ys.strong
          ? `기운이 넉넉하니 밖으로 펼치고 나눠주는 쪽이 잘 맞습니다. 다만 ${dt.neg}은 주의가 필요합니다.`
          : `기운이 여유롭지 않으니 무리하기보다 돕는 환경과 사람을 곁에 두는 편이 좋습니다. ${dt.neg}이 드러날 수 있어 스스로를 돌보는 습관이 중요합니다.`),
    tip: dt.tip,
  };

  // --- 2. 오행 균형과 보완법 ---
  const sorted = Object.entries(ys.count).sort((a,b)=>b[1]-a[1]);
  const strongest = sorted[0], weakest = sorted[sorted.length-1];
  const missing = Object.entries(ys.count).filter(([,v])=>v < total*0.08).map(([e])=>e);
  const balance = {
    title: '오행의 균형',
    strongest: strongest[0], weakest: weakest[0],
    missing,
    body: `오행 중 <b class="e-${strongest[0]}">${strongest[0]}</b>이(가) 가장 강하고(${strongest[1].toFixed(1)}), `
      + `<b class="e-${weakest[0]}">${weakest[0]}</b>이(가) 가장 약합니다(${weakest[1].toFixed(1)}). `
      + (missing.length
          ? `특히 ${missing.map(e=>`<b class="e-${e}">${e}</b>`).join('·')} 기운이 거의 없어, 그 오행이 상징하는 영역(${missing.map(e=>ELEM_ROLE_LABEL[elemRole(me,e)]||e).join(', ')})에서 아쉬움이 생기기 쉽습니다.`
          : `오행이 비교적 고루 갖춰져 큰 결핍은 없습니다.`),
    remedy: `부족한 <b class="e-${weakest[0]}">${weakest[0]}</b>을(를) 보완하려면, 색·방위·생활 습관에서 그 기운을 가까이 하면 도움이 됩니다. `
      + `(${weakest[0]}: ${ELEM_ADVICE[weakest[0]]})`,
  };

  // --- 3. 용신 활용 조언 ---
  const yong = ys.yongsin[0];
  const yongRole = yong ? ELEM_ROLE_LABEL[elemRole(me, yong)] : '';
  const useful = {
    title: '용신 활용법',
    yongsin: ys.yongsin, huisin: ys.huisin, gisin: ys.gisin, gusin: ys.gusin,
    body: yong
      ? `당신에게 가장 이로운 기운(용신)은 <b class="e-${yong}">${yong}</b>입니다. ${ys.primary}을(를) 기준으로 정해졌습니다. `
        + `${yong}은(는) 당신에게 ${yongRole} 역할을 하며, 이 기운이 살아날 때 일이 풀리고 컨디션이 좋아집니다. `
        + (ys.huisin.length?`이를 돕는 희신 <b class="e-${ys.huisin[0]}">${ys.huisin[0]}</b>도 함께 챙기면 좋습니다. `:'')
        + `반대로 기신 <b class="e-${ys.gisin[0]}">${ys.gisin[0]}</b>이(가) 강해지는 때·환경은 피하는 편이 유리합니다.`
      : '용신이 뚜렷하게 잡히지 않는 구조입니다. 특정 기운에 기대기보다 전체 균형을 살피는 편이 좋습니다.',
    advice: yong ? `실천 팁 — ${ELEM_ADVICE[yong]} 이런 것들이 ${yong} 기운을 북돋웁니다.` : '',
  };

  // --- 4. 신살·대운·세운 해석 ---
  const shinList = [];
  for (const [nm,gz] of [['년',p.year],['월',p.month],['일',p.day],['시',p.hour]]) {
    if(!gz) continue;
    for (const s of shinsal(p.day[0], p.day[1], gz[1], gz))
      shinList.push({ pos:nm, name:s, meaning: SHINSAL_MEANING[s] || '' });
  }
  const nowY = nowKST().y;
  const age = nowY - natal.y + 1;
  const curDae = [...du.list].reverse().find(x => age >= x.age) || du.list[0];
  const seun = yearGanjiRaw(nowY);
  const daeElem = elemOfStem(curDae.gz[0]);
  const seElem = elemOfStem(seun[0]);
  const daeGood = ys.yongsin.includes(daeElem) || ys.huisin.includes(daeElem);
  const daeBad = ys.gisin.includes(daeElem) || ys.gusin.includes(daeElem);
  const seGood = ys.yongsin.includes(seElem) || ys.huisin.includes(seElem);
  const seBad = ys.gisin.includes(seElem) || ys.gusin.includes(seElem);

  const fortune = {
    title: '신살 · 대운 · 세운',
    shinsal: shinList,
    daeun: {
      gz: curDae.gz, age: curDae.age, elem: daeElem,
      tone: daeGood?'순풍':daeBad?'역풍':'보통',
      body: `지금은 ${curDae.age}세부터 시작된 <b>${curDae.gz}</b> 대운 안에 있습니다. `
        + `대운의 천간 ${curDae.gz[0]}(${daeElem})은(는) `
        + (daeGood?`당신의 용희신에 해당해, 이 10년은 흐름을 타기 좋은 시기입니다. 하고 싶은 일을 펼쳐볼 만합니다.`
           :daeBad?`당신의 기구신에 해당해, 이 10년은 다소 버거울 수 있습니다. 무리한 확장보다 내실을 다지는 편이 좋습니다.`
           :`용신도 기신도 아니라, 큰 굴곡 없이 흘러가는 무난한 시기입니다.`),
    },
    seun: {
      gz: seun, year: nowY, elem: seElem,
      tone: seGood?'순풍':seBad?'역풍':'보통',
      body: `올해(${nowY}년)는 <b>${seun}</b> 세운입니다. 세운 천간 ${seun[0]}(${seElem})은(는) `
        + (seGood?`용희신에 들어, 새로운 시도나 결정에 힘이 실리는 해입니다.`
           :seBad?`기구신에 들어, 조심스럽게 움직이는 편이 좋은 해입니다. 건강과 관계를 특히 살피세요.`
           :`무난한 흐름의 해입니다.`),
    },
  };

  return { daymaster, balance, useful, fortune };
}

// 오행별 보완 조언 (색·방위·생활)
const ELEM_ADVICE = {
  목:'초록색, 동쪽 방위, 나무·식물, 산책과 새벽 활동',
  화:'붉은색, 남쪽 방위, 햇빛과 밝은 조명, 사람들과의 활발한 교류',
  토:'노란색·황토색, 중앙, 흙과 도자기, 규칙적인 생활과 안정된 공간',
  금:'흰색·금속색, 서쪽 방위, 금속 소품, 정리정돈과 마무리 습관',
  수:'검정·남색, 북쪽 방위, 물과 가까운 곳, 충분한 수면과 사색',
};


// ============================================================
// 상세 풀이 렌더 + AI 심화
// ============================================================
function interpretationHTML(p, ys, du, natal) {
  const I = buildInterpretation(p, ys, du, natal);

  const section = (num, title, inner) => `
    <div class="interp-sec">
      <div class="interp-h"><span class="interp-n">${num}</span>${title}</div>
      ${inner}
    </div>`;

  const shinHTML = I.fortune.shinsal.length
    ? I.fortune.shinsal.map(s=>`<div class="shin-row">
        <span class="shin-name">${s.pos}지 ${s.name}</span>
        <span class="shin-mean">${s.meaning}</span></div>`).join('')
    : '<div class="interp-p" style="color:var(--mute)">특별히 잡히는 신살이 없습니다. 무난한 구성입니다.</div>';

  return `<div class="card interp">
    <h3>상세 풀이</h3>

    ${section('一', I.daymaster.title, `
      <div class="interp-p">${I.daymaster.body}</div>
      <div class="interp-tip">${I.daymaster.tip}</div>`)}

    ${section('二', I.balance.title, `
      <div class="interp-p">${I.balance.body}</div>
      <div class="interp-tip">${I.balance.remedy}</div>`)}

    ${section('三', I.useful.title, `
      <div class="interp-p">${I.useful.body}</div>
      ${I.useful.advice?`<div class="interp-tip">${I.useful.advice}</div>`:''}`)}

    ${section('四', I.fortune.title, `
      ${shinHTML}
      <div class="interp-p" style="margin-top:12px">
        <span class="tone tone-${I.fortune.daeun.tone}">${I.fortune.daeun.tone}</span>
        ${I.fortune.daeun.body}</div>
      <div class="interp-p">
        <span class="tone tone-${I.fortune.seun.tone}">${I.fortune.seun.tone}</span>
        ${I.fortune.seun.body}</div>`)}

// AI 심화 — Supabase Edge Function 호출 (없으면 안내)
async function requestAIInterpretation(p, ys, du, natal) {
  const zone = document.querySelector('#aiZone');
  const btn = document.querySelector('#aiGo');
  if (btn) { btn.disabled = true; btn.textContent = 'AI가 풀이 중…'; }

  // 명식을 구조화해 서버로 넘긴다 (원문 그대로가 아니라 계산 결과만)
  const payload = {
    pillars: { year:p.year, month:p.month, day:p.day, hour:p.hour },
    dayMaster: ys.me,
    strength: { score: ys.score, strong: ys.strong, extreme: ys.extreme,
      deukryeong: ys.deukryeong, deukji: ys.deukji, deukse: ys.deukse },
    elements: ys.count,
    yongsin: ys.yongsin, huisin: ys.huisin, gisin: ys.gisin, gusin: ys.gusin,
    primary: ys.primary,
    daeun: du.list.map(x=>({ age:x.age, gz:x.gz })),
    currentYear: nowKST().y,
    birth: { y:natal.y, m:natal.m, d:natal.d, h:natal.h, gender:natal.gender },
  };

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/interpret`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token || SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY,
      },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const msg = res.status === 404
        ? 'AI 풀이 기능이 아직 서버에 준비되지 않았습니다. (interpret 함수 미배포)'
        : `AI 풀이를 불러오지 못했습니다. (오류 ${res.status})`;
      throw new Error(msg);
    }

    const out = await res.json();
    const text = out.text || out.interpretation || '';
    if (!text) throw new Error('AI가 빈 응답을 보냈습니다.');

    // 문단 단위로 안전하게 렌더 (HTML 주입 방지)
    const paras = text.split(/\n{2,}/).map(pr =>
      `<p class="ai-p">${esc(pr).replace(/\n/g,'<br>')}</p>`).join('');
    zone.innerHTML = `<div class="ai-result">
      <div class="ai-badge">AI 심화 풀이</div>
      ${paras}
      <div class="interp-note">AI가 생성한 해석입니다. 참고용으로만 봐주세요.</div>
    </div>`;
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'AI로 더 깊이 풀어보기'; }
    const warn = document.createElement('div');
    warn.className = 'err';
    warn.textContent = e.message;
    zone.appendChild(warn);
  }
}

// 기존 저장 데이터 파싱 — 예전 자유입력 형식이나 문자열이 섞여 있어도
// 드롭다운이 읽을 수 있는 정규 형태 {y,m,d,h,mi,gender}로 변환한다.
function parseNatal(raw) {
  if (!raw || typeof raw !== 'object') return null;
  const num = (v) => { const n = parseInt(v, 10); return Number.isFinite(n) ? n : null; };
  let y = num(raw.y ?? raw.year ?? raw.birthYear);
  let m = num(raw.m ?? raw.month ?? raw.birthMonth);
  let d = num(raw.d ?? raw.day ?? raw.birthDay);
  // "1990-05-15" 같은 문자열도 허용
  if ((y==null||m==null||d==null) && typeof raw.date === 'string') {
    const mt = raw.date.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (mt) { y=+mt[1]; m=+mt[2]; d=+mt[3]; }
  }
  if (y==null || m==null || d==null) return null;
  // 범위 보정
  m = Math.min(12, Math.max(1, m));
  d = Math.min(daysInMonth(y, m), Math.max(1, d));
  let h = raw.h ?? raw.hour ?? null; h = (h==='' || h==null) ? null : num(h);
  if (h!=null) h = Math.min(23, Math.max(0, h));
  let mi = num(raw.mi ?? raw.minute) ?? 0; mi = Math.min(59, Math.max(0, mi));
  const gender = (raw.gender==='F'||raw.gender==='여') ? 'F' : 'M';
  return { y, m, d, h, mi, gender };
}

function natalObj() {
  const n = state.natal;

  // 기존 호환 필드(year/month/day/hour/yongsin=용신+희신 합본/gisin) 유지 +
  // 날짜 분석용 상세 정보를 .full 로 분리 보존한다.
  const obj = { year:p.year, month:p.month, day:p.day, hour:p.hour, yongsin:ys.yongsin, gisin:ys.gisin };
  try { obj.full = natalFull(p); } catch(e) { obj.full = null; }

}

// 지지 관계를 부호 있는 점수로. 양수=조화, 음수=충돌.
// 강도는 관계 종류별로 다르게(충>형>원진>해>파, 육합/삼합 계열은 조화).
const BRANCH_REL_WEIGHT = {
  '충': -1.0, '형': -0.8, '원진': -0.7, '해': -0.5, '파': -0.4, '육합': +0.7,
};
// 기둥 중요도: 월지 최우선, 일지 매우 중요, 시·년지 보조
const PILLAR_W = { '월': 1.0, '일': 0.85, '시': 0.45, '년': 0.4 };

// 특정 날짜의 일지가 원국 각 지지와 맺는 관계를 평가
function branchRelations(natalFullObj, dayBranch) {
  const P = natalFullObj.pillars;
  const list = [];
  const pil = [['년',P.year],['월',P.month],['일',P.day],['시',P.hour]].filter(([,v])=>v);
  for (const [name, gz] of pil) {
    const b = gz[1];
    const w = PILLAR_W[name] || 0.4;
    if (isChung(dayBranch, b))  list.push({ name, rel:'충', score: BRANCH_REL_WEIGHT['충']*w, branch:b });
    if (isHyung(dayBranch, b))  list.push({ name, rel:'형', score: BRANCH_REL_WEIGHT['형']*w, branch:b });
    if (isWonjin(dayBranch, b)) list.push({ name, rel:'원진', score: BRANCH_REL_WEIGHT['원진']*w, branch:b });
    if (isHae(dayBranch, b))    list.push({ name, rel:'해', score: BRANCH_REL_WEIGHT['해']*w, branch:b });
    if (isPa(dayBranch, b))     list.push({ name, rel:'파', score: BRANCH_REL_WEIGHT['파']*w, branch:b });
    if (isYukhap(dayBranch, b)) list.push({ name, rel:'육합', score: BRANCH_REL_WEIGHT['육합']*w, branch:b });
  }
  return list;
}

// 삼합/반합/방합 성립 여부 (원국 지지 + 그날 일지)
function hapWith(natalFullObj, dayBranch) {
  const P = natalFullObj.pillars;
  const natalBranches = [P.year,P.month,P.day,P.hour].filter(Boolean).map(g=>g[1]);
  const out = [];
  for (const { members, elem } of SAMHAP) {
    if (!members.includes(dayBranch)) continue;
    const hit = members.filter(m => m !== dayBranch && natalBranches.includes(m));
    if (hit.length >= 2) out.push({ type:'삼합', elem });
    else if (hit.length === 1) out.push({ type:'반합', elem });
  }
  for (const { members, elem } of BANGHAP) {
    if (!members.includes(dayBranch)) continue;
    const hit = members.filter(m => m !== dayBranch && natalBranches.includes(m));
    if (hit.length >= 2) out.push({ type:'방합', elem });
  }
  return out;
}

/**
 * 명식 흐름 점수 — 특정 날짜가 원국에 주는 영향을 -100~+100으로.
 * 우선순위: 월지·월령 > 일주·일지 > 용희신기구신 > 대운·세운 > 년·시 > 신살
 */
function evaluateNatalDate(natalFullObj, date, context = {}, purpose = 'decision') {
  const positiveReasons = [], negativeReasons = [], neutralReasons = [];
  if (!natalFullObj) return { natalScore:0, natalConfidence:0, positiveReasons, negativeReasons, neutralReasons };

  const dateKey = typeof date === 'string' ? date : isoKST(date);
  const transit = datePillarsFor(dateKey);
  const gz = transit.day;
  const dStem = gz[0], dBranch = gz[1];
  const me = natalFullObj.strength.me;
  const dStemElem = STEM_ELEM[STEMS.indexOf(dStem)];
  const dBranchElem = BRANCH_ELEM[BRANCHES.indexOf(dBranch)];

  let raw = 0;

  // (0) 그날의 연주·월주 배경 흐름.
  // 연주는 장기 배경, 월주는 실제 계절·월령 환경이므로 일주보다 낮되 분명한 비중으로 반영한다.
  const background = [
    { label:'연주', gz:transit.year, factor:0.35 },
    { label:'월주', gz:transit.month, factor:0.65 },
  ];
  for (const bg of background) {
    const sElem = STEM_ELEM[STEMS.indexOf(bg.gz[0])];
    const bElem = BRANCH_ELEM[BRANCHES.indexOf(bg.gz[1])];

    if (natalFullObj.yongsin.includes(sElem)) {
      raw += 22 * bg.factor;
      positiveReasons.push({ src:'명식', text:`그날 ${bg.label} ${bg.gz}의 천간 ${sElem}이(가) 용신 배경을 만듭니다.`, weight:bg.factor });
    } else if (natalFullObj.huisin.includes(sElem)) {
      raw += 12 * bg.factor;
      positiveReasons.push({ src:'명식', text:`그날 ${bg.label} ${bg.gz}의 천간 ${sElem}이(가) 희신으로 보조합니다.`, weight:bg.factor*0.7 });
    } else if (natalFullObj.gisin.includes(sElem)) {
      raw -= 22 * bg.factor;
      negativeReasons.push({ src:'명식', text:`그날 ${bg.label} ${bg.gz}의 천간 ${sElem}이(가) 기신 배경을 강화합니다.`, weight:bg.factor });
    } else if (natalFullObj.gusin.includes(sElem)) {
      raw -= 12 * bg.factor;
      negativeReasons.push({ src:'명식', text:`그날 ${bg.label} ${bg.gz}의 천간 ${sElem}이(가) 구신으로 기신을 돕습니다.`, weight:bg.factor*0.7 });
    }

    if (natalFullObj.yongsin.includes(bElem)) raw += 8 * bg.factor;
    else if (natalFullObj.gisin.includes(bElem)) raw -= 8 * bg.factor;

    const bgRels = branchRelations(natalFullObj, bg.gz[1]);
    if (bgRels.length) {
      const strongest = [...bgRels].sort((a,b)=>Math.abs(b.score)-Math.abs(a.score))[0];
      raw += strongest.score * 8 * bg.factor;
      const txt = `${bg.label} ${bg.gz}의 지지 ${bg.gz[1]}이(가) 원국 ${strongest.name}지 ${strongest.branch}과(와) ${strongest.rel}`;
      if (strongest.score < 0) negativeReasons.push({ src:'명식', text:`${txt} 관계입니다.`, weight:Math.abs(strongest.score)*bg.factor });
      else positiveReasons.push({ src:'명식', text:`${txt}으로 조화를 보입니다.`, weight:strongest.score*bg.factor });
    }
  }

  // 연주·월주·일주 사이의 내부 관계도 함께 본다.
  const transitPairs = [
    ['연주', transit.year, '월주', transit.month, 0.35],
    ['월주', transit.month, '일주', transit.day, 0.60],
    ['연주', transit.year, '일주', transit.day, 0.25],
  ];
  for (const [aName, aGz, bName, bGz, factor] of transitPairs) {
    const a = aGz[1], b = bGz[1];
    let rel = null, relScore = 0;
    if (isChung(a,b)) { rel='충'; relScore=-8; }
    else if (isHyung(a,b)) { rel='형'; relScore=-6; }
    else if (isWonjin(a,b)) { rel='원진'; relScore=-5; }
    else if (isHae(a,b)) { rel='해'; relScore=-4; }
    else if (isPa(a,b)) { rel='파'; relScore=-3; }
    else if (isYukhap(a,b)) { rel='육합'; relScore=6; }

    if (rel) {
      raw += relScore * factor;
      const text = `그날 ${aName} ${aGz}와 ${bName} ${bGz}가 ${rel} 관계`;
      if (relScore < 0) negativeReasons.push({ src:'명식', text:`${text}라 날짜 내부 흐름이 부딪힙니다.`, weight:Math.abs(relScore/8)*factor });
      else positiveReasons.push({ src:'명식', text:`${text}로 날짜 내부 흐름이 이어집니다.`, weight:(relScore/8)*factor });
    }
  }

  // (1) 일주의 지지 관계 — 계열 중복 방지: 같은 계열은 대표 1개만
  const rels = branchRelations(natalFullObj, dBranch);
  const seenFamily = {};
  for (const r of rels) {
    const fam = ['충','형','원진','해','파'].includes(r.rel) ? 'clash' : 'harmony';
    if (seenFamily[fam] && Math.abs(seenFamily[fam].score) >= Math.abs(r.score)) {
      // 이미 더 강한 대표가 있음 → 약하게만 가산(중복 방지)
      raw += r.score * 0.25;
      continue;
    }
    seenFamily[fam] = r;
    raw += r.score * 12;
    const txt = `일지 ${dBranch}이(가) 원국 ${r.name}지 ${r.branch}과(와) ${r.rel} 관계`;
    if (r.score < 0) negativeReasons.push({ src:'명식', text:`${txt}입니다.`, weight: Math.abs(r.score) });
    else positiveReasons.push({ src:'명식', text:`${txt}로 조화롭습니다.`, weight: r.score });
  }

  // (2) 삼합/반합/방합 → 특정 오행국 강화. 용희신국이면 +, 기구신국이면 -
  for (const h of hapWith(natalFullObj, dBranch)) {
    const isYong = natalFullObj.yongsin.includes(h.elem) || natalFullObj.huisin.includes(h.elem);
    const isGi = natalFullObj.gisin.includes(h.elem) || natalFullObj.gusin.includes(h.elem);
    const w = h.type === '삼합' ? 1 : h.type === '방합' ? 0.8 : 0.5;
    if (isYong) { raw += 10*w; positiveReasons.push({ src:'명식', text:`${h.type}으로 용희신 ${h.elem} 기운이 살아납니다.`, weight:w }); }
    else if (isGi) { raw -= 10*w; negativeReasons.push({ src:'명식', text:`${h.type}으로 기구신 ${h.elem} 기운이 강해집니다.`, weight:w }); }
    else neutralReasons.push({ src:'명식', text:`${h.type}으로 ${h.elem} 기운이 모입니다.` });
  }

  // (3) 그날 천간·지지 오행이 용희신/기구신인지 (용신 강, 희신 보조, 기신 강, 구신 보조)
  const scoreElem = (elem, label) => {
    if (natalFullObj.yongsin.includes(elem)) { raw += 22; positiveReasons.push({ src:'명식', text:`${label} ${elem}이(가) 용신에 해당해 흐름을 돕습니다.`, weight:1 }); }
    else if (natalFullObj.huisin.includes(elem)) { raw += 12; positiveReasons.push({ src:'명식', text:`${label} ${elem}이(가) 희신으로 용신을 보조합니다.`, weight:0.6 }); }
    else if (natalFullObj.gisin.includes(elem)) { raw -= 22; negativeReasons.push({ src:'명식', text:`${label} ${elem}이(가) 기신으로 균형을 흔듭니다.`, weight:1 }); }
    else if (natalFullObj.gusin.includes(elem)) { raw -= 12; negativeReasons.push({ src:'명식', text:`${label} ${elem}이(가) 구신으로 기신을 돕습니다.`, weight:0.6 }); }
  };
  scoreElem(dStemElem, '일진 천간');
  // 지지 오행은 천간보다 약하게
  if (natalFullObj.yongsin.includes(dBranchElem)) raw += 8;
  else if (natalFullObj.gisin.includes(dBranchElem)) raw -= 8;

  // (4) 대운·세운과 그날 일지의 충 (변동성)
  const F = natalFullObj;
  if (F.daeun && isChung(dBranch, F.daeun.gz[1])) {
    raw -= 10; negativeReasons.push({ src:'대운·세운', text:`현재 대운(${F.daeun.gz})과 일지가 충해 변동성이 커집니다.`, weight:0.8 });
  }
  if (F.seun && isChung(dBranch, F.seun.gz[1])) {
    raw -= 8; negativeReasons.push({ src:'대운·세운', text:`올해 세운(${F.seun.gz})과 일지가 충합니다.`, weight:0.6 });
  }
  if (F.daeun) {
    const daeElem = STEM_ELEM[STEMS.indexOf(F.daeun.gz[0])];
    if (natalFullObj.yongsin.includes(daeElem) && natalFullObj.yongsin.includes(dStemElem)) {
      raw += 6; positiveReasons.push({ src:'대운·세운', text:`현재 대운이 용신 운이라 이날 용신 기운이 더 살아납니다.`, weight:0.5 });
    }
  }

  // (5) 신살 — 보조점수만 (단독으로 길·흉 결정 금지)
  const shins = shinsal(F.pillars.day[0], F.pillars.day[1], dBranch, gz);
  for (const s of shins) {
    if (s === '천을귀인') { raw += 5; positiveReasons.push({ src:'명식', text:`천을귀인이 닿아 도움을 받기 쉽습니다.`, weight:0.3 }); }
    else if (['양인','백호','괴강'].includes(s)) { raw -= 4; neutralReasons.push({ src:'명식', text:`${s}의 강한 기운이 함께 작동합니다.` }); }
    else if (['역마','도화'].includes(s)) neutralReasons.push({ src:'명식', text:`${s}의 기운이 있습니다.` });
  }

  // (6) 목적별 가중 조정
  const purposeAdj = applyPurposeAdjustment(purpose, { natalFullObj, dStem, dBranch, dStemElem, dBranchElem, rels, positiveReasons, negativeReasons });
  raw += purposeAdj;

  // 정규화: raw를 -100~+100로 클램프
  const natalScore = Math.max(-100, Math.min(100, Math.round(raw)));
  // 신뢰도: 근거가 많고 강할수록 높다. 상한 0.85 (명식만으로 확신하지 않음)
  const reasonCount = positiveReasons.length + negativeReasons.length;
  const natalConfidence = Math.min(0.85, 0.35 + reasonCount * 0.09);

  return {
    natalScore, natalConfidence,
    positiveReasons, negativeReasons, neutralReasons,
    ganji: gz,
    pillars: { year:transit.year, month:transit.month, day:transit.day },
    purposeAdj,
  };
}

// 십성 → 오행 (일간 대비)
function tenGodElement(me, god) {
  const g2e = {
    비견: me, 겁재: me,
    식신: DRAIN[me], 상관: DRAIN[me],
    편재: CTRL[me], 정재: CTRL[me],
    편관: OVR_OF[me], 정관: OVR_OF[me],
    편인: GEN_OF[me], 정인: GEN_OF[me],
  };
  return g2e[god];
}

// 목적별로 특정 십성·관계를 가중. 반환값은 raw 점수에 더할 조정치.
function applyPurposeAdjustment(purpose, ctx) {
  const { natalFullObj:F, dStem, dBranch, dStemElem, positiveReasons, negativeReasons } = ctx;
  const me = F.strength.me;
  const god = tenGod(F.pillars.day[0], dStem);   // 그날 천간의 십성
  let adj = 0;
  const boost = (cond, amt, why) => { if (cond) { adj += amt; (amt>0?positiveReasons:negativeReasons).push({ src:'명식', text:why, weight:Math.min(1,Math.abs(amt)/10) }); } };

  const isYong = e => F.yongsin.includes(e) || F.huisin.includes(e);
  const isGi = e => F.gisin.includes(e) || F.gusin.includes(e);

  switch (purpose) {
    case 'contract': // 계약·금전 — 재성 흐름, 인성·관성 보조. 단 기신 재성 과다는 경계
      if (['편재','정재'].includes(god)) {
        if (isGi(dStemElem)) boost(true, -6, `재성의 날이나 재성이 기신이라 과욕은 경계해야 합니다.`);
        else boost(true, 8, `재성이 작동해 금전·계약 흐름에 힘이 실립니다.`);
      }
      if (['편인','정인','정관'].includes(god)) boost(true, 5, `문서·안정을 뜻하는 ${god}이(가) 계약을 뒷받침합니다.`);
      break;
    case 'exam': // 시험·면접 — 인성·관성·식상 조화
      if (['편인','정인'].includes(god)) boost(true, 8, `인성이 작동해 집중과 학습에 유리합니다.`);
      if (['정관','편관'].includes(god)) boost(true, 5, `관성이 규율과 긴장감을 더합니다.`);
      if (['식신','상관'].includes(god)) boost(true, 5, `식상이 표현력을 돕습니다.`);
      break;
    case 'start': // 시작·오픈 — 식상·재성 흐름
      if (['식신','상관'].includes(god)) boost(true, 7, `식상이 새로 시작하는 활동성을 돕습니다.`);
      if (['편재','정재'].includes(god) && !isGi(dStemElem)) boost(true, 6, `재성이 결실로 이어지는 흐름을 만듭니다.`);
      break;
    case 'move': // 이사·이동·여행 — 역마를 흉으로만 보지 않음
      { const shins = shinsal(F.pillars.day[0], F.pillars.day[1], dBranch, dStem+dBranch);
        if (shins.includes('역마')) {
          if (isYong(dStemElem)) boost(true, 7, `역마가 용희신과 함께 작동해 이동에 긍정적입니다.`);
          else boost(true, 2, `역마의 기운이 이동을 부릅니다.`);
        } }
      break;
    case 'relation': // 관계·만남 — 합 계열 우대, 원진·해 감점
      { const haps = hapWith(F, dBranch);
        if (haps.length) boost(true, 6, `합의 기운이 있어 만남·대화에 우호적입니다.`);
        if (isYukhap(dBranch, F.pillars.day[1])) boost(true, 5, `일지와 육합해 관계 흐름이 부드럽습니다.`); }
      break;
    case 'creative': // 창작·발표 — 식상·도화
      if (['식신','상관'].includes(god)) {
        if (isGi(dStemElem)) boost(true, -4, `식상의 날이나 기신이라 표현이 과열될 수 있습니다.`);
        else boost(true, 8, `식상이 살아나 창작·표현에 좋습니다.`);
      }
      { const shins = shinsal(F.pillars.day[0], F.pillars.day[1], dBranch, dStem+dBranch);
        if (shins.includes('도화')) boost(true, 3, `도화가 표현력과 매력을 더합니다.`); }
      break;
    case 'decision': default: // 중요한 결정 — 균형·안정, 강한 충형파 감점
      { const clash = ctx.rels.filter(r=>['충','형','파'].includes(r.rel));
        if (clash.length) boost(true, -6, `강한 충·형·파가 있어 중요한 결정은 서두르지 않는 편이 좋습니다.`);
        if (isYong(dStemElem)) boost(true, 5, `용희신이 보완되어 판단에 안정감이 있습니다.`); }
      break;
  }
  return adj;
}

// ============================================================
// 개인 기록 점수 + 명식 흐름 점수 결합
// ============================================================
// 표본 수에 따른 개인화 비중 (스펙 4항)
function personalWeight(sampleN, empConf) {
  let w;
  if (sampleN < 10) w = 0;
  else if (sampleN < 30) w = 0.35;
  else if (sampleN < 60) w = 0.55;
  else w = 0.70;
  // 적중 태그의 신뢰도가 낮으면 개인 비중을 자동으로 낮춘다
  if (w > 0 && empConf < 0.3) w *= (empConf / 0.3);
  return w;
}

// forecast의 predicted(대략 -4~+4 편차)를 -100~+100로 정규화
function empToScale(predicted) {
  return Math.max(-100, Math.min(100, Math.round(predicted * 33)));
}

// 개인 점수와 명식 점수를 합쳐 최종 판단을 낸다
function combineScores(empScale, empConf, natalScore, natalConf, sampleN) {
  let pw = personalWeight(sampleN, empConf);
  let nw = 1 - pw;
  // 두 점수가 강하게 충돌하면(부호 반대, 둘 다 큼) 최종 신뢰도를 낮춘다
  const conflict = (empScale * natalScore < 0) && Math.abs(empScale) > 25 && Math.abs(natalScore) > 25;
  const combined = pw > 0 ? (empScale * pw + natalScore * nw) : natalScore;

  // 충돌 유형 분류 (스펙 5항)
  let agreement = 'natal_only';
  if (pw > 0) {
    const eNeg = empScale < -15, ePos = empScale > 15;
    const nNeg = natalScore < -15, nPos = natalScore > 15;
    if (nNeg && eNeg) agreement = 'both_negative';
    else if (nNeg && ePos) agreement = 'natal_neg_emp_pos';
    else if (nPos && eNeg) agreement = 'natal_pos_emp_neg';
    else if (nPos && ePos) agreement = 'both_positive';
    else if (conflict) agreement = 'mixed';
    else agreement = 'neutral';
  }

  let confidence = pw > 0 ? (empConf * pw + natalConf * nw) : natalConf;
  if (conflict) confidence *= 0.7;   // 충돌 시 신뢰도 하향
  confidence = Math.min(0.9, confidence);

  return { combined: Math.round(combined), pw, nw, agreement, confidence, conflict };
}

// 개인화 단계 라벨
function personalizationStage(sampleN) {
  if (sampleN < 10) return '학습 전';
  if (sampleN < 30) return '학습 중';
  if (sampleN < 60) return '보통';

}

let __flowCache = null;

function computeDateFlow({ days = 180, purpose = 'decision', mode = 'risk' } = {}) {
  const nat = natalObj();
  const full = nat.full;
  const samples = collectSamples();
  const sampleN = samples.length;

  // 개인 기록 예측 (표본 10개 이상일 때만 의미)
  let empMap = new Map();
  let empConfByDate = new Map();
  if (sampleN >= 10) {
    try {
      const fc = forecast(nat, samples, { days, from:new Date(), minSamples:3, mode });
      for (const d of fc.days) {
        empMap.set(d.date, d);
        empConfByDate.set(d.date, d.confidence);
      }
    } catch(e) {}
  }

  const results = [];
  const from = new Date();
  for (let i = 0; i < days; i++) {
    const dt = new Date(from);
    dt.setDate(dt.getDate() + i);
    const dateKey = isoKST(dt);
    let natEval;
    try { natEval = evaluateNatalDate(full, dateKey, {}, purpose); }
    catch(e) {
      const p = datePillarsFor(dateKey);
      natEval = {
        natalScore:0, natalConfidence:0,
        positiveReasons:[], negativeReasons:[], neutralReasons:[],
        ganji:p.day,
        pillars:p,
      };
    }

    const emp = empMap.get(dateKey);
    const empScale = emp ? empToScale(emp.predicted) : 0;
    const empConf = emp ? emp.confidence : 0;

    const combo = combineScores(empScale, empConf, natEval.natalScore, natEval.natalConfidence, sampleN);

    results.push({
      date: dateKey,
      ganji: natEval.ganji,
      pillars: natEval.pillars || datePillarsFor(dateKey),
      combinedScore: combo.combined,
      confidence: combo.confidence,
      empScale, empConf,
      natalScore: natEval.natalScore, natalConf: natEval.natalConfidence,
      agreement: combo.agreement,
      pw: combo.pw, nw: combo.nw, conflict: combo.conflict,
      empReasons: emp ? emp.reasons : [],
      natalPos: natEval.positiveReasons, natalNeg: natEval.negativeReasons,
    });
  }
  return { results, sampleN, hasNatal: !!full };
}

const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---------- 백업 ----------
function exportBackup() {
  const dump = {
    format: 'manseryeok-diary/v1',
    exported: new Date().toISOString(),
    username: state.user?.email ?? null,
    rev: state.rev,
    data: { natal: state.natal, entries: state.entries },
  };
  const blob = new Blob([JSON.stringify(dump, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `manseryeok-backup-${isoKST(new Date())}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

async function importBackup(file, msgEl) {
  const show = (t, bad=true) => { msgEl.textContent = t; msgEl.className = 'err' + (bad?'':' ok'); };
  try {
    const dump = JSON.parse(await file.text());
    if (dump.format !== 'manseryeok-diary/v1') return show('이 앱의 백업 파일이 아닙니다.');
    const d = dump.data || {};
    if (typeof d.entries !== 'object' || d.entries === null) return show('백업 파일이 손상되었습니다.');

    // 병합: 같은 날짜는 현재 기록을 우선한다 (복원이 최근 기록을 덮지 않도록)
    const before = Object.keys(state.entries).length;
    state.entries = { ...d.entries, ...state.entries };
    state.natal = state.natal || d.natal || null;
    const added = Object.keys(state.entries).length - before;

    recomputeWarn();
    if (state.user) await pushNow();
    show(`복원 완료 — ${added}일 추가 (전체 ${Object.keys(state.entries).length}일)`, false);
    setTimeout(render, 900);
  } catch {
    show('파일을 읽을 수 없습니다.');
  }
}

function viewWarn() {
  if (!state.natal) return `<div class="empty"><div class="ic">命</div>
    <p>먼저 <b>내 명식</b>에서 사주를 입력해주세요.<br>명식이 있어야 날짜 흐름을 분석할 수 있습니다.</p></div>`;

  const seg = state.flowSeg || 'risk';
  const segBar = `<div class="seg-tabs">
    <button class="seg-tab ${seg==='risk'?'on':''}" data-seg="risk">주의일</button>
    <button class="seg-tab ${seg==='lucky'?'on':''}" data-seg="lucky">길일 찾기</button>
  </div>`;

  const body = seg === 'lucky' ? viewLucky() : viewRisk();

// ---------- 주의일 ----------
function viewRisk() {
  const days = 180;
  const flow = computeDateFlow({ days, purpose:'decision', mode:'risk' });
  const sampleN = flow.sampleN;
  const usingPersonal = sampleN >= 10;

  // 주의일: 결합 점수가 충분히 낮고 신뢰도 있는 날
  const picks = flow.results
    .filter(r => r.combinedScore <= -20 && r.confidence >= 0.3)
    .sort((a,b) => a.combinedScore - b.combinedScore)
    .slice(0, 14);

  const stageInfo = `<div class="card" style="margin-top:0"><h3>분석 방식</h3>
    <div class="kv"><span class="k">기준</span><span>${usingPersonal?'명식 + 개인 기록':'명식 기준'}</span></div>
    <div class="kv"><span class="k">사용 표본</span><span>날짜·시운 기록 ${sampleN}개</span></div>
    <div class="kv"><span class="k">개인화 단계</span><span>${personalizationStage(sampleN)}</span></div>
    <div class="kv"><span class="k">분석 기간</span><span>향후 ${days}일</span></div>
  </div>`;

  const notEnough = !usingPersonal ? `<div class="flow-hint">개인 기록 표본이 부족해 현재는 <b>명식 기준</b>으로 분석합니다.
    기록이 10개 이상 쌓이면 개인 패턴을 함께 반영하고, 쌓일수록 개인화 비중이 커집니다. (현재 ${sampleN}개)</div>` : '';

  let cards;
  if (!picks.length) {
    cards = `<div class="empty"><div class="ic">靜</div>
      <p>향후 ${days}일 안에 뚜렷하게 주의할 흐름이 잡히지 않았습니다.<br>
      <span style="font-size:13.2px">명식과 기록이 크게 치우치지 않는 무난한 기간입니다.</span></p></div>`;
  } else {
    cards = picks.map(r => flowCardHTML(r, 'risk')).join('');
  }

  return stageInfo + notEnough + `<div style="margin-top:16px">${cards}</div>` + flowFooter();
}

  const picks = flow.results
    .filter(r => r.combinedScore >= 20 && r.confidence >= 0.3)

  let cards;
  if (!picks.length) {
    cards = `<div class="empty"><div class="ic">尋</div>

// ---------- 흐름 카드 ----------
function flowCardHTML(r, mode, purpose) {
  const dd = Math.ceil((new Date(r.date+'T12:00') - new Date())/86400000);
  const ag = AGREEMENT_LABEL[r.agreement] || AGREEMENT_LABEL.natal_only;

  // 이유 최대 3개 (출처 배지). 부정/긍정 + 개인기록 통합, 계열 중복 제거
  const reasons = buildReasonLines(r, mode);

  // 등급
  let grade, gradeTone;
  const sc = r.combinedScore;
  if (mode === 'lucky') {
    grade = sc >= 55 ? '매우 잘 맞음' : sc >= 38 ? '잘 맞음' : sc >= 22 ? '무난함' : '혼합 흐름';
    gradeTone = sc >= 38 ? 'good' : sc >= 22 ? 'to' : 'mix';
  } else {
    grade = sc <= -55 ? '큰 변동 가능' : sc <= -38 ? '주의' : sc <= -20 ? '가벼운 주의' : '혼합 흐름';
    gradeTone = sc <= -38 ? 'bad' : sc <= -20 ? 'to' : 'mix';
  }

  // 강한 충돌 요소가 함께 있으면 경고 병기
  const strongClash = r.natalNeg.some(x => /충|형|원진/.test(x.text) && x.weight >= 0.7);
  const mixNote = (mode==='lucky' && strongClash)
    ? `<div class="flow-mix">좋은 요소가 있으나 일부 충돌 요소도 함께 있습니다.</div>` : '';

  // 추천 시간대 (길일이고 시운 기록 있을 때)
  const hourRec = mode === 'lucky' ? recommendHours(r.date, purpose) : '';

  const barW = Math.min(100, Math.abs(sc));
  const barColor = mode==='lucky' ? 'var(--ok)' : 'var(--alert)';
  const p = r.pillars || datePillarsFor(r.date);
  const fullGz = [
    ['년', p.year], ['월', p.month], ['일', p.day],
  ].map(([suffix, gz]) =>
    `<span class="flow-gz-unit"><span class="e-${elemOfStem(gz[0])}">${HS(gz[0])}</span><span class="e-${elemOfBranch(gz[1])}">${HB(gz[1])}</span>${suffix}</span>`
  ).join('');

  return `<div class="flow-card ${mode}">
    <div class="flow-top">
      <div class="flow-date">
        <span class="dt">${r.date}</span>
        <span class="gz">${fullGz}</span>
        <span class="dday">D-${dd<0?0:dd}</span>
      </div>
      <span class="flow-grade tone-${gradeTone}">${grade}</span>
    </div>
    ${mode==='lucky'?`<div class="flow-purpose">${esc(PURPOSES.find(p=>p.id===purpose)?.label||'')}</div>`:''}
    <div class="flow-bar"><i style="width:${barW}%;background:${barColor}"></i></div>
    <div class="flow-scores">
      <span>종합 <b class="${sc<0?'neg':'pos'}">${sc>0?'+':''}${sc}</b></span>
      <span>신뢰도 ${(r.confidence*100).toFixed(0)}%</span>
      <span>개인 ${r.empScale>0?'+':''}${r.empScale}</span>
      <span>명식 ${r.natalScore>0?'+':''}${r.natalScore}</span>
    </div>
    <div class="flow-agree tone-${ag.tone}">${ag.txt}</div>
    <div class="flow-reasons">${reasons}</div>
    ${mixNote}
    ${hourRec}
  </div>`;
}

// 이유 문장 3개 생성 (출처 배지 포함, 계열 중복 제거)
function buildReasonLines(r, mode) {
  const lines = [];
  const seen = new Set();
  const add = (src, text) => {
    const fam = text.replace(/[0-9.]/g,'').slice(0,10);
    if (seen.has(fam)) return;
    seen.add(fam);
    const cls = src==='내 기록'?'src-emp':src==='대운·세운'?'src-luck':'src-natal';
    lines.push(`<div class="reason"><span class="src ${cls}">${src}</span>${esc(text)}</div>`);
  };

  // 개인 기록 이유
  for (const er of (r.empReasons||[])) {
    if (lines.length >= 3) break;
    const dir = er.delta < 0 ? '낮았습니다' : '좋았습니다';
    add('내 기록', `${er.tag}이(가) 있던 기록 ${er.n}회에서 평소보다 평균 ${Math.abs(er.delta).toFixed(1)}점 ${dir}.`);
  }
  // 명식 이유 (모드에 맞는 방향 우선)
  const natReasons = mode==='lucky'
    ? [...r.natalPos, ...r.natalNeg]
    : [...r.natalNeg, ...r.natalPos];
  for (const nr of natReasons) {
    if (lines.length >= 3) break;
    add(nr.src === '대운·세운' ? '대운·세운' : '명식', nr.text);
  }
  if (!lines.length) lines.push(`<div class="reason"><span class="src src-natal">명식</span>뚜렷한 치우침이 없는 무난한 날입니다.</div>`);
  return lines.join('');
}

// 추천 시간대 — 그날 12시주 × 명식 관계 + 시운 기록 패턴
function recommendHours(dateKey, purpose) {
  const nat = natalObj();
  const full = nat.full;
  if (!full) return '';

  // 시운 기록 표본
  const samples = collectSamples();
  const hourSamples = samples.filter(s => s.scope === 'hour');
  const hasHourData = hourSamples.length >= 8;

  const scored = [];
  for (const b of HOUR_BRANCHES) {
    let timed, gz;
    try { timed = hourSajuFor(dateKey, b); gz = timed.hour; } catch(e) { continue; }
    // 명식 관계: 그 시주 지지가 용희신 오행이면 +, 기구신이면 -
    const hourElem = BRANCH_ELEM[BRANCHES.indexOf(gz[1])];
    let sc = 0;
    if (full.yongsin.includes(hourElem)) sc += 2;
    else if (full.huisin.includes(hourElem)) sc += 1;
    else if (full.gisin.includes(hourElem)) sc -= 2;
    else if (full.gusin.includes(hourElem)) sc -= 1;
    // 그 시지가 원국 일지와 육합이면 +
    if (isYukhap(gz[1], full.pillars.day[1])) sc += 1;
    if (isChung(gz[1], full.pillars.day[1])) sc -= 1;

    // 시운 기록 패턴: 같은 시주(날짜의 일간까지 반영)가 우선이며,
    // 표본이 부족할 때만 같은 지지 시간대 기록으로 보완한다.
    if (hasHourData) {
      const samePillar = hourSamples.filter(s => s.hourGanji === timed.hour);
      const sameBranch = hourSamples.filter(s => s.branch === b);
      const same = samePillar.length >= 2 ? samePillar : sameBranch;
      if (same.length >= 2) {
        const avg = same.reduce((a,s)=>a+composite(s),0)/same.length;
        sc += Math.max(-2, Math.min(2, avg));
      }
    }
    scored.push({ branch:b, gz, sc });
  }
  const top = scored.filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,3);
  if (!top.length) return '';

  const label = hasHourData ? '명식 + 시운 기록 추천' : '명식 기준 추천 시간';
  const chips = top.map(t => {
    const hr = HOUR_RANGES.find(r=>r[0]===t.branch);
    return `<span class="hour-chip">${t.branch}시 <span class="hr-time">${hr[1]}~${hr[2]}</span></span>`;
  }).join('');
  return `<div class="hour-rec"><div class="hour-rec-lbl">추천 시간대 <span class="hint">${label}</span></div>
    <div class="hour-rec-list">${chips}</div></div>`;
}

function flowFooter() {
  return `<div class="note" style="margin-top:18px">이 분석은 사용자의 명식과 누적 기록에서 발견된 경향을 보여주는 참고 자료입니다.
  의료·법률·투자·계약 등 중요한 결정은 현실적인 조건과 전문가의 의견을 함께 확인하세요.<br><br>
  점수는 AI가 아니라 해당 날짜의 연주·월주·일주 전체 명식 계산과 누적 기록 통계로 산출됩니다.
  확정적인 길흉이 아니라 흐름의 경향입니다.</div>`;
}

// 캘린더용 주의일/길일 집합 재계산
function recomputeWarn() {
  state.warnSet = new Set();
  state.luckSet = new Set();
  if (!state.natal) return;
  invalidateFlowCache();
  try {
    const risk = computeDateFlow({ days:120, purpose:'decision', mode:'risk' });
    for (const r of risk.results) if (r.combinedScore <= -25 && r.confidence >= 0.32) state.warnSet.add(r.date);
    const luck = computeDateFlow({ days:120, purpose: state.flowPurpose||'decision', mode:'opportunity' });
    for (const r of luck.results) if (r.combinedScore >= 25 && r.confidence >= 0.32) state.luckSet.add(r.date);
  } catch(e) {}
}

    state.tab=t.dataset.t; closeNav(); render(); };

  if (state.tab==='cal') {
    $('#pm').onclick = ()=>{ state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()-1,1); render(); };
    $('#nm').onclick = ()=>{ state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()+1,1); render(); };
    $('#sy').onchange = e => { state.cal=new Date(+e.target.value, state.cal.getMonth(), 1); render(); };
    $('#sm').onchange = e => { state.cal=new Date(state.cal.getFullYear(), +e.target.value, 1); render(); };
    if ($('#tdy')) $('#tdy').onclick = ()=>{ const n=nowKST(); state.cal=new Date(n.y,n.m,1); render(); };
    const si=$('#segI'), sp=$('#segPop');
    if (si) si.onclick = e => { e.stopPropagation();
      const open = sp.hasAttribute('hidden');
      sp.toggleAttribute('hidden', !open);
      si.setAttribute('aria-expanded', open);
      si.classList.toggle('on', open);
    };
    document.addEventListener('click', e => {
      if (sp && !sp.hasAttribute('hidden') && !sp.contains(e.target) && e.target !== si) {
        sp.setAttribute('hidden',''); si?.classList.remove('on'); si?.setAttribute('aria-expanded','false');
      }
    }, { once: true });
    $('#grid').onclick = e => { const c=e.target.closest('.cell'); if(!c||c.classList.contains('pad'))return;
      openSheet(c.dataset.d); };
  }
  if (state.tab==='natal') {
    // 연/월 변경 시 '일' 목록을 실제 말일에 맞춰 다시 채운다 (2월 30일 등 방지)
    const syncDays = () => {
      const y=+$('#iy').value, m=+$('#im').value;
      const maxD = daysInMonth(y, m);
      const sel = $('#id'); const prev = +sel.value;
      sel.innerHTML = Array.from({length:maxD},(_,i)=>{const d=i+1;
        return `<option value="${d}"${d===Math.min(prev,maxD)?' selected':''}>${d}일</option>`;}).join('');
    };
    if ($('#iy')) $('#iy').onchange = syncDays;
    if ($('#im')) $('#im').onchange = syncDays;

    if ($('#mk')) $('#mk').onclick = () => {
      const err = (t)=>{ const e=$('#natErr'); if(e){e.textContent=t;e.className='err';} };
      const y=+$('#iy').value, m=+$('#im').value, d=+$('#id').value;
      const hv=$('#ih').value, h = hv===''?null:+hv, mi=+($('#imi').value||0);
      // 드롭다운이라 범위는 안전하지만 방어적으로 재검증
      if(!y||!m||!d){ return err('생년월일을 모두 선택해주세요.'); }
      if(m<1||m>12){ return err('월이 올바르지 않습니다.'); }
      if(d<1||d>daysInMonth(y,m)){ return err(`${y}년 ${m}월은 ${daysInMonth(y,m)}일까지 있습니다.`); }
      if(h!=null && (h<0||h>23)){ return err('시가 올바르지 않습니다.'); }
      if(mi<0||mi>59){ return err('분이 올바르지 않습니다.'); }
      const today = nowKST();
      if(y>today.y || (y===today.y && (m>today.m+1 || (m===today.m+1 && d>today.d)))){
        return err('아직 오지 않은 날짜입니다.');
      }
      state.natal={y,m,d,h,mi,gender:$('#ig').value}; recomputeWarn(); queueSave(); render();
    };
    if ($('#reset')) $('#reset').onclick = ()=>{ state.natal=null; state.warnSet=new Set(); queueSave(); render(); };
    if ($('#aiGo')) $('#aiGo').onclick = () => {
      const nn = state.natal;
      const bp = computeSaju(fromKST(nn.y, nn.m-1, nn.d, nn.h ?? 12, nn.mi ?? 0), nn.h, nn.mi);
      requestAIInterpretation(bp, analyzeYongsinFull(bp), computeDaeun(bp, fromKST(nn.y, nn.m-1, nn.d, nn.h ?? 12, nn.mi ?? 0), nn.gender), nn);
    };
  }
  if (state.tab==='acct') bindAccount();
  if (state.tab==='warn') {
    document.querySelectorAll('.seg-tab').forEach(b => b.onclick = () => {
      state.flowSeg = b.dataset.seg; render();
    });
    const purSel = $('#purSel');
    if (purSel) purSel.onchange = () => { state.flowPurpose = purSel.value; recomputeWarn(); render(); };
    const rangeSel = $('#rangeSel');
    if (rangeSel) rangeSel.onchange = () => { state.flowRange = +rangeSel.value; render(); };
  }
}

// ---------- 계정 핸들러 ----------
function bindAccount() {
  const bkOut = $('#bkOut'), bkIn = $('#bkIn'), bkFile = $('#bkFile');
  if (bkOut) bkOut.onclick = exportBackup;
  if (bkIn)  bkIn.onclick  = () => bkFile.click();
  if (bkFile) bkFile.onchange = e => { const f=e.target.files[0]; if(f) importBackup(f, $('#bkMsg')); e.target.value=''; };

  if ($('#googleLogin')) {
    $('#googleLogin').onclick = loginWithGoogle;
  }

  let mode = 'login';
  const err = (el, t) => { const e=$(el); if(e){ e.textContent=t; e.className='err'; } };

  if ($('#aswap')) $('#aswap').onclick = () => {
    mode = mode==='login' ? 'signup' : 'login';
    $('#authTtl').textContent = mode==='login' ? '로그인' : '가입하기';
    $('#ago').textContent     = mode==='login' ? '로그인' : '가입하고 시작하기';
    $('#aswap').textContent   = mode==='login' ? '계정이 없으신가요? 가입하기' : '이미 계정이 있으신가요? 로그인';
    $('#ap').setAttribute('autocomplete', mode==='login'?'current-password':'new-password');
    err('#aerr','');
  };

  if ($('#ago')) $('#ago').onclick = async () => {
    const u = $('#au').value.trim(), p = $('#ap').value;
    if (!u || !p) return err('#aerr','이메일과 비밀번호를 입력해주세요.');
    $('#ago').disabled = true;
    try {
      await (mode==='login' ? API.login(u,p) : API.signup(u,p));
      // 가입 시 이메일 인증이 필요하면 세션이 없을 수 있다
      const me = await API.me();
      if (!me.user) {
        err('#aerr','가입 확인 메일을 보냈습니다. 메일함을 확인해주세요.');
        $('#ago').disabled = false;
        return;
      }
      state.user = me.user; state.rev = me.rev ?? 0;
      const sd = me.data || { natal:null, entries:{} };
      // 로그인 전 로컬에 쓴 기록이 있으면 서버 기록과 합친다
      const localCount = Object.keys(state.entries).length;
      state.entries = { ...(sd.entries||{}), ...state.entries };
      state.natal = state.natal || sd.natal || null;
      state.sync = 'idle';
      recomputeWarn();
      if (localCount) await pushNow();
      render();
    } catch (e) {
      err('#aerr', e.message);
      $('#ago').disabled = false;
    }
  };

  if ($('#alo')) $('#alo').onclick = async () => {
    try { await API.logout(); } catch {}
    state.user=null; state.rev=0; state.sync='off';
    state.entries={}; state.natal=null; state.warnSet=new Set();
    render();
  };

  if ($('#pgo')) $('#pgo').onclick = async () => {
    const c=$('#pc').value, n=$('#pn').value;
    if(!c||!n) return err('#perr','두 칸 모두 입력해주세요.');
    $('#pgo').disabled=true;
    try { await API.passwd(c,n); const e=$('#perr'); e.textContent='비밀번호를 변경했습니다.'; e.className='err ok';
      $('#pc').value=''; $('#pn').value=''; }
    catch(e){ err('#perr', e.message); }
    $('#pgo').disabled=false;
  };

  if ($('#dgo')) $('#dgo').onclick = async () => {
    const p=$('#dp').value;
    if(!p) return err('#derr','비밀번호를 입력해주세요.');
    if(!confirm('정말 계정을 삭제할까요? 모든 기록이 사라지며 되돌릴 수 없습니다.')) return;
    try { await API.del(p); state.user=null; state.entries={}; state.natal=null; state.rev=0; state.sync='off'; state.tab='today'; render(); }
    catch(e){ err('#derr', e.message); }
  };
}

const openNav = ()=>{ $('#side').classList.add('on'); $('#scrim').classList.add('on'); };
const closeNav = ()=>{ $('#side').classList.remove('on'); $('#scrim').classList.remove('on'); };
const goHome = ()=>{ state.tab='today'; closeNav(); render(); };
$('#brandHome').onclick = goHome;
$('#brandHome').onkeydown = e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
};
$('#bg').onclick = openNav;
$('#scrim').onclick = closeNav;
$('#sbg').onclick = closeSheet;
$('#shX').onclick = closeSheet;
$('#hsbg').onclick = closeHourSheet;
$('#hsX').onclick = closeHourSheet;

// ===== Supabase 로그인 세션 유지 =====
// 부팅 시 저장된 세션을 먼저 확인한다. 세션이 있으면 즉시 로그인 UI로,
// 없으면 정상 비로그인 UI로 시작한다. (세션 확인 전에 '로그인 실패'를 띄우지 않는다)
let __authListenerBound = false;

async function boot() {
  state.sync = 'checking';   // 세션 확인 중
  try {
    // getSession: 로컬에 저장된 세션을 동기적으로 복구 (팝업을 다시 열지 않음)
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (session?.user) {
      const me = await API.me();
      state.user = me.user;
      state.rev = me.rev ?? 0;
      state.natal = parseNatal(me.data?.natal) ?? null;
      state.entries = me.data?.entries ?? {};
      state.sync = 'idle';
      recomputeWarn();
    } else {
      // 정상 비로그인 — 오류가 아니다
      state.user = null;
      state.rev = 0;
      state.sync = 'off';
    }
  } catch (error) {
    console.error('세션 확인 실패:', error);
    state.user = null;
    state.sync = 'off';   // 네트워크 문제여도 비로그인으로 두고 오류로 표시하지 않음
  }

  // 콜백 URL의 인증 파라미터 정리 (detectSessionInUrl 처리 후 주소창 청소)
  if (location.hash.includes('access_token') || location.search.includes('code=')) {
    history.replaceState(null, '', location.pathname);
  }

  render();
}

// ===== Supabase 로그인 세션 유지 =====
// onAuthStateChange 리스너는 단 한 번만 등록한다 (render 반복 호출과 무관).
if (!__authListenerBound) {
  __authListenerBound = true;
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    try {
      if (event === 'SIGNED_OUT') {
        state.user = null; state.rev = 0; state.sync = 'off';
        state.entries = {}; state.natal = null; state.warnSet = new Set();
        render();
        return;
      }
      // SIGNED_IN · TOKEN_REFRESHED · INITIAL_SESSION · USER_UPDATED
      if (session?.user) {
        const me = await API.me();
        state.user = me.user;
        state.rev = me.rev ?? 0;
        // 로그인 직전 로컬 기록이 있으면 병합 (덮어쓰기 방지)
        const localEntries = state.entries || {};
        const localNatal = state.natal;
        state.natal = parseNatal(me.data?.natal) ?? localNatal ?? null;
        state.entries = { ...(me.data?.entries ?? {}), ...localEntries };
        state.sync = 'idle';
        recomputeWarn();
        render();
      }
    } catch (error) {
      console.error('로그인 상태 반영 실패:', error);
    }
  });
}

boot();


</script>
