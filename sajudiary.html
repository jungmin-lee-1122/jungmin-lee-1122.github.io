    rel = `<div class="f-lbl">내 명식과의 관계</div><div class="day-tags">
      ${tags.filter(t=>!t.startsWith('일주:')).map(t=>`<span class="tag ${bad(t)?'bad':good(t)?'good':''}">${t}</span>`).join('')}
    </div>`;
  }

  $('#shBody').innerHTML = `
    ${myeongsikHTML({...p, hour:null}, false)}
    ${rel}
    <div class="f-lbl">기분 <span class="hint">여러 개 선택할 수 있어요</span></div>
    ${moodPickerHTML('moods', curMoods)}
    <div class="f-lbl">몸상태 (5 = 가장 좋음)</div>
    ${bodyPickerHTML('bodies', e.body)}
    <div class="f-lbl">메모</div>
    <textarea id="memo" placeholder="오늘 어땠나요">${esc(e.memo||'')}</textarea>

    <div class="f-lbl" style="margin-top:26px">시운별 일기 <span class="hint">시간대를 눌러 시(時)별로 기록</span></div>
    <div class="hour-lead" id="hourLead">시(時)를 선택해 그 시간대의 기분·몸상태를 따로 기록할 수 있어요.
    시주 간지는 날짜에 따라 자동 계산됩니다.</div>
    ${hourGridHTML(k, __sheetDraft)}

    <button class="btn" id="save">기록 저장</button>
    ${state.entries[k]?'<button class="btn ghost" id="del">이 기록 지우기</button>':''}
  `;

  let sel = { mood: [...curMoods], body: e.body };
  bindMoodPicker($('#moods'), sel);
  bindBodyPicker($('#bodies'), sel);

  // 시운 그리드 클릭 → 시별 서브시트 열기
  const grid = $('#hourGrid');
  grid.onclick = ev => { const c=ev.target.closest('.hcell'); if(!c)return; openHourSheet(k, c.dataset.b); };
  grid.onkeydown = ev => { if(ev.key===' '||ev.key==='Enter'){ev.preventDefault(); const c=ev.target.closest('.hcell'); if(c)openHourSheet(k,c.dataset.b);} };

  $('#save').onclick = () => {
    const memo = $('#memo').value.trim();
    // 내용이 담긴 시별 일기만 남긴다
    const hours = {};
    for (const [b,he] of Object.entries(__sheetDraft)) {
      if (moodList(he).length || he.body!=null || (he.memo&&he.memo.trim())) hours[b]=he;
    }
    const hasHours = Object.keys(hours).length>0;
    if (!sel.mood.length && !sel.body && !memo && !hasHours) {
      // 아무것도 없으면 기존 기록 삭제
      if (state.entries[k]) { delete state.entries[k]; recomputeWarn(); queueSave(); }
      closeSheet(); render(); return;
    }
    state.entries[k] = { mood: sel.mood, body:sel.body, memo, ...(hasHours?{hours}:{}) };
    recomputeWarn(); queueSave(); closeSheet(); render();
  };
  if ($('#del')) $('#del').onclick = () => { delete state.entries[k]; recomputeWarn(); queueSave(); closeSheet(); render(); };

  $('#sheet').classList.add('on'); $('#sbg').classList.add('on');
}

// ---------- 시별 서브 시트 ----------
function openHourSheet(dateKey, branch) {
  const gz = hourPillarFor(dateKey, branch);
  const hr = HOUR_RANGES.find(r=>r[0]===branch);
  const he = __sheetDraft[branch] || { mood:[], body:null, memo:'' };
  const curMoods = moodList(he);
  let rel = '';
  if (state.natal) {
    const tags = extractTags(natalObj(), gz);
    const bad = t => /^(충|원진|형|해|파)/.test(t) || /기신운|구신운|편관투출|상관투출/.test(t);
    const good = t => /육합|용신운|희신운|천을귀인/.test(t);
    const shown = tags.filter(t=>!t.startsWith('일주:'));
    if (shown.length) rel = `<div class="f-lbl">이 시주와 내 명식의 관계</div><div class="day-tags">
      ${shown.map(t=>`<span class="tag ${bad(t)?'bad':good(t)?'good':''}">${t}</span>`).join('')}</div>`;
  }

  $('#hsGz').innerHTML = `${branch}시 <span class="e-${elemOfStem(gz[0])}">${H(gz[0])}</span><span class="e-${elemOfBranch(gz[1])}">${H(gz[1])}</span>`;
  $('#hsRange').textContent = `${hr[1]} ~ ${hr[2]}`;
  $('#hsBody').innerHTML = `
    ${rel}
    <div class="f-lbl">기분 <span class="hint">여러 개 선택 가능</span></div>
    ${moodPickerHTML('hMoods', curMoods)}
    <div class="f-lbl">몸상태</div>
    ${bodyPickerHTML('hBodies', he.body)}
    <div class="f-lbl">메모</div>
    <textarea id="hMemo" placeholder="이 시간대는 어땠나요">${esc(he.memo||'')}</textarea>
    <button class="btn" id="hSave">이 시간대 기록</button>
    ${(curMoods.length||he.body!=null||he.memo)?'<button class="btn ghost" id="hClear">이 시간대 기록 지우기</button>':''}
  `;
  const hsel = { mood:[...curMoods], body: he.body };
  bindMoodPicker($('#hMoods'), hsel);
  bindBodyPicker($('#hBodies'), hsel);
  $('#hSave').onclick = () => {
    const memo = $('#hMemo').value.trim();
    __sheetDraft[branch] = { mood: hsel.mood, body: hsel.body, memo };
    refreshHourGrid(dateKey);
    closeHourSheet();
  };
  if ($('#hClear')) $('#hClear').onclick = () => {
    delete __sheetDraft[branch]; refreshHourGrid(dateKey); closeHourSheet();
  };
  $('#hsheet').classList.add('on'); $('#hsbg').classList.add('on');
}
function closeHourSheet(){ $('#hsheet').classList.remove('on'); $('#hsbg').classList.remove('on'); }
function refreshHourGrid(dateKey){
  const g = $('#hourGrid');
  if (!g) return;
  g.outerHTML = hourGridHTML(dateKey, __sheetDraft);
  const ng = $('#hourGrid');
  ng.onclick = ev => { const c=ev.target.closest('.hcell'); if(!c)return; openHourSheet(dateKey, c.dataset.b); };
  ng.onkeydown = ev => { if(ev.key===' '||ev.key==='Enter'){ev.preventDefault(); const c=ev.target.closest('.hcell'); if(c)openHourSheet(dateKey,c.dataset.b);} };
}
const closeSheet = () => { $('#sheet').classList.remove('on'); $('#sbg').classList.remove('on'); state.sel=null; };

// 상세 풀이 — 규칙 기반 명식 해석 엔진
// 명식의 계산 결과(일간, 오행, 용신, 신살, 대운/세운)를 문장으로 풀어낸다.
// LLM 없이 즉시 동작하며, "AI 심화" 버튼으로 서버 해석을 덧붙일 수 있다.

// 십성별 성격 키워드 (일간 대비 오행 관계)
const DAYMASTER_TRAITS = {
  목: { nature:'나무', keyword:'성장과 확장', pos:'추진력이 있고 곧으며 미래를 향해 뻗어가는 기질', neg:'고집이 세고 융통성이 부족해질 수 있는 면', tip:'방향이 막히면 부러지기 쉬우니 유연함을 함께 기르면 좋습니다.' },
  화: { nature:'불', keyword:'표현과 확산', pos:'밝고 열정적이며 사람을 끌어당기는 기질', neg:'감정 기복이 크고 성급해질 수 있는 면', tip:'타오른 뒤 꺼지지 않도록 꾸준함을 더하면 힘이 오래갑니다.' },
  토: { nature:'흙', keyword:'포용과 중재', pos:'믿음직하고 두루 품으며 중심을 잡는 기질', neg:'변화를 꺼리고 답답하게 느껴질 수 있는 면', tip:'너무 머무르지 말고 때로 흐름에 몸을 맡기면 좋습니다.' },
  금: { nature:'쇠', keyword:'결단과 정리', pos:'분명하고 원칙이 서 있으며 마무리가 야무진 기질', neg:'날카롭고 차갑게 비칠 수 있는 면', tip:'단단함이 지나치면 부러지니 부드러움을 덧대면 좋습니다.' },
  수: { nature:'물', keyword:'지혜와 유연', pos:'총명하고 임기응변에 능하며 상황에 잘 스며드는 기질', neg:'속을 알기 어렵고 마음이 흔들리기 쉬운 면', tip:'흐름에 휩쓸리지 않도록 중심을 잡아두면 좋습니다.' },
};

const ELEM_ROLE_LABEL = {
  same:'비겁(같은 기운, 자기 세력)',
  gen:'인성(나를 돕는 기운)',
  drain:'식상(내가 표현하는 기운)',
  ctrl:'재성(내가 다루는 기운)',
  ovr:'관성(나를 다스리는 기운)',
};

function elemRole(me, e) {
  if (e === me) return 'same';
  if (e === GEN_OF[me]) return 'gen';
  if (e === DRAIN[me]) return 'drain';
  if (e === CTRL[me]) return 'ctrl';
  if (e === OVR_OF[me]) return 'ovr';
  return null;
}

// 신살별 짧은 의미
const SHINSAL_MEANING = {
  천을귀인:'하늘이 돕는 귀인. 어려울 때 뜻밖의 도움을 받는 복.',
  도화:'사람을 끄는 매력. 인기와 이성 인연이 따르나 구설도 함께.',
  역마:'움직임과 이동의 기운. 여행·이주·변동이 잦고 활동적.',
  화개:'예술과 종교, 고독의 별. 깊이 파고드는 재능이 있음.',
  양인:'강한 칼의 기운. 결단력과 추진력이 크나 과하면 다툼.',
  백호:'격렬한 기운. 강렬한 추진력이나 사고·충돌을 조심.',
  괴강:'우두머리의 기상. 카리스마가 크나 극단으로 치우치기 쉬움.',
};

/**
 * 명식 전체를 구조화된 풀이 데이터로 변환.
 * viewNatal이 이미 계산한 p, ys, du를 받아서 재사용한다.
 */
function buildInterpretation(p, ys, du, natal) {
  const me = ys.me;
  const dt = DAYMASTER_TRAITS[me];
  const total = ys.total || Object.values(ys.count).reduce((a,b)=>a+b,0);

  // --- 1. 일간·성격 기질 ---
  const neutral = !ys.extreme && ys.score >= 1.8 && ys.score < 2.8;
  const strengthWord = ys.extreme === 'super_strong' ? '매우 강한'
    : ys.extreme === 'super_weak' ? '매우 약한'
    : neutral ? '강약이 엇비슷한(중화에 가까운)'
    : ys.strong ? '강한' : '약한';
  const daymaster = {
    stem: p.day[0],
    elem: me,
    title: `${p.day[0]}(${me}) 일간 — ${dt.nature}의 기질`,
    body: `당신은 ${dt.nature}에 비유되는 ${me} 일간입니다. ${dt.keyword}을(를) 본질로 하며, ${dt.pos}이 있습니다. `
      + `사주 안에서 일간의 힘은 ${strengthWord} 편입니다(득령 ${ys.deukryeong?'○':'×'}·득지 ${ys.deukji?'○':'×'}·득세 ${ys.deukse?'○':'×'}, ${ys.score.toFixed(1)}/4). `
      + (neutral
          ? `강하지도 약하지도 않은 균형에 가까워, 상황에 따라 유연하게 대응하는 힘이 있습니다. 어느 한쪽으로 치우친 운이 올 때 그 영향을 특히 잘 탑니다.`
          : ys.strong
          ? `기운이 넉넉하니 밖으로 펼치고 나눠주는 쪽이 잘 맞습니다. 다만 ${dt.neg}은 주의가 필요합니다.`
          : `기운이 여유롭지 않으니 무리하기보다 돕는 환경과 사람을 곁에 두는 편이 좋습니다. ${dt.neg}이 드러날 수 있어 스스로를 돌보는 습관이 중요합니다.`),
    tip: dt.tip,
  };

  // --- 2. 오행 균형과 보완법 ---
  const sorted = Object.entries(ys.count).sort((a,b)=>b[1]-a[1]);
  const strongest = sorted[0], weakest = sorted[sorted.length-1];
  const missing = Object.entries(ys.count).filter(([,v])=>v < total*0.08).map(([e])=>e);
  const balance = {
    title: '오행의 균형',
    strongest: strongest[0], weakest: weakest[0],
    missing,
    body: `오행 중 <b class="e-${strongest[0]}">${strongest[0]}</b>이(가) 가장 강하고(${strongest[1].toFixed(1)}), `
      + `<b class="e-${weakest[0]}">${weakest[0]}</b>이(가) 가장 약합니다(${weakest[1].toFixed(1)}). `
      + (missing.length
          ? `특히 ${missing.map(e=>`<b class="e-${e}">${e}</b>`).join('·')} 기운이 거의 없어, 그 오행이 상징하는 영역(${missing.map(e=>ELEM_ROLE_LABEL[elemRole(me,e)]||e).join(', ')})에서 아쉬움이 생기기 쉽습니다.`
          : `오행이 비교적 고루 갖춰져 큰 결핍은 없습니다.`),
    remedy: `부족한 <b class="e-${weakest[0]}">${weakest[0]}</b>을(를) 보완하려면, 색·방위·생활 습관에서 그 기운을 가까이 하면 도움이 됩니다. `
      + `(${weakest[0]}: ${ELEM_ADVICE[weakest[0]]})`,
  };

  // --- 3. 용신 활용 조언 ---
  const yong = ys.yongsin[0];
  const yongRole = yong ? ELEM_ROLE_LABEL[elemRole(me, yong)] : '';
  const useful = {
    title: '용신 활용법',
    yongsin: ys.yongsin, huisin: ys.huisin, gisin: ys.gisin, gusin: ys.gusin,
    body: yong
      ? `당신에게 가장 이로운 기운(용신)은 <b class="e-${yong}">${yong}</b>입니다. ${ys.primary}을(를) 기준으로 정해졌습니다. `
        + `${yong}은(는) 당신에게 ${yongRole} 역할을 하며, 이 기운이 살아날 때 일이 풀리고 컨디션이 좋아집니다. `
        + (ys.huisin.length?`이를 돕는 희신 <b class="e-${ys.huisin[0]}">${ys.huisin[0]}</b>도 함께 챙기면 좋습니다. `:'')
        + `반대로 기신 <b class="e-${ys.gisin[0]}">${ys.gisin[0]}</b>이(가) 강해지는 때·환경은 피하는 편이 유리합니다.`
      : '용신이 뚜렷하게 잡히지 않는 구조입니다. 특정 기운에 기대기보다 전체 균형을 살피는 편이 좋습니다.',
    advice: yong ? `실천 팁 — ${ELEM_ADVICE[yong]} 이런 것들이 ${yong} 기운을 북돋웁니다.` : '',
  };

  // --- 4. 신살·대운·세운 해석 ---
  const shinList = [];
  for (const [nm,gz] of [['년',p.year],['월',p.month],['일',p.day],['시',p.hour]]) {
    if(!gz) continue;
    for (const s of shinsal(p.day[0], p.day[1], gz[1], gz))
      shinList.push({ pos:nm, name:s, meaning: SHINSAL_MEANING[s] || '' });
  }
  const nowY = nowKST().y;
  const age = nowY - natal.y + 1;
  const curDae = [...du.list].reverse().find(x => age >= x.age) || du.list[0];
  const seun = yearGanjiRaw(nowY);
  const daeElem = elemOfStem(curDae.gz[0]);
  const seElem = elemOfStem(seun[0]);
  const daeGood = ys.yongsin.includes(daeElem) || ys.huisin.includes(daeElem);
  const daeBad = ys.gisin.includes(daeElem) || ys.gusin.includes(daeElem);
  const seGood = ys.yongsin.includes(seElem) || ys.huisin.includes(seElem);
  const seBad = ys.gisin.includes(seElem) || ys.gusin.includes(seElem);

  const fortune = {
    title: '신살 · 대운 · 세운',
    shinsal: shinList,
    daeun: {
      gz: curDae.gz, age: curDae.age, elem: daeElem,
      tone: daeGood?'순풍':daeBad?'역풍':'보통',
      body: `지금은 ${curDae.age}세부터 시작된 <b>${curDae.gz}</b> 대운 안에 있습니다. `
        + `대운의 천간 ${curDae.gz[0]}(${daeElem})은(는) `
        + (daeGood?`당신의 용희신에 해당해, 이 10년은 흐름을 타기 좋은 시기입니다. 하고 싶은 일을 펼쳐볼 만합니다.`
           :daeBad?`당신의 기구신에 해당해, 이 10년은 다소 버거울 수 있습니다. 무리한 확장보다 내실을 다지는 편이 좋습니다.`
           :`용신도 기신도 아니라, 큰 굴곡 없이 흘러가는 무난한 시기입니다.`),
    },
    seun: {
      gz: seun, year: nowY, elem: seElem,
      tone: seGood?'순풍':seBad?'역풍':'보통',
      body: `올해(${nowY}년)는 <b>${seun}</b> 세운입니다. 세운 천간 ${seun[0]}(${seElem})은(는) `
        + (seGood?`용희신에 들어, 새로운 시도나 결정에 힘이 실리는 해입니다.`
           :seBad?`기구신에 들어, 조심스럽게 움직이는 편이 좋은 해입니다. 건강과 관계를 특히 살피세요.`
           :`무난한 흐름의 해입니다.`),
    },
  };

  return { daymaster, balance, useful, fortune };
}

// AI 심화 — Supabase Edge Function 호출 (없으면 안내)
async function requestAIInterpretation(p, ys, du, natal) {
  const zone = document.querySelector('#aiZone');
  const btn = document.querySelector('#aiGo');
  if (btn) { btn.disabled = true; btn.textContent = 'AI가 풀이 중…'; }

  // 명식을 구조화해 서버로 넘긴다 (원문 그대로가 아니라 계산 결과만)
  const payload = {
    pillars: { year:p.year, month:p.month, day:p.day, hour:p.hour },
    dayMaster: ys.me,
    strength: { score: ys.score, strong: ys.strong, extreme: ys.extreme,
      deukryeong: ys.deukryeong, deukji: ys.deukji, deukse: ys.deukse },
    elements: ys.count,
    yongsin: ys.yongsin, huisin: ys.huisin, gisin: ys.gisin, gusin: ys.gusin,
    primary: ys.primary,
    daeun: du.list.map(x=>({ age:x.age, gz:x.gz })),
    currentYear: nowKST().y,
    birth: { y:natal.y, m:natal.m, d:natal.d, h:natal.h, gender:natal.gender },
  };

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/interpret`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token || SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY,
      },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const msg = res.status === 404
        ? 'AI 풀이 기능이 아직 서버에 준비되지 않았습니다. (interpret 함수 미배포)'
        : `AI 풀이를 불러오지 못했습니다. (오류 ${res.status})`;
      throw new Error(msg);
    }

    const out = await res.json();
    const text = out.text || out.interpretation || '';
    if (!text) throw new Error('AI가 빈 응답을 보냈습니다.');

    // 문단 단위로 안전하게 렌더 (HTML 주입 방지)
    const paras = text.split(/\n{2,}/).map(pr =>
      `<p class="ai-p">${esc(pr).replace(/\n/g,'<br>')}</p>`).join('');
    zone.innerHTML = `<div class="ai-result">
      <div class="ai-badge">AI 심화 풀이</div>
      ${paras}
      <div class="interp-note">AI가 생성한 해석입니다. 참고용으로만 봐주세요.</div>
    </div>`;
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'AI로 더 깊이 풀어보기'; }
    const warn = document.createElement('div');
    warn.className = 'err';
    warn.textContent = e.message;
    zone.appendChild(warn);
  }
}

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); } // m: 1-12

function natalForm(prefill) {
  const nowY = nowKST().y;
  const pf = prefill || state.natal || {};
  const selY = pf.y || 1990;
  const selM = pf.m || 1;
  const maxD = daysInMonth(selY, selM);
  const selD = Math.min(pf.d || 1, maxD);
  const selGender = pf.gender || 'M';
  const hasHour = pf.h != null;

  const opt = (v, label, sel) => `<option value="${v}"${v===sel?' selected':''}>${label}</option>`;
  const years = [];
  for (let y = nowY; y >= nowY - 100; y--) years.push(opt(y, y+'년', selY));
  const months = [];
  for (let m = 1; m <= 12; m++) months.push(opt(m, m+'월', selM));
  const days = [];
  for (let d = 1; d <= maxD; d++) days.push(opt(d, d+'일', selD));
  const hours = ['<option value=""'+(hasHour?'':' selected')+'>모름</option>'];
  for (let h = 0; h < 24; h++) hours.push(opt(h, String(h).padStart(2,'0')+'시', hasHour?pf.h:-1));
  const mins = [];
  for (let mi = 0; mi < 60; mi++) mins.push(opt(mi, String(mi).padStart(2,'0')+'분', pf.mi ?? 0));

  return `<div class="card" style="margin-top:0">
    <h3>명식 입력</h3>

// 기존 저장 데이터 파싱 — 예전 자유입력 형식이나 문자열이 섞여 있어도
// 드롭다운이 읽을 수 있는 정규 형태 {y,m,d,h,mi,gender}로 변환한다.
function parseNatal(raw) {
  if (!raw || typeof raw !== 'object') return null;
  const num = (v) => { const n = parseInt(v, 10); return Number.isFinite(n) ? n : null; };
  let y = num(raw.y ?? raw.year ?? raw.birthYear);
  let m = num(raw.m ?? raw.month ?? raw.birthMonth);
  let d = num(raw.d ?? raw.day ?? raw.birthDay);
  // "1990-05-15" 같은 문자열도 허용
  if ((y==null||m==null||d==null) && typeof raw.date === 'string') {
    const mt = raw.date.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (mt) { y=+mt[1]; m=+mt[2]; d=+mt[3]; }
  }
  if (y==null || m==null || d==null) return null;
  // 범위 보정
  m = Math.min(12, Math.max(1, m));
  d = Math.min(daysInMonth(y, m), Math.max(1, d));
  let h = raw.h ?? raw.hour ?? null; h = (h==='' || h==null) ? null : num(h);
  if (h!=null) h = Math.min(23, Math.max(0, h));
  let mi = num(raw.mi ?? raw.minute) ?? 0; mi = Math.min(59, Math.max(0, mi));
  const gender = (raw.gender==='F'||raw.gender==='여') ? 'F' : 'M';
  return { y, m, d, h, mi, gender };
}

function natalObj() {
  const n = state.natal;
  if (!n) return null;
  const p = computeSaju(fromKST(n.y, n.m-1, n.d, n.h ?? 12, n.mi ?? 0), n.h, n.mi);
  const ys = analyzeYongsinFull(p);
  const birth = fromKST(n.y,n.m-1,n.d,n.h ?? 12,n.mi ?? 0);
  const du = computeDaeun(p,birth,n.gender);
  const nowY=nowKST().y, age=nowY-n.y+1;
  const cur=[...du.list].reverse().find(x=>age>=x.age) || du.list[0] || null;
  return {
    year:p.year, month:p.month, day:p.day, hour:p.hour,
    yongsin:[...(ys.yongsin||[])], huisin:[...(ys.huisin||[])],
    gisin:[...(ys.gisin||[])], gusin:[...(ys.gusin||[])],
    primary:ys.primary, methods:ys.methods,
    strength:{ strong:ys.strong, ratio:ys.ratio, deukryeong:ys.deukryeong, deukji:ys.deukji, deukse:ys.deukse, score:ys.score },

}

const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---------- 백업 ----------
function exportBackup() {
  const dump = {
    format: 'manseryeok-diary/v1',
    exported: new Date().toISOString(),
    username: state.user?.email ?? null,
    rev: state.rev,
    data: { natal: state.natal, entries: state.entries },
  };
  const blob = new Blob([JSON.stringify(dump, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `manseryeok-backup-${isoKST(new Date())}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

async function importBackup(file, msgEl) {
  const show = (t, bad=true) => { msgEl.textContent = t; msgEl.className = 'err' + (bad?'':' ok'); };
  try {
    const dump = JSON.parse(await file.text());
    if (dump.format !== 'manseryeok-diary/v1') return show('이 앱의 백업 파일이 아닙니다.');
    const d = dump.data || {};
    if (typeof d.entries !== 'object' || d.entries === null) return show('백업 파일이 손상되었습니다.');

    // 병합: 같은 날짜는 현재 기록을 우선한다 (복원이 최근 기록을 덮지 않도록)
    const before = Object.keys(state.entries).length;
    state.entries = { ...d.entries, ...state.entries };
    state.natal = state.natal || d.natal || null;
    const added = Object.keys(state.entries).length - before;

    recomputeWarn();
    if (state.user) await pushNow();
    show(`복원 완료 — ${added}일 추가 (전체 ${Object.keys(state.entries).length}일)`, false);
    setTimeout(render, 900);
  } catch {
    show('파일을 읽을 수 없습니다.');
  }
}

// ---------- 뷰: 운의 흐름 ----------
function flowTabsHTML() {
  return `<div class="flow-tabs" role="tablist">

}

function flowDisclaimer() {
  return `<div class="disclaimer">이 분석은 사용자의 명식과 누적 기록에서 발견된 경향을 보여주는 참고 자료입니다. 의료·법률·투자·계약 등 중요한 결정은 현실적인 조건과 전문가의 의견을 함께 확인하세요.</div>`;
}

function personalizationStage(n) { return n<30?'학습 중':n<60?'보통':'충분'; }
function confLabel(c) { return c>=.65?'높음':c>=.4?'보통':'낮음'; }
function ddayLabel(key) {
  const dt=dateFromKey(key), now=analysisDate(new Date(),0);
  if(!dt) return '';
  const d=Math.round((dt-now)/86400000);
  return d===0?'D-day':d>0?`D-${d}`:`D+${Math.abs(d)}`;
}
function scoreClass(n) { return n>8?'pos':n<-8?'neg':'mix'; }
function sourceClass(s) { return s==='내 기록'?'emp':s==='대운·세운'?'fortune':'natal'; }
function reasonHTML(r) { return `<div class="reason"><span class="src ${sourceClass(r.source)}">${esc(r.source)}</span>${esc(r.text)}</div>`; }

function selectedReasons(item, mode, max=3) {
  const emp=item.reasons.filter(x=>mode==='good'?x.score>0:x.score<0);
  const nat=(mode==='good'?item.positiveReasons:item.negativeReasons);
  const fortune=nat.filter(x=>x.source==='대운·세운');
  const natalOnly=nat.filter(x=>x.source!=='대운·세운');
  const pool=[];
  if(emp[0]) pool.push(emp[0]);
  if(natalOnly[0]) pool.push(natalOnly[0]);
  if(fortune[0]) pool.push(fortune[0]);
  for(const x of [...emp.slice(1),...natalOnly.slice(1),...fortune.slice(1)]) if(!pool.includes(x)) pool.push(x);
  return pool.slice(0,max);
}

function flowCacheKey(days,purpose) {
  return `${days}|${purpose}|${state.natal?.y||''}-${state.natal?.m||''}-${state.natal?.d||''}-${sampleCount()}`;
}
function getFlowForecast(days,purpose='decision') {
  const key=flowCacheKey(days,purpose);
  if(state.flowCache?.has(key)) return state.flowCache.get(key);
  const val=forecastHybrid(natalObj(),collectSamples(),{days,from:new Date(),purpose});
  state.flowCache?.set(key,val);
  return val;
}

function analysisSummaryHTML(count,days,modeCount) {
  const method=count<10?'명식 기준':'명식 + 개인 기록';

    <div class="kv"><span class="k">분석 기간</span><span>향후 ${days}일</span></div>
    <div class="kv"><span class="k">표시 결과</span><span>${modeCount}일</span></div>
    ${count<10?`<div class="note">개인 기록 표본이 부족해 현재는 명식 기준으로 분석합니다. 기록 10개부터 명식 + 개인 기록 분석으로 자동 전환되며, 기록이 늘수록 개인화 비중이 커집니다.</div>`:
    `<div class="note">명식 흐름과 실제 기록을 함께 분석합니다. 표본이 늘수록 실제 개인 기록의 비중이 최대 70%까지 커집니다.</div>`}
  </div>`;
}

function scoreGridHTML(item, finalLabel) {

    <div><small>종합 신뢰도</small><b>${confLabel(item.confidence)} ${(item.confidence*100).toFixed(0)}%</b></div>
    <div><small>개인 기록 점수</small><b class="flow-score ${scoreClass(item.empiricalScore)}">${Math.round(item.empiricalScore)}</b></div>
    <div><small>명식 흐름 점수</small><b class="flow-score ${scoreClass(item.natalScore)}">${Math.round(item.natalScore)}</b></div>

function warningCardHTML(item) {

  </div>`;
}

function opportunityGrade(item) {
  if(item.mixed||item.conflict) return '혼합 흐름';
  if(item.combinedScore>=55) return '매우 잘 맞음';
  if(item.combinedScore>=30) return '잘 맞음';
  return '무난함';
}

function opportunityCardHTML(item,natal,entries,prepared) {
  const reasons=selectedReasons(item,'good');
  const caution=selectedReasons(item,'warn',1)[0];
  const rec=recommendedHours(natal,entries,item,item.purpose,prepared);
  return `<div class="warn-i good ${item.mixed?'mixed':''}">
    <div class="top"><div><span class="dt">${item.date}</span><span class="gz"><span class="e-${elemOfStem(item.ganji[0])}">${H(item.ganji[0])}</span><span class="e-${elemOfBranch(item.ganji[1])}">${H(item.ganji[1])}</span></span>
      <span style="color:var(--mute);font-size:11px;margin-left:6px">${ddayLabel(item.date)}</span></div>
      <span class="cf">${opportunityGrade(item)} · ${esc(purposeLabel(item.purpose))}</span></div>

  </div>`;
}

function viewWarningFlow() {
  const list=collectSamples(), nat=natalObj(), fc=getFlowForecast(180,'decision');
  const risky=[...fc.all].filter(x=>x.combinedScore<=-35 || (x.conflict&&x.combinedScore<10))
    .sort((a,b)=>a.combinedScore-b.combinedScore || b.confidence-a.confidence).slice(0,14);
  const risks=fc.prepared.risks.slice().sort((a,b)=>a.delta-b.delta);
  return `${analysisSummaryHTML(list.length,180,risky.length)}
    ${list.length>=10&&risks.length?`<div class="card"><h3>내 기록에서 반복 확인된 주의 구조</h3>${risks.slice(0,8).map(s=>`<div class="stat-row"><span>${esc(s.tag)}</span><span class="n">${s.n}회 · ${s.level}</span><span class="delta neg">${s.delta.toFixed(2)}</span></div>`).join('')}</div>`:''}
    <div style="margin-top:18px">${risky.length?risky.map(warningCardHTML).join(''):`<div class="empty"><div class="ic">靜</div><p>향후 180일에 강하게 치우친 주의 흐름이 없습니다.<br><span style="font-size:11.5px">기록을 이어가면 개인 패턴이 계속 보정됩니다.</span></p></div>`}</div>
    <div class="note"><b>읽는 법.</b> 음수에 가까울수록 평소보다 컨디션 변동 가능성이 큰 흐름입니다. 명식과 기록이 충돌하면 어느 한쪽을 지우지 않고 혼합 흐름으로 표시하며 신뢰도를 낮춥니다.</div>${flowDisclaimer()}`;
}

function viewOpportunityFlow() {
  const list=collectSamples(), nat=natalObj();
  const days=[30,60,90,180].includes(+state.flowDays)?+state.flowDays:60;
  const purpose=PURPOSES[state.flowPurpose]?state.flowPurpose:'decision';
  const fc=forecastOpportunities(nat,list,{days,from:new Date(),purpose});
  const opts=Object.entries(PURPOSES).map(([k,v])=>`<option value="${k}" ${k===purpose?'selected':''}>${v.label}</option>`).join('');
  const controls=`<div class="flow-controls">
    <div><label for="flowPurpose">목적</label><select id="flowPurpose">${opts}</select></div>
    <div><label for="flowDays">검색 범위</label><select id="flowDays">${[30,60,90,180].map(n=>`<option value="${n}" ${n===days?'selected':''}>향후 ${n}일</option>`).join('')}</select></div>
  </div>`;
  return `${controls}${analysisSummaryHTML(list.length,days,fc.days.length)}
    ${list.length>=10&&fc.opportunityTags.length?`<div class="card"><h3>내 기록에서 반복 확인된 좋은 구조</h3>${fc.opportunityTags.slice().sort((a,b)=>b.delta-a.delta).slice(0,8).map(s=>`<div class="stat-row"><span>${esc(s.tag)}</span><span class="n">${s.n}회 · ${s.level}</span><span class="delta pos">+${s.delta.toFixed(2)}</span></div>`).join('')}</div>`:''}
    <div style="margin-top:18px">${fc.days.map(x=>opportunityCardHTML(x,nat,list,fc.prepared)).join('')}</div>
    <div class="note">점수가 높아도 충·형·원진 같은 주의 요소가 함께 있으면 혼합 흐름으로 표시합니다. 이 결과는 성공을 보장하는 택일이 아니라, 선택한 목적과 개인 컨디션의 상대적 적합도를 비교한 가이드입니다.</div>${flowDisclaimer()}`;
}

function viewWarn() {
  const tabs=flowTabsHTML();
  if (!state.natal) return `${tabs}<div class="empty"><div class="ic">命</div><p>먼저 <b>내 명식</b>에서 사주를 입력해주세요.<br>명식이 있어야 날짜 흐름을 분석할 수 있습니다.</p></div>${flowDisclaimer()}`;
  try { return `${tabs}${state.flowMode==='good'?viewOpportunityFlow():viewWarningFlow()}`; }
  catch(e) { console.error('운의 흐름 렌더 오류',e); return `${tabs}<div class="empty"><div class="ic">靜</div><p>날짜 분석 중 일부 값이 올바르지 않아 결과를 표시하지 못했습니다.<br>명식 값을 다시 확인해주세요.</p></div>${flowDisclaimer()}`; }
}

function invalidateFlowCache() {
  state.flowCache=new Map(); state.warnSet=new Set(); state.goodSet=new Set(); state.mixedSet=new Set();
}

function recomputeWarn() {
  invalidateFlowCache();
  if (!state.natal) return;
  try {
    const fc=getFlowForecast(365,'decision');
    for(const d of fc.all) {
      const hasPos=d.empiricalScore>12 || d.positiveReasons.some(x=>x.score>=10);
      const hasNeg=d.empiricalScore<-12 || d.negativeReasons.some(x=>x.score<=-10);
      if(d.combinedScore<=-35) state.warnSet.add(d.date);
      if(d.combinedScore>=28) state.goodSet.add(d.date);
      if(d.mixed&&hasPos&&hasNeg&&Math.abs(d.combinedScore)<18) {
        state.warnSet.add(d.date); state.goodSet.add(d.date); state.mixedSet.add(d.date);
      }
    }
  } catch(e) { console.warn('날짜 흐름 재계산 실패',e); }
}

function render() {
  $('#nav').innerHTML = TABS.map(t=>`<div class="nav-i ${state.tab===t.id?'on':''}" data-t="${t.id}">
    <span class="gz">${t.gz}</span>${t.name}</div>`).join('');
  $('#ttl').innerHTML = TABS.find(t=>t.id===state.tab).name + syncHTML();
  const v = $('#view');
  v.innerHTML = state.tab==='today' ? viewToday()
    : state.tab==='cal' ? viewCalendar()
    : state.tab==='natal' ? viewNatal()
    : state.tab==='acct' ? viewAccount()
    : viewWarn();

  $('#nav').onclick = e => { const t=e.target.closest('.nav-i'); if(!t)return;
    state.tab=t.dataset.t; closeNav(); render(); };

  if (state.tab==='cal') {
    $('#pm').onclick = ()=>{ state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()-1,1); render(); };
    $('#nm').onclick = ()=>{ state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()+1,1); render(); };
    $('#sy').onchange = e => { state.cal=new Date(+e.target.value, state.cal.getMonth(), 1); render(); };
    $('#sm').onchange = e => { state.cal=new Date(state.cal.getFullYear(), +e.target.value, 1); render(); };
    if ($('#tdy')) $('#tdy').onclick = ()=>{ const n=nowKST(); state.cal=new Date(n.y,n.m,1); render(); };
    const si=$('#segI'), sp=$('#segPop');
    if (si) si.onclick = e => { e.stopPropagation();
      const open = sp.hasAttribute('hidden');
      sp.toggleAttribute('hidden', !open);
      si.setAttribute('aria-expanded', open);
      si.classList.toggle('on', open);
    };
    document.addEventListener('click', e => {
      if (sp && !sp.hasAttribute('hidden') && !sp.contains(e.target) && e.target !== si) {
        sp.setAttribute('hidden',''); si?.classList.remove('on'); si?.setAttribute('aria-expanded','false');
      }
    }, { once: true });
    $('#grid').onclick = e => { const c=e.target.closest('.cell'); if(!c||c.classList.contains('pad'))return;
      openSheet(c.dataset.d); };
  }
  if (state.tab==='natal') {
    // 연/월 변경 시 '일' 목록을 실제 말일에 맞춰 다시 채운다 (2월 30일 등 방지)
    const syncDays = () => {
      const y=+$('#iy').value, m=+$('#im').value;
      const maxD = daysInMonth(y, m);
      const sel = $('#id'); const prev = +sel.value;
      sel.innerHTML = Array.from({length:maxD},(_,i)=>{const d=i+1;
        return `<option value="${d}"${d===Math.min(prev,maxD)?' selected':''}>${d}일</option>`;}).join('');
    };
    if ($('#iy')) $('#iy').onchange = syncDays;
    if ($('#im')) $('#im').onchange = syncDays;

    if ($('#mk')) $('#mk').onclick = () => {
      const err = (t)=>{ const e=$('#natErr'); if(e){e.textContent=t;e.className='err';} };
      const y=+$('#iy').value, m=+$('#im').value, d=+$('#id').value;
      const hv=$('#ih').value, h = hv===''?null:+hv, mi=+($('#imi').value||0);
      // 드롭다운이라 범위는 안전하지만 방어적으로 재검증
      if(!y||!m||!d){ return err('생년월일을 모두 선택해주세요.'); }
      if(m<1||m>12){ return err('월이 올바르지 않습니다.'); }
      if(d<1||d>daysInMonth(y,m)){ return err(`${y}년 ${m}월은 ${daysInMonth(y,m)}일까지 있습니다.`); }
      if(h!=null && (h<0||h>23)){ return err('시가 올바르지 않습니다.'); }
      if(mi<0||mi>59){ return err('분이 올바르지 않습니다.'); }
      const today = nowKST();
      if(y>today.y || (y===today.y && (m>today.m+1 || (m===today.m+1 && d>today.d)))){
        return err('아직 오지 않은 날짜입니다.');
      }
      state.natal={y,m,d,h,mi,gender:$('#ig').value}; recomputeWarn(); queueSave(); render();
    };
    if ($('#reset')) $('#reset').onclick = ()=>{ state.natal=null; invalidateFlowCache(); queueSave(); render(); };
    if ($('#aiGo')) $('#aiGo').onclick = () => {
      const nn = state.natal;
      const bp = computeSaju(fromKST(nn.y, nn.m-1, nn.d, nn.h ?? 12, nn.mi ?? 0), nn.h, nn.mi);
      requestAIInterpretation(bp, analyzeYongsinFull(bp), computeDaeun(bp, fromKST(nn.y, nn.m-1, nn.d, nn.h ?? 12, nn.mi ?? 0), nn.gender), nn);
    };
  }
  if (state.tab==='warn') {
    document.querySelectorAll('[data-flow]').forEach(btn=>btn.onclick=()=>{ state.flowMode=btn.dataset.flow; render(); });
    if ($('#flowPurpose')) $('#flowPurpose').onchange=e=>{ state.flowPurpose=e.target.value; render(); };
    if ($('#flowDays')) $('#flowDays').onchange=e=>{ state.flowDays=+e.target.value; render(); };
  }
  if (state.tab==='acct') bindAccount();
}

// ---------- 계정 핸들러 ----------
function bindAccount() {
  const bkOut = $('#bkOut'), bkIn = $('#bkIn'), bkFile = $('#bkFile');
  if (bkOut) bkOut.onclick = exportBackup;
  if (bkIn)  bkIn.onclick  = () => bkFile.click();
  if (bkFile) bkFile.onchange = e => { const f=e.target.files[0]; if(f) importBackup(f, $('#bkMsg')); e.target.value=''; };

  if ($('#googleLogin')) {
    $('#googleLogin').onclick = loginWithGoogle;
  }

  let mode = 'login';
  const err = (el, t) => { const e=$(el); if(e){ e.textContent=t; e.className='err'; } };

  if ($('#aswap')) $('#aswap').onclick = () => {
    mode = mode==='login' ? 'signup' : 'login';
    $('#authTtl').textContent = mode==='login' ? '로그인' : '가입하기';
    $('#ago').textContent     = mode==='login' ? '로그인' : '가입하고 시작하기';
    $('#aswap').textContent   = mode==='login' ? '계정이 없으신가요? 가입하기' : '이미 계정이 있으신가요? 로그인';
    $('#ap').setAttribute('autocomplete', mode==='login'?'current-password':'new-password');
    err('#aerr','');
  };

  if ($('#ago')) $('#ago').onclick = async () => {
    const u = $('#au').value.trim(), p = $('#ap').value;
    if (!u || !p) return err('#aerr','이메일과 비밀번호를 입력해주세요.');
    $('#ago').disabled = true;
    try {
      await (mode==='login' ? API.login(u,p) : API.signup(u,p));
      // 가입 시 이메일 인증이 필요하면 세션이 없을 수 있다
      const me = await API.me();
      if (!me.user) {
        err('#aerr','가입 확인 메일을 보냈습니다. 메일함을 확인해주세요.');
        $('#ago').disabled = false;
        return;
      }
      state.user = me.user; state.rev = me.rev ?? 0;
      const sd = me.data || { natal:null, entries:{} };
      // 로그인 전 로컬에 쓴 기록이 있으면 서버 기록과 합친다
      const localCount = Object.keys(state.entries).length;
      state.entries = { ...(sd.entries||{}), ...state.entries };
      state.natal = state.natal || sd.natal || null;
      state.sync = 'idle';
      recomputeWarn();
      if (localCount) await pushNow();
      render();
    } catch (e) {
      err('#aerr', e.message);
      $('#ago').disabled = false;
    }
  };

  if ($('#alo')) $('#alo').onclick = async () => {
    try { await API.logout(); } catch {}
    state.user=null; state.rev=0; state.sync='off';
    state.entries={}; state.natal=null; invalidateFlowCache();
    render();
  };

  if ($('#pgo')) $('#pgo').onclick = async () => {
    const c=$('#pc').value, n=$('#pn').value;
    if(!c||!n) return err('#perr','두 칸 모두 입력해주세요.');
    $('#pgo').disabled=true;
    try { await API.passwd(c,n); const e=$('#perr'); e.textContent='비밀번호를 변경했습니다.'; e.className='err ok';
      $('#pc').value=''; $('#pn').value=''; }
    catch(e){ err('#perr', e.message); }
    $('#pgo').disabled=false;
  };

  if ($('#dgo')) $('#dgo').onclick = async () => {
    const p=$('#dp').value;
    if(!p) return err('#derr','비밀번호를 입력해주세요.');
    if(!confirm('정말 계정을 삭제할까요? 모든 기록이 사라지며 되돌릴 수 없습니다.')) return;
    try { await API.del(p); state.user=null; state.entries={}; state.natal=null; state.rev=0; state.sync='off'; state.tab='today'; invalidateFlowCache(); render(); }
    catch(e){ err('#derr', e.message); }
  };
}

const openNav = ()=>{ $('#side').classList.add('on'); $('#scrim').classList.add('on'); };
const closeNav = ()=>{ $('#side').classList.remove('on'); $('#scrim').classList.remove('on'); };
$('#bg').onclick = openNav;
$('#scrim').onclick = closeNav;
$('#sbg').onclick = closeSheet;
$('#shX').onclick = closeSheet;
$('#hsbg').onclick = closeHourSheet;
$('#hsX').onclick = closeHourSheet;

// ===== Supabase 로그인 세션 유지 =====
// 부팅 시 저장된 세션을 먼저 확인한다. 세션이 있으면 즉시 로그인 UI로,
// 없으면 정상 비로그인 UI로 시작한다. (세션 확인 전에 '로그인 실패'를 띄우지 않는다)
let __authListenerBound = false;

async function boot() {
  state.sync = 'checking';   // 세션 확인 중
  try {
    // getSession: 로컬에 저장된 세션을 동기적으로 복구 (팝업을 다시 열지 않음)
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (session?.user) {
      const me = await API.me();
      state.user = me.user;
      state.rev = me.rev ?? 0;
      state.natal = parseNatal(me.data?.natal) ?? null;
      state.entries = me.data?.entries ?? {};
      state.sync = 'idle';
      recomputeWarn();
    } else {
      // 정상 비로그인 — 오류가 아니다
      state.user = null;
      state.rev = 0;
      state.sync = 'off';
    }
  } catch (error) {
    console.error('세션 확인 실패:', error);
    state.user = null;
    state.sync = 'off';   // 네트워크 문제여도 비로그인으로 두고 오류로 표시하지 않음
  }

  // 콜백 URL의 인증 파라미터 정리 (detectSessionInUrl 처리 후 주소창 청소)
  if (location.hash.includes('access_token') || location.search.includes('code=')) {
    history.replaceState(null, '', location.pathname);
  }

  render();
}

// ===== Supabase 로그인 세션 유지 =====
// onAuthStateChange 리스너는 단 한 번만 등록한다 (render 반복 호출과 무관).
if (!__authListenerBound) {
  __authListenerBound = true;
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    try {
      if (event === 'SIGNED_OUT') {
        state.user = null; state.rev = 0; state.sync = 'off';
        state.entries = {}; state.natal = null; invalidateFlowCache();
        render();
        return;
      }
      // SIGNED_IN · TOKEN_REFRESHED · INITIAL_SESSION · USER_UPDATED
      if (session?.user) {
        const me = await API.me();
        state.user = me.user;
        state.rev = me.rev ?? 0;
        // 로그인 직전 로컬 기록이 있으면 병합 (덮어쓰기 방지)
        const localEntries = state.entries || {};
        const localNatal = state.natal;
        state.natal = parseNatal(me.data?.natal) ?? localNatal ?? null;
        state.entries = { ...(me.data?.entries ?? {}), ...localEntries };
        state.sync = 'idle';
        recomputeWarn();
        render();
      }
    } catch (error) {
      console.error('로그인 상태 반영 실패:', error);
    }
  });
}

boot();


</script>
